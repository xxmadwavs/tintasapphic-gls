<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TINTA SAPPHIC ~ GL Series & Películas</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fdf6f9; --surface: #fff; --surface2: #fdf0f5;
  --border: rgba(220,150,180,0.2); --border2: rgba(220,150,180,0.4);
  --text: #3a2535; --muted: #9c7a8a; --accent: #d4608a; --accent2: #e891b0;
  --accent-soft: #f7dce9; --teal: #5bbcb0; --teal-soft: #d4f0ed;
  --lavender: #9b82c9; --lavender-soft: #ede7f8; --radius: 14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;font-size:14px;line-height:1.6;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:
  radial-gradient(ellipse at 5% 15%,rgba(212,96,138,0.07) 0%,transparent 45%),
  radial-gradient(ellipse at 95% 85%,rgba(155,130,201,0.08) 0%,transparent 45%),
  radial-gradient(ellipse at 50% 0%,rgba(91,188,176,0.05) 0%,transparent 40%);
  pointer-events:none;z-index:0}
.petal{position:fixed;pointer-events:none;z-index:0;opacity:.15;font-size:20px;animation:floatPetal 12s ease-in-out infinite}
.petal:nth-child(1){top:8%;left:4%;animation-delay:0s}
.petal:nth-child(2){top:25%;right:3%;animation-delay:3s;font-size:14px}
.petal:nth-child(3){top:60%;left:2%;animation-delay:6s;font-size:12px}
.petal:nth-child(4){top:80%;right:5%;animation-delay:1.5s}
.petal:nth-child(5){top:45%;right:2%;animation-delay:9s;font-size:16px}
@keyframes floatPetal{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-12px) rotate(8deg)}}

.topbar{background:rgba(255,255,255,0.92);border-bottom:1px solid var(--border2);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:58px;position:sticky;top:0;z-index:50;backdrop-filter:blur(12px);box-shadow:0 2px 16px rgba(212,96,138,0.07)}
.logo{font-family:'Playfair Display',serif;font-size:19px;color:var(--accent)}
.logo-wrap{display:flex;flex-direction:column;gap:0}
.logo-sub{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.05em}
.update-badge{font-size:11px;color:var(--muted);background:var(--surface2);padding:3px 10px;border-radius:20px;border:1px solid var(--border)}

.container{max-width:1020px;margin:0 auto;padding:2rem 1.5rem;position:relative;z-index:1}
.page-header{margin-bottom:1.75rem}
@media(max-width:600px){.page-header{padding-top:1.25rem;padding-bottom:1.25rem}}
.page-title{font-family:'Playfair Display',serif;font-size:34px;color:var(--text);line-height:1.2}
.page-title span{color:var(--accent);font-style:italic}
.page-desc{font-size:13px;color:var(--muted);margin-top:4px}

.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:12px}
.month-display{font-family:'Playfair Display',serif;font-size:24px;color:var(--text)}
.month-display span{color:var(--accent)}
.nav-btns{display:flex;gap:8px}
.nav-btn{background:var(--surface);border:1.5px solid var(--border2);border-radius:20px;padding:6px 16px;cursor:pointer;font-size:13px;color:var(--text);font-family:'Nunito',sans-serif;font-weight:600;transition:all .15s}
.nav-btn:hover{background:var(--accent-soft);border-color:var(--accent2);color:var(--accent)}

.tabs{display:flex;gap:4px;margin-bottom:1.5rem;background:var(--surface2);border-radius:20px;padding:4px;width:fit-content;border:1.5px solid var(--border);flex-wrap:wrap}
.tab{padding:6px 18px;border-radius:16px;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);background:transparent;border:none;font-family:'Nunito',sans-serif;transition:all .15s}
.tab.active{background:var(--surface);color:var(--accent);box-shadow:0 2px 8px rgba(212,96,138,0.12)}
.tab:hover:not(.active){color:var(--text)}

/* Calendar */
.cal-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;min-width:620px}
.day-header{text-align:center;font-size:11px;color:var(--muted);padding:6px 0;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.day-cell{min-height:100px;border-radius:12px;border:1.5px solid var(--border);padding:6px;background:var(--surface);transition:all .2s}
.day-cell.has-eps{cursor:pointer}
.day-cell.has-eps:hover{border-color:var(--accent2);box-shadow:0 4px 16px rgba(212,96,138,0.12);transform:translateY(-1px)}
.day-cell.other-month{opacity:.28;background:transparent}
.day-cell.today{border-color:var(--accent);border-width:2px}
.day-cell.today .day-num{color:var(--accent);font-weight:700}
.day-num{font-size:12px;color:var(--muted);margin-bottom:4px;font-weight:600}
.ep-pill{display:flex;align-items:center;gap:4px;border-radius:7px;padding:3px 5px;margin-bottom:3px;overflow:hidden;cursor:pointer;transition:opacity .15s}
.ep-pill:hover{opacity:.85}
.ep-pill.skipped{opacity:.35;text-decoration:line-through}
.ep-thumb{width:18px;height:26px;border-radius:3px;object-fit:cover;flex-shrink:0}
.ep-thumb-ph{width:18px;height:26px;border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px}
.ep-pill-text{font-size:10px;line-height:1.2;overflow:hidden;min-width:0}
.ep-pill-name{white-space:nowrap;text-overflow:ellipsis;overflow:hidden;font-weight:600}
.ep-pill-ep{opacity:.75;font-size:9px}

/* Series grid */
.series-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px}
.series-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:all .2s;position:relative;display:flex;flex-direction:column}
.series-card:hover{border-color:var(--accent2);box-shadow:0 8px 28px rgba(212,96,138,0.14);transform:translateY(-2px)}
.series-card-poster{width:100%;height:200px;object-fit:cover;display:block;background:var(--accent-soft)}
.series-card-poster-ph{width:100%;height:200px;background:linear-gradient(135deg,var(--accent-soft) 0%,var(--lavender-soft) 100%);display:flex;align-items:center;justify-content:center;font-size:36px;color:var(--accent)}
.series-card-body{padding:12px;flex:1;display:flex;flex-direction:column}
.series-card-name{font-size:14px;font-weight:700;color:var(--text);line-height:1.3;margin-bottom:4px}
.series-card-meta{font-size:11px;color:var(--muted);line-height:1.5}
.series-card-next{font-size:11px;color:var(--accent);font-weight:600;margin-top:5px}
.series-card-done{font-size:11px;color:var(--teal);font-weight:600;margin-top:5px}
.progress-wrap{height:3px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width .3s}
.card-badges{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:4px}
.badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700}
.badge-book{background:#fdf3d8;color:#b08a00}
.badge-upcoming{background:var(--lavender-soft);color:var(--lavender)}
.card-watch-pill{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;color:var(--teal);text-decoration:none;background:var(--teal-soft);border-radius:20px;padding:2px 8px;border:1px solid rgba(91,188,176,0.3);transition:all .15s;white-space:nowrap}
.card-watch-pill:hover{background:var(--teal);color:#fff;border-color:var(--teal)}
@media(max-width:480px){
  .series-grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .series-card-poster,.series-card-poster-ph{height:160px}
  .series-card-body{padding:9px}
  .series-card-name{font-size:13px}
}

/* Upcoming section */
.upcoming-section{margin-bottom:2rem}
.section-heading{font-family:'Playfair Display',serif;font-size:20px;color:var(--text);margin-bottom:.25rem}
.section-desc{font-size:13px;color:var(--muted);margin-bottom:1rem}
.upcoming-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px}
.upcoming-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:all .2s;position:relative;display:flex;flex-direction:column}
.upcoming-card:hover{border-color:var(--lavender);box-shadow:0 8px 28px rgba(155,130,201,0.18);transform:translateY(-2px)}
.upcoming-poster{width:100%;height:200px;object-fit:cover;display:block;background:var(--lavender-soft)}
.upcoming-poster-ph{width:100%;height:200px;background:linear-gradient(135deg,var(--lavender-soft) 0%,var(--accent-soft) 100%);display:flex;align-items:center;justify-content:center;font-size:36px}
.upcoming-body{padding:12px;flex:1;display:flex;flex-direction:column;gap:4px}
.upcoming-name{font-size:14px;font-weight:700;color:var(--text);line-height:1.3;margin-bottom:2px}
.upcoming-meta{font-size:11px;color:var(--muted);line-height:1.5}
.upcoming-watch-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
@media(max-width:480px){
  .upcoming-grid{grid-template-columns:repeat(2,1fr);gap:9px}
  .upcoming-poster,.upcoming-poster-ph{height:160px}
  .upcoming-body{padding:9px}
  .upcoming-name{font-size:13px}
}

/* Stats bar */
.stats-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:1.75rem}
.stat-card{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:12px 16px;text-align:center}
.stat-num{font-family:'Playfair Display',serif;font-size:26px;color:var(--accent)}
.stat-label{font-size:11px;color:var(--muted);margin-top:2px;font-weight:600}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(58,37,53,.55);display:none;align-items:center;justify-content:center;z-index:200;padding:1rem;backdrop-filter:blur(3px)}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border:1.5px solid var(--border2);border-radius:20px;padding:0;width:100%;max-width:460px;max-height:92vh;overflow-y:auto;box-shadow:0 24px 64px rgba(212,96,138,0.18)}
.modal-poster-full{width:100%;aspect-ratio:2/3;max-height:320px;object-fit:cover;object-position:top center;border-radius:18px 18px 0 0;display:block}
.modal-poster-full-ph{width:100%;height:160px;background:linear-gradient(135deg,var(--accent-soft),var(--lavender-soft));border-radius:18px 18px 0 0;display:flex;align-items:center;justify-content:center;font-size:40px}
.modal-body{padding:1.5rem}
.modal-title{font-family:'Playfair Display',serif;font-size:22px;color:var(--text);line-height:1.3;margin-bottom:4px}
.modal-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.modal-meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px}
.meta-item{background:var(--surface2);border-radius:8px;padding:7px 10px}
.meta-key{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:600}
.meta-val{font-size:13px;color:var(--text);font-weight:600;margin-top:1px}
.synopsis{font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:14px;padding:10px 14px;background:var(--surface2);border-radius:10px;border-left:3px solid var(--accent2)}
.book-source{font-size:12px;color:#b08a00;background:#fdf3d8;border-radius:8px;padding:7px 12px;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.divider{height:1px;background:var(--border);margin:14px 0}
.ep-detail-list{display:grid;gap:5px}
.ep-detail-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:10px;border:1px solid var(--border);background:var(--surface2)}
.ep-detail-num{font-size:12px;color:var(--muted);min-width:26px;font-weight:600}
.ep-detail-date{flex:1;font-size:13px;color:var(--text)}
.chip{font-size:11px;padding:2px 10px;border-radius:20px;font-weight:600}
.chip.aired{background:var(--teal-soft);color:var(--teal)}
.chip.pending{background:var(--accent-soft);color:var(--accent)}
.chip.skipped{background:#f0eeee;color:#bbb}
.btn{padding:7px 18px;border-radius:20px;border:1.5px solid var(--border2);cursor:pointer;font-size:13px;font-family:'Nunito',sans-serif;font-weight:600;background:transparent;color:var(--text);transition:all .15s}
.btn:hover{background:var(--accent-soft);border-color:var(--accent2);color:var(--accent)}

.loading{text-align:center;color:var(--muted);padding:4rem;font-size:14px}
.error-box{background:rgba(212,92,92,.07);border:1.5px solid rgba(212,92,92,.2);border-radius:12px;padding:1.25rem;color:#c05;font-size:13px;line-height:1.8;margin:1rem 0}
code{background:var(--lavender-soft);color:var(--lavender);padding:1px 7px;border-radius:6px;font-size:12px}
.empty{text-align:center;color:var(--muted);padding:3rem;font-size:13px}
.day-modal-date{font-family:'Playfair Display',serif;font-size:22px;color:var(--text);margin-bottom:4px}
.day-modal-sub{font-size:12px;color:var(--muted);margin-bottom:1.25rem}
.day-ep-row{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:12px;border:1.5px solid var(--border);background:var(--surface2);margin-bottom:6px;cursor:pointer;transition:all .15s}
.day-ep-row:hover{border-color:var(--accent2);background:var(--accent-soft)}
.day-ep-thumb{width:32px;height:46px;border-radius:6px;object-fit:cover;flex-shrink:0}
.day-ep-thumb-ph{width:32px;height:46px;border-radius:6px;background:var(--accent-soft);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.day-ep-info{flex:1;min-width:0}
.day-ep-name{font-size:14px;font-weight:700;color:var(--text)}
.day-ep-meta{font-size:12px;color:var(--muted)}
.upcoming-detail-img{width:100%;aspect-ratio:2/3;max-height:320px;object-fit:cover;object-position:top center;border-radius:18px 18px 0 0;display:block}
.upcoming-detail-img-ph{width:100%;height:180px;background:linear-gradient(135deg,var(--lavender-soft),var(--accent-soft));border-radius:18px 18px 0 0;display:flex;align-items:center;justify-content:center;font-size:40px}

/* Book info */
.book-block{display:flex;align-items:flex-start;gap:12px;background:#fdf3d8;border-radius:10px;padding:10px 12px;margin-bottom:12px;border:1px solid rgba(176,138,0,0.2)}
.book-cover{width:48px;height:70px;border-radius:6px;object-fit:cover;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.12)}
.book-cover-ph{width:48px;height:70px;border-radius:6px;background:#f0e0a0;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.book-info{flex:1;min-width:0}
.book-title-text{font-size:13px;font-weight:700;color:#7a5a00;line-height:1.3;margin-bottom:4px}
.book-link{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;color:#b08a00;text-decoration:none;background:rgba(176,138,0,0.12);border-radius:20px;padding:3px 10px;border:1px solid rgba(176,138,0,0.25);transition:all .15s}
.book-link:hover{background:rgba(176,138,0,0.22);color:#7a5a00}
.book-editions-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}
.book-edition-pill{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;color:#7a5a00;text-decoration:none;background:rgba(176,138,0,0.1);border-radius:20px;padding:3px 10px;border:1px solid rgba(176,138,0,0.25);transition:all .15s;white-space:nowrap}
.book-edition-pill:hover{background:rgba(176,138,0,0.22);transform:translateY(-1px);box-shadow:0 3px 8px rgba(176,138,0,0.18)}
.book-edition-flag{font-size:13px}
.book-edition-store{font-size:10px;opacity:.85}
.book-type-tag{display:inline-block;background:var(--accent);color:#fff;font-size:9px;padding:1px 6px;border-radius:10px;font-weight:700;margin-left:3px;vertical-align:middle}
.network-link{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;color:var(--accent);text-decoration:none;background:var(--accent-soft);border-radius:20px;padding:4px 12px;border:1.5px solid var(--border2);transition:all .15s;margin-bottom:4px}
.network-link:hover{background:var(--accent2);color:#fff;border-color:var(--accent2)}
.watch-links{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}
.watch-link{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--accent);text-decoration:none;background:var(--accent-soft);border-radius:20px;padding:6px 14px;border:1.5px solid var(--border2);transition:all .15s;white-space:nowrap}
.watch-link:hover{background:var(--accent);color:#fff;border-color:var(--accent);transform:translateY(-1px);box-shadow:0 4px 12px rgba(212,96,138,0.22)}
.watch-link-icon{font-size:14px}
.watch-links-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:6px}

/* Movies */
.movies-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px}
.movie-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:all .2s;position:relative;display:flex;flex-direction:column}
.movie-card:hover{border-color:var(--lavender);box-shadow:0 8px 28px rgba(155,130,201,0.18);transform:translateY(-2px)}
.movie-card-poster{width:100%;height:200px;object-fit:cover;display:block;background:var(--lavender-soft)}
.movie-card-poster-ph{width:100%;height:200px;background:linear-gradient(135deg,var(--lavender-soft) 0%,var(--accent-soft) 100%);display:flex;align-items:center;justify-content:center;font-size:36px;color:var(--lavender)}
.movie-card-body{padding:12px;flex:1;display:flex;flex-direction:column}
.movie-card-name{font-size:14px;font-weight:700;color:var(--text);line-height:1.3;margin-bottom:4px}
.movie-card-meta{font-size:11px;color:var(--muted);line-height:1.5}
.movie-card-date{font-size:11px;color:var(--lavender);font-weight:600;margin-top:5px}
.movie-card-watch{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
@media(max-width:480px){
  .movies-grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .movie-card-poster,.movie-card-poster-ph{height:160px}
  .movie-card-body{padding:9px}
  .movie-card-name{font-size:13px}
}
/* Series subtabs */
.subtabs{display:flex;gap:4px;margin-bottom:1.25rem;background:var(--surface2);border-radius:20px;padding:4px;width:fit-content;border:1.5px solid var(--border)}
.subtab{padding:5px 16px;border-radius:14px;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);background:transparent;border:none;font-family:'Nunito',sans-serif;transition:all .15s;display:flex;align-items:center;gap:5px}
.subtab.active{background:var(--surface);color:var(--accent);box-shadow:0 2px 8px rgba(212,96,138,0.12)}
.subtab:hover:not(.active){color:var(--text)}
.subtab-count{font-size:11px;background:var(--accent-soft);color:var(--accent);border-radius:20px;padding:1px 7px;font-weight:700}
.subtab.active .subtab-count{background:var(--accent);color:#fff}

/* Search bar */
.search-wrap{margin-bottom:1.25rem;position:relative}
.search-input{width:100%;padding:10px 16px 10px 40px;border-radius:20px;border:1.5px solid var(--border2);background:var(--surface);color:var(--text);font-size:14px;font-family:'Nunito',sans-serif;outline:none;transition:border-color .15s}
.search-input:focus{border-color:var(--accent)}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none}
.search-empty{text-align:center;color:var(--muted);padding:2rem;font-size:13px}

/* Trailer */
.trailer-btn{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;color:#fff;text-decoration:none;background:#e05a5a;border-radius:20px;padding:4px 12px;border:none;cursor:pointer;margin-bottom:12px;font-family:'Nunito',sans-serif;transition:opacity .15s}
.trailer-btn:hover{opacity:.85}
.trailer-wrap{position:relative;width:100%;padding-bottom:56.25%;height:0;border-radius:10px;overflow:hidden;margin-bottom:12px}
.trailer-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none}

/* Books filters */
.books-toolbar{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:1.25rem;align-items:center}
.books-toolbar .search-wrap{margin-bottom:0;flex:1;min-width:180px}
.filter-group{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.filter-label{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
.filter-select{padding:7px 12px;border-radius:20px;border:1.5px solid var(--border2);background:var(--surface);color:var(--text);font-size:13px;font-family:'Nunito',sans-serif;font-weight:600;outline:none;cursor:pointer;transition:border-color .15s}
.filter-select:focus{border-color:var(--accent)}
.alpha-bar{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:1.25rem}
.alpha-btn{width:28px;height:28px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface);color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s;display:flex;align-items:center;justify-content:center}
.alpha-btn:hover:not(.alpha-active):not(.alpha-disabled){border-color:var(--accent2);color:var(--accent);background:var(--accent-soft)}
.alpha-btn.alpha-active{background:var(--accent);border-color:var(--accent);color:#fff}
.alpha-btn.alpha-disabled{opacity:.28;cursor:default}
.books-count{font-size:12px;color:var(--muted);margin-bottom:1rem}
.books-count strong{color:var(--text)}

/* Books */
.books-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
.book-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:default;transition:all .2s;display:flex;flex-direction:column}
.book-card:hover{border-color:#c9a227;box-shadow:0 8px 28px rgba(176,138,0,0.15);transform:translateY(-2px)}
.book-card-cover{width:100%;height:240px;object-fit:cover;display:block;background:linear-gradient(135deg,#fdf3d8,#f0e0a0)}
.book-card-cover-ph{width:100%;height:240px;background:linear-gradient(135deg,#fdf3d8 0%,#f0e0a0 100%);display:flex;align-items:center;justify-content:center;font-size:52px}
.book-card-body{padding:12px;flex:1;display:flex;flex-direction:column;gap:5px}
.book-card-title{font-size:14px;font-weight:700;color:#7a5a00;line-height:1.3}
.book-card-series{font-size:11px;color:var(--muted)}
.book-card-series strong{color:var(--text)}
@media(max-width:480px){
  .books-grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .book-card-cover,.book-card-cover-ph{height:180px;font-size:36px}
  .book-card-body{padding:9px}
  .book-card-title{font-size:13px}
  .book-edition-pill{font-size:10px;padding:2px 7px}
  .alpha-btn{width:24px;height:24px;font-size:11px;border-radius:6px}
  .filter-select{font-size:12px;padding:6px 10px}
}
</style>
</head>
<body>
<div class="petal">🌸</div><div class="petal">🌷</div><div class="petal">🌸</div><div class="petal">🌺</div><div class="petal">🌸</div>

<div class="topbar">
  <div class="logo-wrap">
    <span class="logo">🌸 TINTA SAPPHIC</span>
    <span class="logo-sub">GL Series & Películas · Seguimiento de emisiones</span>
  </div>
  <span class="update-badge" id="updateBadge"></span>
</div>

<div class="container">
  <div class="page-header">
    <h1 class="page-title">TINTA SAPPHIC <span>~ GL Series & Películas</span></h1>
    <p class="page-desc">Calendario de series en emisión y películas, e información de las series asiáticas y occidentales donde las protagonistas son sáficas 💕</p>
  </div>

  <div class="stats-bar" id="statsBar"></div>

  <div class="tabs">
    <button class="tab active" id="tabCal" onclick="switchTab('cal')">📅 Calendario</button>
    <button class="tab" id="tabList" onclick="switchTab('list')">🎬 Series</button>
    <button class="tab" id="tabMovies" onclick="switchTab('movies')">🎥 Películas</button>
    <button class="tab" id="tabUpcoming" onclick="switchTab('upcoming')">✨ Próximamente</button>
    <button class="tab" id="tabBooks" onclick="switchTab('books')">📚 Libros</button>
  </div>

  <div id="viewCal">
    <div class="cal-nav">
      <div class="month-display" id="monthDisplay"></div>
      <div class="nav-btns">
        <button class="nav-btn" id="prevBtn">← Anterior</button>
        <button class="nav-btn" id="todayBtn">Hoy</button>
        <button class="nav-btn" id="nextBtn">Siguiente →</button>
      </div>
    </div>
    <div id="calInner"><div class="loading">🌸 Cargando…</div></div>
  </div>
  <div id="viewList" style="display:none"></div>
  <div id="viewMovies" style="display:none"></div>
  <div id="viewUpcoming" style="display:none"></div>
  <div id="viewBooks" style="display:none"></div>
</div>

<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalBox"></div>
</div>

<script>
const MONTHS=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DAYS=['L','M','X','J','V','S','D'];
const DAYS_L=['lunes','martes','miércoles','jueves','viernes','sábado','domingo'];
const PALETTE=['#d4608a','#5bbcb0','#9b82c9','#e8a84a','#e06fa0','#4eadb5','#b07ad4','#d47a4e'];
const PALETTE_SOFT=['rgba(212,96,138,0.13)','rgba(91,188,176,0.13)','rgba(155,130,201,0.13)','rgba(232,168,74,0.13)','rgba(224,111,160,0.13)','rgba(78,173,181,0.13)','rgba(176,122,212,0.13)','rgba(212,122,78,0.13)'];

let state={month:new Date().getMonth(),year:new Date().getFullYear(),tab:'cal',series:[],movies:[]};

function getDow(d){return(new Date(d+'T12:00:00').getDay()+6)%7}
function addDays(d,n){const x=new Date(d+'T12:00:00');x.setDate(x.getDate()+n);return x.toISOString().slice(0,10)}
function fmtDate(d){const x=new Date(d+'T12:00:00');return`${x.getDate()} ${MONTHS[x.getMonth()].slice(0,3)} ${x.getFullYear()}`}
function toStr(y,m,d){return`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`}
function getEmissionDays(s){if(s.emissionDays&&s.emissionDays.length>0)return[...s.emissionDays].sort((a,b)=>a-b);if(s.dayOfWeek!==undefined)return[s.dayOfWeek];return[0]}

function genEps(s){
  const days=getEmissionDays(s), skipDates=new Set(s.skipDates||[]), epOverrides=s.episodes||[];
  let firstDate=null;
  for(let o=0;o<14;o++){const c=addDays(s.startDate,o);if(days.includes(getDow(c))){firstDate=c;break;}}
  if(!firstDate) firstDate=s.startDate;
  const weekStart=addDays(firstDate,-getDow(firstDate));
  const slots=[], wn=Math.ceil((s.totalEpisodes+(skipDates.size||0))/days.length)+4;
  for(let w=0;w<wn&&slots.length<s.totalEpisodes+skipDates.size+10;w++){
    for(const d of days){const date=addDays(weekStart,d+w*7);if(date>=firstDate)slots.push(date);}
  }
  const valid=slots.filter(d=>!skipDates.has(d));
  const eps=[];
  for(let i=0;i<s.totalEpisodes;i++){
    const epNum=i+1, base=valid[i]||addDays(firstDate,i*7);
    const ov=epOverrides.find(e=>e.num===epNum);
    eps.push(ov?{...ov}:{num:epNum,date:base,skipped:false});
  }
  return eps;
}

async function loadData(){
  try{
    const r=await fetch('data.json?t='+Date.now());
    if(!r.ok) throw new Error('No se encontró data.json (código '+r.status+')');
    const d=await r.json();
    state.series=d.series||[];
    state.movies=d.movies||[];
    if(d.exportedAt){
      const dt=new Date(d.exportedAt);
      document.getElementById('updateBadge').textContent='✓ Act. '+dt.toLocaleDateString('es-ES',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
    }
    return true;
  }catch(e){
    document.getElementById('calInner').innerHTML=`<div class="error-box"><strong>No se pudo cargar el calendario.</strong><br>Asegúrate de que <code>data.json</code> está en la misma carpeta.<br>Error: ${e.message}</div>`;
    return false;
  }
}

function renderStats(){
  const activeSeries=state.series.filter(s=>!s.upcoming);
  const now=new Date();
  const totalEps=activeSeries.reduce((a,s)=>a+s.totalEpisodes,0);
  const airedEps=activeSeries.reduce((a,s)=>{ const eps=genEps(s); return a+eps.filter(e=>new Date(e.date+'T12:00:00')<=now&&!e.skipped).length; },0);
  const upcoming=state.series.filter(s=>s.upcoming).length;
  const bookBased=state.series.filter(s=>s.basedOnBook).length;
  const movieCount=state.movies.length;
  document.getElementById('statsBar').innerHTML=`
    <div class="stat-card"><div class="stat-num">${activeSeries.length}</div><div class="stat-label">Series activas</div></div>
    <div class="stat-card"><div class="stat-num">${airedEps}</div><div class="stat-label">Episodios emitidos</div></div>
    <div class="stat-card"><div class="stat-num">${totalEps-airedEps}</div><div class="stat-label">Episodios pendientes</div></div>
    ${movieCount?`<div class="stat-card"><div class="stat-num" style="color:var(--lavender)">${movieCount}</div><div class="stat-label">Películas</div></div>`:''}
    ${upcoming?`<div class="stat-card"><div class="stat-num" style="color:var(--lavender)">${upcoming}</div><div class="stat-label">Próximamente</div></div>`:''}
    ${bookBased?`<div class="stat-card"><div class="stat-num" style="color:#b08a00">${bookBased}</div><div class="stat-label">Basadas en libro</div></div>`:''}
  `;
}

function getEpMap(y,m){
  const map={};
  state.series.filter(s=>!s.upcoming).forEach((s,si)=>{
    genEps(s).forEach(ep=>{
      const d=new Date(ep.date+'T12:00:00');
      if(d.getFullYear()===y&&d.getMonth()===m){
        if(!map[ep.date]) map[ep.date]=[];
        map[ep.date].push({s,ep,si,type:'series'});
      }
    });
  });
  state.movies.forEach((mv,mi)=>{
    if(!mv.date) return;
    const d=new Date(mv.date+'T12:00:00');
    if(d.getFullYear()===y&&d.getMonth()===m){
      if(!map[mv.date]) map[mv.date]=[];
      map[mv.date].push({s:mv,ep:{num:null,date:mv.date,skipped:false},si:mi,type:'movie'});
    }
  });
  return map;
}

function renderCal(){
  const {month:m,year:y}=state;
  document.getElementById('monthDisplay').innerHTML=`<span>${MONTHS[m]}</span> ${y}`;
  const epMap=getEpMap(y,m);
  const first=new Date(y,m,1), startDow=(first.getDay()+6)%7;
  const dim=new Date(y,m+1,0).getDate(), prevDim=new Date(y,m,0).getDate();
  const tStr=toStr(new Date().getFullYear(),new Date().getMonth(),new Date().getDate());
  let html='<div class="cal-wrap"><div class="cal-grid">';
  DAYS.forEach(d=>{html+=`<div class="day-header">${d}</div>`;});
  for(let i=startDow-1;i>=0;i--)
    html+=`<div class="day-cell other-month"><div class="day-num">${prevDim-i}</div></div>`;
  for(let d=1;d<=dim;d++){
    const ds=toStr(y,m,d), eps=epMap[ds]||[], isToday=ds===tStr;
    html+=`<div class="day-cell${isToday?' today':''}${eps.length?' has-eps':''}" ${eps.length?`onclick="openDay('${ds}')"`:''}><div class="day-num">${d}</div>`;
    eps.slice(0,3).forEach(({s,ep,si,type})=>{
      if(type==='movie'){
        const bg='rgba(155,130,201,0.15)';
        const thumb=s.poster?`<img class="ep-thumb" src="${s.poster}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`:'' ;
        const ph=`<div class="ep-thumb-ph" style="${s.poster?'display:none':''}background:${bg}">🎥</div>`;
        html+=`<div class="ep-pill movie-pill" style="background:${bg}">
          ${thumb}${ph}
          <div class="ep-pill-text" style="color:var(--lavender)">
            <div class="ep-pill-name">${s.name}</div>
            <div class="ep-pill-ep">🎥 Película</div>
          </div></div>`;
      } else {
        const col=PALETTE[si%PALETTE.length], bg=PALETTE_SOFT[si%PALETTE_SOFT.length];
        const thumb=s.poster?`<img class="ep-thumb" src="${s.poster}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`:'' ;
        const ph=`<div class="ep-thumb-ph" style="${s.poster?'display:none':''}background:${bg}">🎬</div>`;
        html+=`<div class="ep-pill${ep.skipped?' skipped':''}" style="background:${bg}">
          ${thumb}${ph}
          <div class="ep-pill-text" style="color:${col}">
            <div class="ep-pill-name">${s.name}</div>
            <div class="ep-pill-ep">Ep. ${ep.num}${ep.skipped?' · ✗':''}</div>
          </div></div>`;
      }
    });
    if(eps.length>3) html+=`<div style="font-size:10px;color:var(--muted);padding:2px 4px">+${eps.length-3} más</div>`;
    html+='</div>';
  }
  const rem=(7-(startDow+dim)%7)%7;
  for(let d=1;d<=rem;d++) html+=`<div class="day-cell other-month"><div class="day-num">${d}</div></div>`;
  html+='</div></div>';
  document.getElementById('calInner').innerHTML=html;
}

function seriesCardHtml(s, si){
  const now=new Date();
  const eps=genEps(s);
  const aired=eps.filter(e=>new Date(e.date+'T12:00:00')<=now&&!e.skipped).length;
  const pct=Math.round(aired/s.totalEpisodes*100);
  const col=PALETTE[si%PALETTE.length];
  const next=eps.find(e=>new Date(e.date+'T12:00:00')>now&&!e.skipped);
  const days=getEmissionDays(s).map(d=>DAYS_L[d]).join(' y ');
  const posterEl=s.poster?`<img class="series-card-poster" src="${s.poster}" alt="${s.name}" onerror="this.outerHTML='<div class=series-card-poster-ph>🎬</div>'">`:`<div class="series-card-poster-ph">🎬</div>`;
  const links=s.watchLinks&&s.watchLinks.length?s.watchLinks:(s.networkUrl?[{name:s.network||'Ver serie',url:s.networkUrl}]:[]);
  const watchRow=links.length?`<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:4px">${links.map(l=>`<a class="card-watch-pill" href="${l.url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">▶ ${l.name}</a>`).join('')}</div>`:'';
  return `<div class="series-card" onclick="openSeries(${si})">
    ${posterEl}
    <div class="series-card-body">
      <div class="card-badges">${s.basedOnBook?'<span class="badge badge-book">📖 Libro</span>':''}${s.country?`<span class="badge" style="background:var(--surface2);color:var(--muted)">${s.country}</span>`:''}</div>
      <div class="series-card-name">${s.name}</div>
      <div class="series-card-meta">${s.network?s.network+' · ':''}${days}</div>
      ${watchRow}
      ${next?`<div class="series-card-next">▶ Ep. ${next.num} — ${fmtDate(next.date)}</div>`:`<div class="series-card-done">✓ Finalizada</div>`}
      <div class="progress-wrap"><div class="progress-fill" style="width:${pct}%;background:${col}"></div></div>
      <div style="font-size:10px;color:var(--muted);margin-top:3px">${aired}/${s.totalEpisodes} emitidos</div>
      ${s.basedOnBook&&s.bookCoverUrl?`<div style="margin-top:8px;display:flex;align-items:center;gap:6px"><img src="${s.bookCoverUrl}" style="width:28px;height:40px;border-radius:4px;object-fit:cover;box-shadow:0 1px 4px rgba(0,0,0,.1)" onerror="this.style.display='none'">${s.bookUrl?`<a href="${s.bookUrl}" target="_blank" rel="noopener" style="font-size:10px;color:#b08a00;font-weight:600;text-decoration:none" onclick="event.stopPropagation()">📖 Ver libro</a>`:''}${!s.bookUrl&&s.bookSource?`<span style="font-size:10px;color:#b08a00;font-weight:600">${s.bookSource}</span>`:''}</div>`:''}
    </div>
  </div>`;
}

let seriesSubtab='airing';
let seriesFilters={q:'',country:'',sort:'az',book:'all'};

function switchSeriesSubtab(sub){ seriesSubtab=sub; renderList(); }

function getCountries(arr){ return [...new Set(arr.map(s=>s.country).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'es')); }

function applySeriesFilters(arr){
  let r=[...arr];
  const q=seriesFilters.q.toLowerCase().trim();
  if(q) r=r.filter(s=>s.name.toLowerCase().includes(q)||(s.country||'').toLowerCase().includes(q)||(s.network||'').toLowerCase().includes(q));
  if(seriesFilters.country) r=r.filter(s=>s.country===seriesFilters.country);
  if(seriesFilters.book==='yes') r=r.filter(s=>s.basedOnBook);
  if(seriesFilters.book==='no') r=r.filter(s=>!s.basedOnBook);
  if(seriesFilters.sort==='az') r.sort((a,b)=>a.name.localeCompare(b.name,'es'));
  else if(seriesFilters.sort==='za') r.sort((a,b)=>b.name.localeCompare(a.name,'es'));
  else if(seriesFilters.sort==='eps') r.sort((a,b)=>b.totalEpisodes-a.totalEpisodes);
  return r;
}

function renderList(){
  const view=document.getElementById('viewList');
  const active=state.series.filter(s=>!s.upcoming);
  const allCountries=getCountries(active);
  const filtered=applySeriesFilters(active);
  const now=new Date();
  const airing=filtered.filter(s=>{ const eps=genEps(s); return eps.some(e=>new Date(e.date+'T12:00:00')>now&&!e.skipped); });
  const finished=filtered.filter(s=>{ const eps=genEps(s); return !eps.some(e=>new Date(e.date+'T12:00:00')>now&&!e.skipped); });

  if(seriesFilters.q&&seriesSubtab==='airing'&&!airing.length&&finished.length) seriesSubtab='finished';
  if(seriesFilters.q&&seriesSubtab==='finished'&&!finished.length&&airing.length) seriesSubtab='airing';

  const countriesOpts=allCountries.map(c=>`<option value="${c}"${seriesFilters.country===c?' selected':''}>${c}</option>`).join('');

  let html=`<div class="books-toolbar">
    <div class="search-wrap" style="position:relative;margin-bottom:0">
      <span class="search-icon">🔍</span>
      <input class="search-input" placeholder="Buscar serie, país, plataforma…" value="${seriesFilters.q}" oninput="seriesFilters.q=this.value;renderList()">
    </div>
    <div class="filter-group">
      <span class="filter-label">País</span>
      <select class="filter-select" onchange="seriesFilters.country=this.value;renderList()">
        <option value=""${!seriesFilters.country?' selected':''}>Todos</option>${countriesOpts}
      </select>
    </div>
    <div class="filter-group">
      <span class="filter-label">Libro</span>
      <select class="filter-select" onchange="seriesFilters.book=this.value;renderList()">
        <option value="all"${seriesFilters.book==='all'?' selected':''}>Todos</option>
        <option value="yes"${seriesFilters.book==='yes'?' selected':''}>📖 Solo con libro</option>
        <option value="no"${seriesFilters.book==='no'?' selected':''}>Sin libro</option>
      </select>
    </div>
    <div class="filter-group">
      <span class="filter-label">Orden</span>
      <select class="filter-select" onchange="seriesFilters.sort=this.value;renderList()">
        <option value="az"${seriesFilters.sort==='az'?' selected':''}>A → Z</option>
        <option value="za"${seriesFilters.sort==='za'?' selected':''}>Z → A</option>
        <option value="eps"${seriesFilters.sort==='eps'?' selected':''}>Más episodios</option>
      </select>
    </div>
  </div>`;

  if(!filtered.length){
    html+='<div class="search-empty">No se encontró ninguna serie con esos filtros.</div>';
    view.innerHTML=html; return;
  }

  html+=`<div class="subtabs">
    <button class="subtab${seriesSubtab==='airing'?' active':''}" onclick="switchSeriesSubtab('airing')">
      🌸 En emisión<span class="subtab-count">${airing.length}</span>
    </button>
    <button class="subtab${seriesSubtab==='finished'?' active':''}" onclick="switchSeriesSubtab('finished')">
      ✓ Finalizadas<span class="subtab-count">${finished.length}</span>
    </button>
  </div>`;

  if(seriesSubtab==='airing'){
    if(airing.length){
      html+=`<div class="books-count">Mostrando <strong>${airing.length}</strong> serie${airing.length!==1?'s':''}</div><div class="series-grid">`;
      airing.forEach(s=>{ html+=seriesCardHtml(s, state.series.indexOf(s)); });
      html+='</div>';
    } else {
      html+='<div class="search-empty">No hay series en emisión con esos filtros.</div>';
    }
  } else {
    if(finished.length){
      html+=`<div class="books-count">Mostrando <strong>${finished.length}</strong> serie${finished.length!==1?'s':''}</div><div class="series-grid">`;
      finished.forEach(s=>{ html+=seriesCardHtml(s, state.series.indexOf(s)); });
      html+='</div>';
    } else {
      html+='<div class="search-empty">No hay series finalizadas con esos filtros.</div>';
    }
  }
  view.innerHTML=html;
}

let upcomingFilters={q:'',country:'',sort:'az',book:'all'};

function applyUpcomingFilters(arr){
  let r=[...arr];
  const q=upcomingFilters.q.toLowerCase().trim();
  if(q) r=r.filter(s=>s.name.toLowerCase().includes(q)||(s.country||'').toLowerCase().includes(q)||(s.network||'').toLowerCase().includes(q));
  if(upcomingFilters.country) r=r.filter(s=>s.country===upcomingFilters.country);
  if(upcomingFilters.book==='yes') r=r.filter(s=>s.basedOnBook);
  if(upcomingFilters.book==='no') r=r.filter(s=>!s.basedOnBook);
  if(upcomingFilters.sort==='az') r.sort((a,b)=>a.name.localeCompare(b.name,'es'));
  else if(upcomingFilters.sort==='za') r.sort((a,b)=>b.name.localeCompare(a.name,'es'));
  return r;
}

function renderUpcoming(){
  const allUpcoming=state.series.filter(s=>s.upcoming);
  const view=document.getElementById('viewUpcoming');
  if(!allUpcoming.length){view.innerHTML='<div class="empty">✨ No hay series próximamente de momento. ¡Pronto habrá novedades!</div>';return;}
  const allCountries=getCountries(allUpcoming);
  const countriesOpts=allCountries.map(c=>`<option value="${c}"${upcomingFilters.country===c?' selected':''}>${c}</option>`).join('');

let moviesFilters={q:'',country:'',sort:'date',book:'all'};

function applyMoviesFilters(arr){
  let r=[...arr];
  const q=moviesFilters.q.toLowerCase().trim();
  if(q) r=r.filter(mv=>mv.name.toLowerCase().includes(q)||(mv.country||'').toLowerCase().includes(q)||(mv.network||'').toLowerCase().includes(q));
  if(moviesFilters.country) r=r.filter(mv=>mv.country===moviesFilters.country);
  if(moviesFilters.book==='yes') r=r.filter(mv=>mv.basedOnBook);
  if(moviesFilters.book==='no') r=r.filter(mv=>!mv.basedOnBook);
  if(moviesFilters.sort==='az') r.sort((a,b)=>a.name.localeCompare(b.name,'es'));
  else if(moviesFilters.sort==='za') r.sort((a,b)=>b.name.localeCompare(a.name,'es'));
  else if(moviesFilters.sort==='date') r.sort((a,b)=>{if(!a.date&&!b.date)return 0;if(!a.date)return 1;if(!b.date)return-1;return a.date.localeCompare(b.date);});
  return r;
}

    </button>
    <button class="subtab${moviesSubtab==='soon'?' active':''}" onclick="switchMoviesSubtab('soon')">
      📅 Próximos estrenos<span class="subtab-count">${comingSoon.length}</span>
    </button>
  </div>`;

  if(!shown.length){
    html+='<div class="search-empty">No hay películas en esta categoría con esos filtros.</div>';
    view.innerHTML=html; return;
  }

  html+=`<div class="books-count">Mostrando <strong>${shown.length}</strong> película${shown.length!==1?'s':''}</div>
  <div class="movies-grid">`;
  shown.forEach(mv=>{ html+=movieCardHtml(mv); });
  html+='</div>';
  view.innerHTML=html;
}

function closeModal(){ document.getElementById('modalBg').classList.remove('open'); }

function getYoutubeId(url){
  if(!url) return null;
  const m=url.match(/(?:v=|youtu\.be\/|embed\/)([\w-]{11})/);
  return m?m[1]:null;
}
function trailerHtml(url){
  const id=getYoutubeId(url);
  if(!id) return '';
  return `<div class="trailer-wrap"><iframe src="https://www.youtube.com/embed/${id}" allowfullscreen loading="lazy"></iframe></div>`;
}

const LANG_META={es:{flag:'🇪🇸',label:'Español'},en:{flag:'🇬🇧',label:'English'},pt:{flag:'🇧🇷',label:'Português'},th:{flag:'🇹🇭',label:'ภาษาไทย'},ko:{flag:'🇰🇷',label:'한국어'},ja:{flag:'🇯🇵',label:'日本語'},zh:{flag:'🇨🇳',label:'中文'},fr:{flag:'🇫🇷',label:'Français'},de:{flag:'🇩🇪',label:'Deutsch'},it:{flag:'🇮🇹',label:'Italiano'},other:{flag:'🌐',label:'Otro'}};
function langFlag(val){return (LANG_META[val]||{flag:'🌐'}).flag;}
function langLabel(val){return (LANG_META[val]||{label:val}).label;}

function getAllBooks(){
  const books=[];
  state.series.forEach((s,i)=>{
    if(s.basedOnBook&&(s.bookSource||s.bookCoverUrl)){
      const editions=s.bookLinks&&s.bookLinks.length?s.bookLinks:(s.bookUrl?[{lang:'es',store:'Amazon',url:s.bookUrl}]:[]);
      books.push({title:s.bookSource||'Libro',cover:s.bookCoverUrl||'',editions,seriesName:s.name,type:'serie',order:i});
    }
  });
  (state.movies||[]).forEach((mv,i)=>{
    if(mv.basedOnBook&&(mv.bookSource||mv.bookCoverUrl)){
      const editions=mv.bookLinks&&mv.bookLinks.length?mv.bookLinks:(mv.bookUrl?[{lang:'es',store:'Amazon',url:mv.bookUrl}]:[]);
      books.push({title:mv.bookSource||'Libro',cover:mv.bookCoverUrl||'',editions,seriesName:mv.name,type:'película',order:1000+i});
    }
  });
  return books;
}

function renderBooks(){
  const view=document.getElementById('viewBooks');
  const allBooks=getAllBooks();
  if(!allBooks.length){
    view.innerHTML='<div class="empty">📚 Todavía no hay libros. Marca series como "basada en libro" en el admin para que aparezcan aquí.</div>';
    return;
  }

  const usedLetters=new Set(allBooks.map(b=>b.title[0]?.toUpperCase()).filter(Boolean));
  const ALPHABET='ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');

  let books=[...allBooks];
  const q=booksState.q.toLowerCase().trim();
  if(q) books=books.filter(b=>b.title.toLowerCase().includes(q)||b.seriesName.toLowerCase().includes(q));
  if(booksState.type!=='all') books=books.filter(b=>b.type===booksState.type);
  if(booksState.letter) books=books.filter(b=>b.title[0]?.toUpperCase()===booksState.letter);

  if(booksState.sort==='az') books.sort((a,b)=>a.title.localeCompare(b.title,'es'));
  else if(booksState.sort==='za') books.sort((a,b)=>b.title.localeCompare(a.title,'es'));
  else if(booksState.sort==='serie') books.sort((a,b)=>a.seriesName.localeCompare(b.seriesName,'es'));
  else if(booksState.sort==='pub') books.sort((a,b)=>a.order-b.order);

  let html=`<div class="section-heading" style="margin-bottom:.25rem">📚 Fuentes literarias</div>
  <p class="section-desc" style="margin-bottom:.85rem">Libros, novelas y manhwas en los que se basan las series y películas de la lista.</p>

  <div class="books-toolbar">
    <div class="search-wrap" style="position:relative">
      <span class="search-icon">🔍</span>
      <input class="search-input" placeholder="Buscar libro o serie…" value="${booksState.q}" oninput="booksState.q=this.value;renderBooks()">
    </div>
    <div class="filter-group">
      <span class="filter-label">Tipo</span>
      <select class="filter-select" onchange="booksState.type=this.value;renderBooks()">
        <option value="all"${booksState.type==='all'?' selected':''}>Todos</option>
        <option value="serie"${booksState.type==='serie'?' selected':''}>Series</option>
        <option value="película"${booksState.type==='película'?' selected':''}>Películas</option>
      </select>
    </div>
    <div class="filter-group">
      <span class="filter-label">Orden</span>
      <select class="filter-select" onchange="booksState.sort=this.value;renderBooks()">
        <option value="az"${booksState.sort==='az'?' selected':''}>A → Z</option>
        <option value="za"${booksState.sort==='za'?' selected':''}>Z → A</option>
        <option value="serie"${booksState.sort==='serie'?' selected':''}>Por serie</option>
        <option value="pub"${booksState.sort==='pub'?' selected':''}>Orden de la lista</option>
      </select>
    </div>
  </div>

  <div class="alpha-bar">
    <button class="alpha-btn${!booksState.letter?' alpha-active':''}" onclick="booksState.letter='';renderBooks()" title="Todos">Todas</button>
    ${ALPHABET.map(l=>{
      const has=usedLetters.has(l);
      return `<button class="alpha-btn${booksState.letter===l?' alpha-active':''}${!has?' alpha-disabled':''}" onclick="${has?`booksState.letter=booksState.letter==='${l}'?'':'${l}';renderBooks()`:''}" title="${l}">${l}</button>`;
    }).join('')}
  </div>`;

  if(!books.length){
    html+='<div class="search-empty">No se encontró ningún libro con esos criterios.</div>';
    view.innerHTML=html; return;
  }

  html+=`<div class="books-count">Mostrando <strong>${books.length}</strong> de <strong>${allBooks.length}</strong> libro${allBooks.length!==1?'s':''}</div>`;
  html+='<div class="books-grid">';
  books.forEach(b=>{
    const coverEl=b.cover?`<img class="book-card-cover" src="${b.cover}" alt="${b.title}" onerror="this.outerHTML='<div class=book-card-cover-ph>📖</div>'">`:`<div class="book-card-cover-ph">📖</div>`;
    const editionPills=b.editions.map(e=>`<a class="book-edition-pill" href="${e.url}" target="_blank" rel="noopener"><span class="book-edition-flag">${langFlag(e.lang)}</span><span class="book-edition-store">${e.store}</span></a>`).join('');
    html+=`<div class="book-card">
      ${coverEl}
      <div class="book-card-body">
        <div class="book-card-title">${b.title}</div>
        <div class="book-card-series">Adaptada en <strong>${b.seriesName}</strong> <span class="book-type-tag">${b.type}</span></div>
        ${b.editions.length?`<div class="book-editions-row">${editionPills}</div>`:''}
      </div>
    </div>`;
  });
  html+='</div>';
  view.innerHTML=html;
}
function switchTab(tab){
  state.tab=tab;
  ['cal','list','movies','upcoming','books'].forEach(t=>{
    const btn=document.getElementById('tab'+t.charAt(0).toUpperCase()+t.slice(1));
    const view=document.getElementById('view'+t.charAt(0).toUpperCase()+t.slice(1));
    if(btn) btn.className='tab'+(tab===t?' active':'');
    if(view) view.style.display=tab===t?'':'none';
  });
  if(tab==='list') renderList();
  if(tab==='movies') renderMovies();
  if(tab==='upcoming') renderUpcoming();
  if(tab==='books') renderBooks();
}

document.getElementById('prevBtn').onclick=()=>{state.month--;if(state.month<0){state.month=11;state.year--;}renderCal();};
document.getElementById('nextBtn').onclick=()=>{state.month++;if(state.month>11){state.month=0;state.year++;}renderCal();};
document.getElementById('todayBtn').onclick=()=>{state.month=new Date().getMonth();state.year=new Date().getFullYear();renderCal();};

(async()=>{ if(await loadData()){renderStats();renderCal();} })();
</script>
</body>
