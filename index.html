<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TINTA SAPPHIC ~ GL Series & PelГ­culas</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600;1,700;1,800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #faf5f8;
  --surface: #ffffff;
  --surface2: #fdf0f6;
  --surface3: #f8eaf3;
  --border: rgba(210,140,175,0.15);
  --border2: rgba(210,140,175,0.35);
  --text: #2d1f2b;
  --muted: #8a6878;
  --accent: #c94f7c;
  --accent2: #e07aa0;
  --accent-soft: #fce8f1;
  --teal: #4aada0;
  --teal-soft: #d0ede9;
  --lavender: #8b72be;
  --lavender-soft: #ede8f8;
  --gold: #b08030;
  --gold-soft: #fdf2d8;
  --radius: 16px;
  --radius-lg: 22px;
  --shadow-sm: 0 2px 12px rgba(180,80,120,0.08);
  --shadow-md: 0 6px 28px rgba(180,80,120,0.13);
  --shadow-lg: 0 16px 52px rgba(180,80,120,0.18);
  --font-display: 'Playfair Display', Georgia, serif;
  --font-body: 'DM Sans', system-ui, sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:14px;line-height:1.6;min-height:100vh}

/* Background atmosphere */
body::before{content:'';position:fixed;inset:0;background:
  radial-gradient(ellipse at 8% 10%,rgba(201,79,124,0.06) 0%,transparent 50%),
  radial-gradient(ellipse at 92% 90%,rgba(139,114,190,0.07) 0%,transparent 50%),
  radial-gradient(ellipse at 50% 50%,rgba(74,173,160,0.03) 0%,transparent 60%);
  pointer-events:none;z-index:0}

/* Sin orbes ni pГ©talos flotantes */
.petal{display:none}


/* в•ђв•ђв•ђ NAVBAR в•ђв•ђв•ђ */
.navbar{
  background:rgba(255,255,255,0.96);
  border-bottom:1px solid var(--border2);
  position:sticky;top:0;z-index:50;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  box-shadow:0 1px 0 var(--border),0 2px 16px rgba(180,80,120,0.05);
}
.navbar-inner{
  max-width:1200px;margin:0 auto;
  padding:0 2rem;
  height:58px;
  display:flex;align-items:center;gap:0;
}
/* Logo */
.logo{
  font-family:var(--font-display);font-size:19px;font-weight:400;
  color:var(--text);letter-spacing:.01em;line-height:1;
  display:flex;align-items:baseline;gap:.28em;position:relative;
}
.logo-tinta{font-weight:700;letter-spacing:.13em;font-size:.92em;text-transform:uppercase;color:var(--text)}
.logo em{font-style:italic;font-weight:600;font-size:1.05em;color:var(--accent);letter-spacing:-.01em}
.logo::after{
  content:'';position:absolute;bottom:-3px;left:0;right:0;height:1.5px;
  background:linear-gradient(90deg,var(--accent) 0%,var(--lavender) 55%,rgba(74,173,160,0.4) 100%);
  border-radius:2px;
}
.logo-divider{width:1px;height:18px;background:var(--border2);margin:0 12px;flex-shrink:0}
.logo-sub{font-size:10px;font-weight:500;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;flex-shrink:0;margin-right:28px}

/* Nav links */
.navbar-links{display:flex;align-items:center;gap:2px;flex:1}
.nav-link{
  padding:6px 13px;border-radius:8px;border:none;cursor:pointer;
  font-size:13px;font-weight:500;color:var(--muted);
  background:transparent;font-family:var(--font-body);
  transition:all .15s;white-space:nowrap;
  display:flex;align-items:center;gap:3px;
  line-height:1;
}
.nav-link:hover{color:var(--text);background:var(--surface2)}
.nav-link.active{color:var(--accent);font-weight:700;background:var(--accent-soft)}

/* Picks dropdown */
.nav-picks-wrap{position:relative;flex-shrink:0}
.nav-picks-btn{} /* inherits .nav-link */
.nav-picks-drop{
  position:absolute;top:calc(100% + 8px);left:0;
  background:var(--surface);border:1.5px solid var(--border2);
  border-radius:12px;box-shadow:var(--shadow-md);
  min-width:170px;z-index:200;
  display:none;flex-direction:column;overflow:hidden;padding:4px;
}
.nav-picks-drop.open{display:flex}
.nav-picks-item{
  display:flex;align-items:center;gap:8px;
  padding:9px 14px;font-size:13px;font-weight:600;
  color:var(--text);cursor:pointer;transition:background .12s;
  border:none;background:transparent;font-family:var(--font-body);
  text-align:left;width:100%;border-radius:8px;
}
.nav-picks-item:hover{background:var(--surface2);color:var(--accent)}
.nav-picks-item.active{background:var(--accent-soft);color:var(--accent)}

/* MГЎs dropdown */
.tab-more-wrap{position:relative;flex-shrink:0}
.tab-more-drop{
  position:absolute;top:calc(100% + 8px);left:0;
  background:var(--surface);border:1.5px solid var(--border2);
  border-radius:12px;box-shadow:var(--shadow-md);
  min-width:170px;z-index:200;
  display:none;flex-direction:column;overflow:hidden;padding:4px;
}
.tab-more-drop.open{display:flex}
.tab-more-item{
  display:flex;align-items:center;gap:8px;
  padding:9px 14px;font-size:13px;font-weight:600;
  color:var(--text);cursor:pointer;transition:background .12s;
  border:none;background:transparent;font-family:var(--font-body);
  text-align:left;width:100%;border-radius:8px;
}
.tab-more-item:hover{background:var(--surface2);color:var(--accent)}
.tab-more-item.active{background:var(--accent-soft);color:var(--accent)}

/* Right: search + X */
.navbar-right{display:flex;align-items:center;gap:10px;margin-left:auto;flex-shrink:0}
.navbar-search-wrap{
  position:relative;display:flex;align-items:center;
  background:var(--surface2);border:1.5px solid var(--border2);
  border-radius:20px;padding:0 14px;gap:7px;
  transition:border-color .15s,box-shadow .15s;
}
.navbar-search-wrap:focus-within{border-color:var(--accent2);box-shadow:0 0 0 3px rgba(201,79,124,0.1);background:#fff}
.navbar-search-icon{color:var(--muted);flex-shrink:0;pointer-events:none}
.navbar-search-inp{
  border:none;background:transparent;outline:none;
  font-size:13px;font-family:var(--font-body);color:var(--text);
  width:190px;padding:7px 0;
}
.navbar-search-inp::placeholder{color:var(--muted)}
.navbar-search-results{
  position:absolute;top:calc(100% + 8px);left:0;right:0;
  background:var(--surface);border:1.5px solid var(--border2);
  border-radius:12px;box-shadow:var(--shadow-md);
  max-height:360px;overflow-y:auto;z-index:300;
  display:flex;flex-direction:column;
}
.nsearch-item{
  display:flex;align-items:center;gap:10px;padding:9px 14px;
  cursor:pointer;transition:background .12s;border-bottom:1px solid var(--border);
  font-size:13px;
}
.nsearch-item:last-child{border-bottom:none}
.nsearch-item:hover{background:var(--surface2)}
.nsearch-item img,.nsearch-item-ph{
  width:28px;height:42px;border-radius:5px;object-fit:cover;flex-shrink:0;
}
.nsearch-item-ph{background:var(--accent-soft);display:flex;align-items:center;justify-content:center;font-size:14px}
.nsearch-item-info{flex:1;min-width:0}
.nsearch-item-name{font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nsearch-item-meta{font-size:11px;color:var(--muted)}
.nsearch-empty{padding:20px;text-align:center;color:var(--muted);font-size:13px}

/* Hamburger for mobile */
.navbar-hamburger{
  display:none;flex-direction:column;gap:5px;
  background:none;border:none;cursor:pointer;padding:8px;margin-left:8px;
  flex-shrink:0;
}
.navbar-hamburger span{display:block;width:22px;height:2px;background:var(--text);border-radius:2px;transition:all .2s}

/* X icon button */
.navbar-x-btn{
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  color:var(--muted);border:1.5px solid var(--border2);
  background:var(--surface);text-decoration:none;
  transition:all .18s;flex-shrink:0;
}
.navbar-x-btn:hover{background:#000;color:#fff;border-color:#000;transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.15)}

/* HIDE old topbar & tabs */
.topbar{display:none!important}
.tabs{display:none!important}
.topbar-x-btn{display:none!important}

/* в”Ђв”Ђв”Ђ Sticky footer layout в”Ђв”Ђв”Ђ */
html,body{height:100%}
body{display:flex;flex-direction:column}
body>*:not(footer){flex-shrink:0}
#mainContainer{flex:1 0 auto}
footer{
  flex-shrink:0;
  margin-top:auto;
}

/* Mobile nav */
@media(max-width:860px){
  .logo-divider,.logo-sub{display:none}
  .navbar-search-inp{width:120px}
}
@media(max-width:700px){
  .navbar-hamburger{display:flex}
  .navbar-inner{flex-wrap:nowrap;position:relative;gap:0}
  .navbar-links{
    display:none;flex-direction:column;align-items:stretch;gap:2px;
    position:absolute;top:58px;left:0;right:0;
    background:rgba(255,255,255,0.98);border-bottom:1.5px solid var(--border2);
    padding:8px 12px 12px;box-shadow:0 8px 24px rgba(180,80,120,0.1);z-index:100;
    backdrop-filter:blur(16px);
    max-height:calc(100vh - 58px);overflow-y:auto;
  }
  .navbar-links.open{display:flex}
  .nav-link{justify-content:flex-start;padding:10px 12px;border-radius:10px;font-size:14px}
  .navbar-right{margin-left:auto;gap:6px}
  /* Ocultar buscador de escritorio en mГіvil */
  #navSearchWrap{display:none!important}
  /* Buscador dentro del menГє mГіvil */
  .navbar-search-wrap.mobile-menu-search{
    border-radius:12px;background:var(--surface2);border-color:var(--border2);
    margin-bottom:4px;
  }
  .navbar-search-wrap.mobile-menu-search .navbar-search-inp{
    width:100%;font-size:14px;padding:8px 0;
  }
  /* Resultados mГіvil: scroll propio, no sale de la pantalla */
  #navSearchResultsMobile{
    position:static!important;
    max-height:220px;overflow-y:auto;
    border-radius:10px;margin-top:6px;
    box-shadow:none;border:1.5px solid var(--border2);
  }
  .nav-picks-drop,.tab-more-drop{
    position:static;box-shadow:none;border:none;
    padding:0 0 0 12px;border-radius:0;background:transparent;
    display:flex;flex-direction:column;
  }
  .nav-picks-item,.tab-more-item{padding:8px 12px;font-size:13px;border-radius:8px}
}

/* в•ђв•ђв•ђ HERO в•ђв•ђв•ђ */
/* в•ђв•ђв•ђ WEEK VIEW в•ђв•ђв•ђ */
.week-view{display:flex;flex-direction:column;gap:0}
.week-nav{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:1.25rem;flex-wrap:wrap;gap:10px;
}
@media(max-width:600px){.week-nav{flex-direction:column;align-items:stretch;gap:8px}}
.week-nav-title{font-family:var(--font-display);font-size:24px;font-weight:700;color:var(--text);letter-spacing:-.01em}
.week-nav-title span{color:var(--accent);font-style:italic}

/* Columns вЂ” same structure as SapphicSignal */
.week-days-strip{
  display:flex;
  gap:8px;
  margin-bottom:1.5rem;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  scroll-snap-type:x mandatory;
  padding-bottom:4px;
  scrollbar-width:none;
}
.week-days-strip::-webkit-scrollbar{display:none}

.week-day-col{
  /* Fixed width always вЂ” scroll handles overflow */
  flex:0 0 148px;
  scroll-snap-align:start;
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:var(--radius);
  overflow:hidden;
  display:flex;
  flex-direction:column;
}
/* On very wide screens, expand to fill */
@media(min-width:1200px){
  .week-days-strip{overflow-x:visible}
  .week-day-col{flex:1 1 0;min-width:0}
}
@media(max-width:480px){.week-day-col{flex:0 0 120px}}

.week-day-col.is-today{
  border-color:var(--accent);
  border-width:2px;
  box-shadow:0 4px 20px rgba(201,79,124,0.18);
}
.week-day-col.is-past{opacity:.5}
.week-day-col.is-empty{opacity:.35}

.week-day-header{
  padding:10px 10px 8px;
  display:flex;flex-direction:column;align-items:center;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.week-day-col.is-today .week-day-header{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
}
.week-day-name{
  font-size:9px;font-weight:700;text-transform:uppercase;
  letter-spacing:.1em;color:var(--muted);margin-bottom:1px;
}
.week-day-col.is-today .week-day-name{color:rgba(255,255,255,.8)}
.week-day-num{
  font-family:var(--font-display);font-size:28px;font-weight:700;
  color:var(--text);line-height:1;
}
.week-day-col.is-today .week-day-num{color:#fff}
.week-day-month{font-size:9px;color:var(--muted);font-weight:600;margin-top:1px}
.week-day-col.is-today .week-day-month{color:rgba(255,255,255,.7)}

.week-day-items{
  display:flex;flex-direction:column;gap:6px;
  padding:8px 7px;flex:1;
}
.week-item{
  display:flex;flex-direction:column;
  border-radius:9px;overflow:hidden;
  cursor:pointer;transition:all .15s;
  border:1.5px solid var(--border);
  background:var(--surface);
}
.week-item:hover{border-color:var(--accent2);transform:translateY(-2px);box-shadow:0 4px 14px rgba(201,79,124,0.14)}

.week-item-poster-wrap{
  width:100%;
  aspect-ratio:16/9;
  overflow:hidden;
  flex-shrink:0;
  background:var(--surface2);
  position:relative;
}
.week-item-poster{
  width:100%;height:100%;
  object-fit:cover;object-position:center 20%;
  display:block;
}
.week-item-poster-ph{
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;font-size:18px;
}
.week-item-today-dot{
  position:absolute;top:5px;right:5px;
  background:var(--accent);color:#fff;
  font-size:8px;font-weight:700;padding:2px 6px;
  border-radius:20px;letter-spacing:.04em;
}
.week-item-body{padding:6px 7px 7px}
.week-item-name{
  font-size:11px;font-weight:700;color:var(--text);
  line-height:1.3;margin-bottom:3px;
  display:-webkit-box;-webkit-line-clamp:2;
  -webkit-box-orient:vertical;overflow:hidden;
}
.week-item-ep{
  font-size:10px;font-weight:700;
}
.week-empty-day{
  padding:16px 8px;font-size:10px;color:var(--muted);
  text-align:center;font-style:italic;flex:1;
  display:flex;align-items:center;justify-content:center;
}

/* Month toggle */
.month-toggle-wrap{margin-top:1.5rem}
.month-toggle-btn{
  width:100%;padding:10px;border-radius:var(--radius);
  border:1.5px solid var(--border2);background:var(--surface);
  color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;
  font-family:var(--font-body);display:flex;align-items:center;
  justify-content:center;gap:8px;transition:all .15s;
}
.month-toggle-btn:hover{background:var(--surface2);color:var(--text);border-color:var(--accent2)}
.month-toggle-btn.open{color:var(--accent);border-color:var(--accent);background:var(--accent-soft)}
.month-cal-wrap{margin-top:12px;display:none}
.month-cal-wrap.open{display:block}
/* в•ђв•ђв•ђ CONTAINER в•ђв•ђв•ђ */
.container{max-width:1020px;margin:0 auto;padding:2rem 1.5rem;position:relative;z-index:1}
@media(max-width:600px){
  .container{padding:1.25rem 1rem 2rem;width:100%;}
  .hero-stats{flex-wrap:wrap}
  #viewList,#viewMovies,#viewUpcoming,#viewBooks,#viewAnime,#viewRealities{width:100%;}
}

/* Legacy page-header (hidden now) */
.page-header{display:none}

/* в•ђв•ђв•ђ TABS в•ђв•ђв•ђ */
.tabs{
  display:flex;gap:2px;margin-bottom:1.75rem;
  background:var(--surface);
  border-radius:var(--radius-lg);
  padding:4px;
  width:fit-content;max-width:100%;
  border:1.5px solid var(--border2);
  box-shadow:var(--shadow-sm);
  flex-wrap:wrap;
}
.tab{
  padding:8px 20px;border-radius:14px;cursor:pointer;
  font-size:13px;font-weight:600;color:var(--muted);
  background:transparent;border:none;font-family:var(--font-body);
  transition:all .2s;white-space:nowrap;flex-shrink:0;
  display:flex;align-items:center;gap:5px;
}
.tab.active{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;
  box-shadow:0 3px 12px rgba(201,79,124,0.3);
}
.tab:hover:not(.active){color:var(--text);background:var(--surface2)}
.tab-more-wrap{position:relative;flex-shrink:0}
.tab-more-drop{
  position:absolute;top:calc(100% + 6px);left:50%;
  transform:translateX(-50%);
  background:var(--surface);border:1.5px solid var(--border2);
  border-radius:var(--radius);box-shadow:var(--shadow-md);
  min-width:160px;z-index:100;
  display:none;flex-direction:column;overflow:hidden;
}
.tab-more-drop.open{display:flex}
.tab-more-item{
  display:flex;align-items:center;gap:8px;
  padding:10px 16px;font-size:13px;font-weight:600;
  color:var(--text);cursor:pointer;transition:background .15s;
  border:none;background:transparent;font-family:var(--font-body);
  text-align:left;width:100%;
}
.tab-more-item:hover{background:var(--surface2);color:var(--accent)}
.tab-more-item.active{background:var(--accent-soft);color:var(--accent)}
@media(max-width:900px){
  .tab-more-wrap{width:100%}
  .tab-more-drop{left:0;transform:none;width:100%}
}

/* MГіvil: tabs en grid, sin scroll horizontal */
@media(max-width:900px) and (min-width:701px){
  .tabs{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:5px;width:100%;
    background:transparent;border:none;box-shadow:none;padding:0;
    margin-bottom:1.25rem;
  }
  .tab{
    justify-content:center;flex-direction:column;
    padding:8px 6px;border-radius:12px;font-size:11px;font-weight:700;
    background:var(--surface);border:1.5px solid var(--border2);
    box-shadow:var(--shadow-sm);gap:2px;text-align:center;
    white-space:normal;min-width:0;
  }
  .tab.active{
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:#fff;border-color:var(--accent);
    box-shadow:0 3px 14px rgba(201,79,124,0.25);
  }
}
@media(max-width:700px){
  .tabs{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:5px;width:100%;
    background:transparent;border:none;box-shadow:none;padding:0;
    margin-bottom:1.25rem;
  }
  .tab{
    justify-content:center;flex-direction:column;
    padding:8px 4px;border-radius:12px;font-size:10px;font-weight:700;
    background:var(--surface);border:1.5px solid var(--border2);
    box-shadow:var(--shadow-sm);gap:2px;text-align:center;
    white-space:normal;min-width:0;
  }
  .tab.active{
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:#fff;border-color:var(--accent);
    box-shadow:0 3px 14px rgba(201,79,124,0.25);
  }
}

/* в•ђв•ђв•ђ CALENDAR LEGEND в•ђв•ђв•ђ */
.cal-legend{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px;padding:10px 14px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-sm)}
.cal-legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text);font-weight:600;cursor:pointer;padding:3px 8px;border-radius:20px;transition:background .15s}
.cal-legend-item:hover{background:var(--surface2)}
.cal-legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.cal-legend-movie{background:var(--lavender)}

/* в•ђв•ђв•ђ WEEK PANEL в•ђв•ђв•ђ */
.week-panel{
  background:var(--surface);border:1.5px solid var(--border2);
  border-radius:var(--radius);padding:12px 16px;margin-bottom:14px;
  box-shadow:var(--shadow-sm);
}
.week-panel-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:10px}
.week-panel-list{display:flex;flex-direction:column;gap:5px}
.week-panel-empty{font-size:12px;color:var(--muted);font-style:italic}
.week-ep-row{
  display:flex;align-items:center;gap:8px;
  padding:5px 8px;border-radius:8px;
  background:var(--surface2);border:1px solid var(--border);
  cursor:pointer;transition:all .14s;font-size:12px;
}
.week-ep-row:hover{border-color:var(--accent2);background:var(--accent-soft)}
.week-ep-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.week-ep-name{font-weight:600;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.week-ep-date{font-size:11px;color:var(--muted);white-space:nowrap}
.week-ep-badge{font-size:10px;padding:1px 7px;border-radius:20px;font-weight:700;white-space:nowrap}
.week-ep-today{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:10px;padding:1px 8px;border-radius:20px;font-weight:700;animation:todayPulse 2.2s ease-in-out infinite}

/* в•ђв•ђв•ђ MONTH PICKER в•ђв•ђв•ђ */
.month-picker-year{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.month-picker-year-val{font-family:var(--font-display);font-size:22px;font-weight:700;color:var(--text)}
.month-picker-arr{background:var(--surface2);border:1.5px solid var(--border2);border-radius:20px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;transition:all .15s;font-family:var(--font-body)}
.month-picker-arr:hover{background:var(--accent-soft);border-color:var(--accent2);color:var(--accent)}
.month-picker-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.month-picker-btn{
  padding:8px 4px;border-radius:10px;border:1.5px solid var(--border);
  background:var(--surface2);color:var(--text);font-size:12px;font-weight:600;
  cursor:pointer;font-family:var(--font-body);transition:all .15s;text-align:center;
}
.month-picker-btn:hover{border-color:var(--accent2);background:var(--accent-soft);color:var(--accent)}
.month-picker-btn.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-color:var(--accent);box-shadow:0 3px 10px rgba(201,79,124,.3)}

/* в•ђв•ђв•ђ MONTH DISPLAY HINT в•ђв•ђв•ђ */
.month-display::after{content:' в–ѕ';font-size:16px;opacity:.4;font-family:var(--font-body);font-weight:400}

/* в•ђв•ђв•ђ MODAL IMPROVEMENTS в•ђв•ђв•ђ */
.modal-progress-block{margin-bottom:14px}
.modal-progress-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px}
.modal-progress-label{font-size:11.5px;color:var(--muted);font-weight:600}
.modal-progress-pct{font-family:var(--font-display);font-size:20px;font-weight:700;line-height:1}
.modal-next-badge{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px;margin-bottom:10px}
.modal-next-badge.today{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;animation:todayPulse 2.2s ease-in-out infinite}
.modal-next-badge.soon{background:var(--accent-soft);color:var(--accent);border:1px solid rgba(201,79,124,.2)}
.modal-next-badge.done{background:var(--teal-soft);color:var(--teal);border:1px solid rgba(74,173,160,.2)}
.modal-dates-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.modal-date-chip{font-size:11px;color:var(--muted);background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-weight:600}
.modal-completeness{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);margin-bottom:10px;padding:6px 10px;background:var(--surface2);border-radius:10px;border:1px solid var(--border)}
.modal-completeness-bar{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.modal-completeness-fill{height:100%;border-radius:2px;background:linear-gradient(to right,var(--accent),var(--lavender))}


.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:10px}
.month-display{font-family:var(--font-display);font-size:28px;font-weight:700;color:var(--text);letter-spacing:-.02em}
.month-display span{color:var(--accent);font-style:italic}
.nav-btns{display:flex;gap:6px}
.nav-btn{
  background:var(--surface);border:1.5px solid var(--border2);
  border-radius:20px;padding:7px 18px;cursor:pointer;
  font-size:13px;color:var(--text);font-family:var(--font-body);font-weight:600;
  transition:all .18s;box-shadow:var(--shadow-sm);
}
.nav-btn:hover{background:var(--accent-soft);border-color:var(--accent2);color:var(--accent);transform:translateY(-1px)}
@media(max-width:600px){
  .cal-nav{flex-direction:column;align-items:stretch;gap:8px}
  .month-display{font-size:22px;text-align:center}
  .nav-btns{display:grid;grid-template-columns:1fr auto 1fr;gap:6px}
  .nav-btn{font-size:12px;padding:8px 10px;border-radius:12px;text-align:center}
}

/* Calendario: scroll horizontal propio en mГіvil */
.cal-wrap{width:100%}
@media(max-width:600px){
  .cal-wrap{
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
    width:100%;
  }
  .cal-wrap::-webkit-scrollbar{display:none}
}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;width:100%}
@media(max-width:600px){
  .cal-grid{min-width:420px} /* mГ­nimo para que las celdas sean legibles */
}
.day-header{
  text-align:center;font-size:10px;color:var(--muted);
  padding:7px 0;font-weight:600;text-transform:uppercase;letter-spacing:.08em;
}
.day-cell{
  min-height:96px;border-radius:10px;
  border:1.5px solid var(--border);padding:6px;
  background:var(--surface);transition:all .18s;
}
.day-cell.has-eps{cursor:pointer;background:rgba(255,255,255,1)}
.day-cell.has-eps:hover{
  border-color:var(--accent2);
  box-shadow:0 6px 20px rgba(201,79,124,0.14);
  transform:translateY(-2px);
  background:var(--surface);
}
.day-cell.other-month{opacity:.22;background:transparent;border-color:transparent}
.day-cell.today{border-color:var(--accent);border-width:2px;background:rgba(252,232,241,0.4)}
.day-cell.today .day-num{color:var(--accent);font-weight:700}
.day-num{font-size:11.5px;color:var(--muted);margin-bottom:4px;font-weight:600}
.ep-pill{display:flex;align-items:center;gap:4px;border-radius:6px;padding:3px 5px;margin-bottom:3px;overflow:hidden;cursor:pointer;transition:opacity .15s}
.ep-pill:hover{opacity:.8}
.ep-pill.skipped{opacity:.4}
.ep-thumb{width:16px;height:23px;border-radius:3px;object-fit:cover;flex-shrink:0}
.ep-thumb-ph{width:16px;height:23px;border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px}
.ep-pill-text{font-size:9.5px;line-height:1.2;overflow:hidden;min-width:0}
.ep-pill-name{white-space:nowrap;text-overflow:ellipsis;overflow:hidden;font-weight:600}
.ep-pill-ep{opacity:.7;font-size:8.5px}
@media(max-width:600px){
  .cal-grid{gap:2px}
  .day-cell{min-height:58px;padding:3px;border-radius:6px}
  .day-num{font-size:10px;margin-bottom:2px}
  .ep-thumb,.ep-thumb-ph{display:none}
  .ep-pill{padding:2px 3px}
  .ep-pill-text{font-size:8px}
  .ep-pill-ep{display:none}
}

/* в•ђв•ђв•ђ CARDS в•ђв•ђв•ђ */
/* Series */
.series-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:16px}
.series-card{
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:var(--radius-lg);overflow:hidden;cursor:pointer;
  transition:all .22s;position:relative;display:flex;flex-direction:column;
  box-shadow:var(--shadow-sm);
}
.series-card:hover{
  border-color:var(--accent2);
  box-shadow:var(--shadow-lg);
  transform:translateY(-4px);
}
.series-card-poster-wrap{position:relative;overflow:hidden}
.series-card-poster{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;background:var(--accent-soft)}
.series-card-poster-ph{width:100%;aspect-ratio:2/3;background:linear-gradient(135deg,var(--accent-soft) 0%,var(--lavender-soft) 100%);display:flex;align-items:center;justify-content:center;font-size:40px;color:var(--accent)}
.series-card-poster-wrap::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:55%;
  background:linear-gradient(to top,rgba(30,15,25,0.65) 0%,transparent 100%);
  pointer-events:none;
}
.series-card-body{padding:12px 13px;flex:1;display:flex;flex-direction:column;gap:3px}
.series-card-name{font-size:13.5px;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:3px}
.series-card-meta{font-size:11px;color:var(--muted);line-height:1.5}
.series-card-next{font-size:11px;color:var(--accent);font-weight:600;margin-top:4px}
.series-card-done{font-size:11px;color:var(--teal);font-weight:600;margin-top:4px}
.series-card-today{
  font-size:11px;font-weight:700;margin-top:4px;
  display:inline-flex;align-items:center;gap:5px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;border-radius:20px;padding:3px 10px;
  animation:todayPulse 2.2s ease-in-out infinite;
}
@keyframes todayPulse{0%,100%{box-shadow:0 0 0 0 rgba(201,79,124,0.35)}60%{box-shadow:0 0 0 6px rgba(201,79,124,0)}}
.progress-wrap{height:5px;background:var(--border);border-radius:3px;margin-top:8px;overflow:hidden;position:relative}
.progress-fill{height:100%;border-radius:3px;transition:width .4s}
.progress-today-marker{
  position:absolute;top:-1px;bottom:-1px;width:2px;
  background:rgba(255,255,255,0.85);border-radius:2px;
  box-shadow:0 0 4px rgba(0,0,0,.2);pointer-events:none;
}
.day-cell.is-past{background:rgba(245,240,243,0.7)}
.day-cell.is-past .day-num{color:rgba(138,104,120,0.5)}
.day-cell.is-past .ep-pill{opacity:.55}
.day-cell.is-future{background:#fff}
.day-cell.today{border-color:var(--accent)!important;border-width:2px!important;background:rgba(252,232,241,0.5)!important}
.card-badges{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:4px;min-height:20px;align-items:center}
.badge{font-size:9.5px;padding:2px 8px;border-radius:20px;font-weight:700;letter-spacing:.02em}
.badge-book{background:var(--gold-soft);color:var(--gold)}
.badge-upcoming{background:var(--lavender-soft);color:var(--lavender)}
.card-watch-pill{
  display:inline-flex;align-items:center;gap:3px;
  font-size:10px;font-weight:600;color:var(--teal);
  text-decoration:none;background:var(--teal-soft);
  border-radius:20px;padding:2px 9px;
  border:1px solid rgba(74,173,160,0.3);
  transition:all .15s;white-space:nowrap;
}
.card-watch-pill:hover{background:var(--teal);color:#fff;border-color:var(--teal);transform:translateY(-1px)}
@media(max-width:480px){
  .series-grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .series-card-body{padding:9px 10px}
  .series-card-name{font-size:12.5px}
}

/* в”Ђв”Ђ Series card: hover synopsis overlay в”Ђв”Ђ */
.series-card-poster-wrap{position:relative;overflow:hidden}
.sc-synopsis-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(20,8,28,0.97) 0%,rgba(20,8,28,0.82) 55%,rgba(20,8,28,0.3) 100%);
  display:flex;flex-direction:column;justify-content:flex-end;
  padding:12px;opacity:0;transition:opacity .22s;pointer-events:none;
}
.series-card:hover .sc-synopsis-overlay{opacity:1}
.sc-synopsis-text{
  font-size:10.5px;line-height:1.55;color:rgba(255,255,255,0.88);
  display:-webkit-box;-webkit-line-clamp:5;-webkit-box-orient:vertical;overflow:hidden;
  font-family:var(--font-body);
}
.sc-synopsis-more{font-size:9.5px;color:var(--accent2);font-weight:700;margin-top:4px}

/* Genre pills on card */
.sc-genres{display:flex;flex-wrap:wrap;gap:3px;margin-top:5px}
.sc-genre-pill{
  font-size:9.5px;font-weight:700;padding:2px 7px;border-radius:20px;
  background:var(--surface3);color:var(--muted);border:1px solid var(--border2);
  line-height:1.4;
}

/* в”Ђв”Ђ Series card status pill в”Ђв”Ђ */
.sc-status-pill{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:20px;margin-top:5px;display:inline-block}
.sc-status-pill.today{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;animation:todayPulse 2.2s ease-in-out infinite}
.sc-status-pill.airing{background:var(--accent-soft);color:var(--accent);border:1px solid rgba(201,79,124,.2)}
.sc-status-pill.finished{background:var(--teal-soft);color:var(--teal);border:1px solid rgba(74,173,160,.2)}

/* в”Ђв”Ђ Region quick-filter pills в”Ђв”Ђ */
.region-pills{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.region-pill{
  padding:5px 13px;border-radius:20px;font-size:12px;font-weight:700;
  border:1.5px solid var(--border2);background:var(--surface);
  color:var(--muted);cursor:pointer;transition:all .15s;font-family:var(--font-body);
}
.region-pill:hover{border-color:var(--accent2);color:var(--accent);background:var(--accent-soft)}
.region-pill.active{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 2px 10px rgba(201,79,124,.3)}

/* Upcoming */
.upcoming-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:16px}
.upcoming-card{
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:var(--radius-lg);overflow:hidden;cursor:pointer;
  transition:all .22s;position:relative;display:flex;flex-direction:column;
  box-shadow:var(--shadow-sm);
}
.upcoming-card:hover{border-color:var(--lavender);box-shadow:0 12px 36px rgba(139,114,190,0.2);transform:translateY(-4px)}
.upcoming-poster-wrap{position:relative;overflow:hidden}
.upcoming-poster{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;background:var(--lavender-soft)}
.upcoming-poster-ph{width:100%;aspect-ratio:2/3;background:linear-gradient(135deg,var(--lavender-soft) 0%,var(--accent-soft) 100%);display:flex;align-items:center;justify-content:center;font-size:40px}
.upcoming-poster-wrap::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:55%;
  background:linear-gradient(to top,rgba(25,15,35,0.65) 0%,transparent 100%);
  pointer-events:none;
}
.upcoming-body{padding:12px 13px;flex:1;display:flex;flex-direction:column;gap:3px}
.upcoming-name{font-size:13.5px;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:2px}
.upcoming-meta{font-size:11px;color:var(--muted);line-height:1.5}
.upcoming-watch-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
@media(max-width:480px){
  .upcoming-grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .upcoming-body{padding:9px 10px}
  .upcoming-name{font-size:12.5px}
}

/* Movies */
.movies-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:16px}
.movie-card{
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:var(--radius-lg);overflow:hidden;cursor:pointer;
  transition:all .22s;position:relative;display:flex;flex-direction:column;
  box-shadow:var(--shadow-sm);
}
.movie-card:hover{border-color:var(--lavender);box-shadow:0 12px 36px rgba(139,114,190,0.2);transform:translateY(-4px)}
.movie-card-poster-wrap{position:relative;overflow:hidden}
.movie-card-poster{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;background:var(--lavender-soft)}
.movie-card-poster-ph{width:100%;aspect-ratio:2/3;background:linear-gradient(135deg,var(--lavender-soft) 0%,var(--accent-soft) 100%);display:flex;align-items:center;justify-content:center;font-size:40px;color:var(--lavender)}
.movie-card-poster-wrap::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:55%;
  background:linear-gradient(to top,rgba(25,15,35,0.65) 0%,transparent 100%);
  pointer-events:none;
}
.movie-card-body{padding:12px 13px;flex:1;display:flex;flex-direction:column}
.movie-card-name{font-size:13.5px;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:3px}
.movie-card-meta{font-size:11px;color:var(--muted);line-height:1.5}
.movie-card-date{font-size:11px;color:var(--lavender);font-weight:600;margin-top:4px}
.movie-card-watch{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
@media(max-width:480px){
  .movies-grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .movie-card-body{padding:9px 10px}
  .movie-card-name{font-size:12.5px}
}

/* Section headings */
.section-heading{font-family:var(--font-display);font-size:22px;font-weight:700;color:var(--text);margin-bottom:.2rem;letter-spacing:-.01em}
.section-desc{font-size:13px;color:var(--muted);margin-bottom:1rem;line-height:1.6}

/* Subtabs */
.subtabs{
  display:flex;gap:3px;margin-bottom:1.25rem;
  background:var(--surface);border-radius:var(--radius-lg);
  padding:4px;width:fit-content;max-width:100%;
  border:1.5px solid var(--border2);
  box-shadow:var(--shadow-sm);
  overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.subtabs::-webkit-scrollbar{display:none}
.subtab{
  padding:6px 16px;border-radius:12px;cursor:pointer;
  font-size:12.5px;font-weight:600;color:var(--muted);
  background:transparent;border:none;font-family:var(--font-body);
  transition:all .18s;display:flex;align-items:center;gap:5px;
  white-space:nowrap;flex-shrink:0;
}
.subtab.active{background:var(--accent-soft);color:var(--accent)}
.subtab:hover:not(.active){color:var(--text);background:var(--surface2)}
.subtab-count{font-size:10.5px;background:var(--border2);color:var(--muted);border-radius:20px;padding:1px 7px;font-weight:700}
.subtab.active .subtab-count{background:var(--accent);color:#fff}
@media(max-width:480px){.subtabs{width:100%}.subtab{font-size:12px;padding:5px 10px}}

/* Stats bar (kept as fallback hidden) */
.stats-bar{display:none}

/* Stats banner вЂ” visible strip above tabs */
.stats-banner{
  display:flex;flex-wrap:wrap;gap:0;
  margin-bottom:1.25rem;
  background:var(--surface);
  border:1.5px solid var(--border2);
  border-radius:var(--radius-lg);
  overflow:hidden;
  box-shadow:var(--shadow-sm);
}
.hero-stat{
  flex:1;min-width:80px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:12px 8px;gap:2px;
  border-right:1px solid var(--border);
  transition:background .15s;
}
.hero-stat:last-child{border-right:none}
.hero-stat:hover{background:var(--surface2)}
.hero-stat-num{
  font-family:var(--font-display);
  font-size:22px;font-weight:800;line-height:1;
  color:var(--accent);
}
.hero-stat-num.lav{color:var(--lavender)}
.hero-stat-num.teal{color:var(--teal)}
.hero-stat-num.gold{color:var(--gold)}
.hero-stat-label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;text-align:center}
@media(max-width:600px){
  .stats-banner{gap:0}
  .hero-stat{padding:10px 4px;min-width:60px}
  .hero-stat-num{font-size:18px}
  .hero-stat-label{font-size:9px}
}

/* Search */
.search-wrap{margin-bottom:1.25rem;position:relative}
.search-input{
  width:100%;padding:13px 18px 13px 46px;
  border-radius:var(--radius-lg);border:1.5px solid var(--border2);
  background:var(--surface);color:var(--text);
  font-size:15px;font-family:var(--font-body);outline:none;
  transition:border-color .15s, box-shadow .15s;
  box-shadow:var(--shadow-sm);
  height:48px;
}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(201,79,124,0.1)}
.search-icon{position:absolute;left:15px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none}
.search-empty{text-align:center;color:var(--muted);padding:2.5rem;font-size:13px}

/* Books toolbar */
.books-toolbar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1.25rem;align-items:center}
.books-toolbar .search-wrap{margin-bottom:0;flex:1;min-width:0;width:100%}
.filter-group{display:flex;align-items:center;gap:6px}
.filter-label{font-size:10.5px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
.filter-select{
  padding:7px 12px;border-radius:var(--radius-lg);
  border:1.5px solid var(--border2);background:var(--surface);color:var(--text);
  font-size:13px;font-family:var(--font-body);font-weight:600;
  outline:none;cursor:pointer;transition:border-color .15s;
  box-shadow:var(--shadow-sm);max-width:100%;
}
.filter-select:focus{border-color:var(--accent)}
.filter-clear-btn{

/* в•ђв•ђв•ђ COUNTRY MULTI-PICKER в•ђв•ђв•ђ */

const MONTHS=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

const PALETTE=['#d4608a','#5bbcb0','#9b82c9','#e8a84a','#e06fa0','#4eadb5','#b07ad4','#d47a4e'];
const PALETTE_SOFT=['rgba(212,96,138,0.13)','rgba(91,188,176,0.13)','rgba(155,130,201,0.13)','rgba(232,168,74,0.13)','rgba(224,111,160,0.13)','rgba(78,173,181,0.13)','rgba(176,122,212,0.13)','rgba(212,122,78,0.13)'];

// Format "T2 В· Ep 6" label for an episode

];

let state={month:new Date().getMonth(),year:new Date().getFullYear(),tab:'cal',series:[],movies:[],actresses:[]};

// в•ђв•ђв•ђ SESSION PERSISTENCE в•ђв•ђв•ђ

function getDow(d){return(new Date(d+'T12:00:00').getDay()+6)%7}
function addDays(d,n){const x=new Date(d+'T12:00:00');x.setDate(x.getDate()+n);return x.toISOString().slice(0,10)}
function fmtDuration(mins){
  if(!mins) return '';
  if(mins<60) return mins+'min';
  var h=Math.floor(mins/60),m=mins%60;
  return m?h+'h '+m+'min':h+'h';
}

/**
 * Devuelve info de duraciГіn para una serie:
 * - epDuration: minutos por episodio (media ponderada entre temporadas si cada una tiene la suya)
 * - totalMins: minutos totales de todos los episodios
 * - source: 'exact' | 'average' | null
 */
function getSeriesDurationInfo(s){
  const seasons=getSeasons(s);
  const totalEps=seasons.reduce((a,t)=>a+t.totalEpisodes,0);
  if(!totalEps) return {epDuration:null,totalMins:null,source:null};

  // ВїHay duraciГіn por temporada?
  const seasonsWithDuration=seasons.filter(t=>t.episodeDuration);
  if(seasonsWithDuration.length){
    // Calcular media ponderada: suma(eps_t * dur_t) / total_eps
    let weightedSum=0, coveredEps=0;
    seasons.forEach(t=>{
      if(t.episodeDuration){
        weightedSum+=t.episodeDuration*t.totalEpisodes;
        coveredEps+=t.totalEpisodes;
      } else if(s.episodeDuration){
        // Temporadas sin duraciГіn propia в†’ usar la general de la serie
        weightedSum+=s.episodeDuration*t.totalEpisodes;
        coveredEps+=t.totalEpisodes;
      }
    });
    const avg=Math.round(weightedSum/Math.max(coveredEps,1));
    const total=Math.round(seasons.reduce((sum,t)=>{
      const d=t.episodeDuration||s.episodeDuration||0;
      return sum+d*t.totalEpisodes;
    },0));
    return {epDuration:avg, totalMins:total||null, source:coveredEps===totalEps?'exact':'average'};
  }

  // ВїDuraciГіn general de la serie?
  if(s.episodeDuration){
    return {epDuration:s.episodeDuration, totalMins:s.episodeDuration*totalEps, source:'average'};
  }

  return {epDuration:null, totalMins:null, source:null};
}

/** Formato "X h totales (в‰€ Ymin/ep)" o "Ymin/ep В· X h totales" */
function fmtSeriesDuration(info){
  if(!info||!info.epDuration) return '';
  const perEp=fmtDuration(info.epDuration);
  const total=info.totalMins?fmtDuration(info.totalMins):'';
  const prefix=info.source==='average'?'в‰€ ':'';
  return total?`${prefix}${perEp}/ep В· ${total} totales`:`${prefix}${perEp}/ep`;
}
function fmtDate(d){const x=new Date(d+'T12:00:00');return`${x.getDate()} ${MONTHS[x.getMonth()].slice(0,3)} ${x.getFullYear()}`}
function toStr(y,m,d){return`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`}
function getEmissionDays(s){if(s.emissionDays&&s.emissionDays.length>0)return[...s.emissionDays].sort((a,b)=>a-b);if(s.dayOfWeek!==undefined)return[s.dayOfWeek];return[0]}

// Normalize a series to always have a seasons array (backward compat)
function getSeasons(s){
  if(s.seasons&&s.seasons.length) return s.seasons;
  // Legacy: single-season series
  if(s.startDate&&s.totalEpisodes) return [{
    label:'Temporada 1',
    startDate:s.startDate, totalEpisodes:s.totalEpisodes,
    emissionDays:s.emissionDays||[s.dayOfWeek||0],
    skipDates:s.skipDates||[], episodes:s.episodes||[]
  }];
  return [];
}

// Generate episodes for a single season object
function genSeasonEps(season, globalEpOffset=0){
  if(!season.startDate||isNaN(new Date(season.startDate+'T12:00:00').getTime())) return [];
  const epOverrides=season.episodes||[];
  const skipDates=new Set(season.skipDates||[]);

  // в”Ђв”Ђ allInOneDay: todos los eps se emiten el mismo dГ­a (Netflix drop)
  if(season.allInOneDay){
    const eps=[];
    for(let i=0;i<season.totalEpisodes;i++){
      const epNum=i+1, globalNum=globalEpOffset+epNum;
      const ov=epOverrides.find(e=>e.num===epNum);
      eps.push(ov?{...ov,num:globalNum,seasonNum:epNum}:{num:globalNum,seasonNum:epNum,date:season.startDate,skipped:false});
    }
    return eps;
  }

  const days=(season.emissionDays&&season.emissionDays.length)?[...season.emissionDays].sort((a,b)=>a-b):[season.dayOfWeek||0];

  // в”Ђв”Ђ premiereSchedule: emisiГіn irregular por grupos/rangos de eps
  // Formato nuevo: [{fromEp, toEp, date}, ...]
  // Formato viejo: [{date, count}, ...]
  const premiereSchedule=season.premiereSchedule||[];
  const specialDateMap={};
  const usedSpecialDates=new Set();
  if(premiereSchedule.length){
    const isNewFormat=premiereSchedule[0]&&premiereSchedule[0].fromEp!==undefined;
    if(isNewFormat){
      for(const gr of premiereSchedule){
        const from=parseInt(gr.fromEp)||1, to=parseInt(gr.toEp)||from;
        for(let n=from;n<=to&&n<=season.totalEpisodes;n++){
          specialDateMap[n]=gr.date;
          usedSpecialDates.add(gr.date);
        }
      }
    } else {
      let epCursor=0;
      for(const pr of premiereSchedule){
        const count=pr.count||1;
        for(let c=0;c<count;c++){
          epCursor++;
          specialDateMap[epCursor]=pr.date;
          usedSpecialDates.add(pr.date);
        }
      }
    }
  }

  // в”Ђв”Ђ Calcular fecha de inicio del patrГіn semanal regular
  let weekRefDate=season.startDate;
  let regularSearchStart=0; // cuando no hay premiereSchedule, el startDate mismo puede ser dГ­a de emisiГіn
  if(premiereSchedule.length){
    const allSpecialDates=[...usedSpecialDates].sort();
    weekRefDate=allSpecialDates[allSpecialDates.length-1]||season.startDate;
    regularSearchStart=1; // buscar DESPUГ‰S del Гєltimo grupo especial
  }
  let firstRegularDate=null;
  for(let o=regularSearchStart;o<60;o++){
    const c=addDays(weekRefDate,o);
    if(days.includes(getDow(c))&&!usedSpecialDates.has(c)){firstRegularDate=c;break;}
  }
  if(!firstRegularDate){
    for(let o=0;o<60;o++){const c=addDays(season.startDate,o);if(days.includes(getDow(c))&&!usedSpecialDates.has(c)){firstRegularDate=c;break;}}
  }
  if(!firstRegularDate) firstRegularDate=weekRefDate;

  // в”Ђв”Ђ Generar slots regulares semanales
  const weekStart=addDays(firstRegularDate,-getDow(firstRegularDate));
  const totalRegular=season.totalEpisodes-Object.keys(specialDateMap).length;
  const slots=[];
  const wn=Math.ceil((Math.max(totalRegular,1)+(skipDates.size||0))/days.length)+8;
  for(let w=0;w<wn&&slots.length<totalRegular+skipDates.size+12;w++){
    for(const d of days){const date=addDays(weekStart,d+w*7);if(date>=firstRegularDate)slots.push(date);}
  }
  const regularSlots=slots.filter(d=>!skipDates.has(d)&&!usedSpecialDates.has(d));

  // в”Ђв”Ђ Asignar fechas a cada episodio
  const eps=[];
  let regularIdx=0;
  for(let epNum=1;epNum<=season.totalEpisodes;epNum++){
    const globalNum=globalEpOffset+epNum;
    const ov=epOverrides.find(e=>e.num===epNum);
    if(ov){
      eps.push({...ov,num:globalNum,seasonNum:epNum});
    } else if(specialDateMap[epNum]!==undefined){
      eps.push({num:globalNum,seasonNum:epNum,date:specialDateMap[epNum],skipped:false});
    } else {
      const base=regularSlots[regularIdx]||addDays(firstRegularDate,regularIdx*7);
      regularIdx++;
      eps.push({num:globalNum,seasonNum:epNum,date:base,skipped:false});
    }
  }
  return eps;
}

function genEps(s){
  const seasons=getSeasons(s);
  if(!seasons.length) return [];
  const allEps=[];
  let offset=0;
  seasons.forEach((season,idx)=>{
    const eps=genSeasonEps(season,offset);
    eps.forEach(ep=>allEps.push({...ep,season:idx+1,seasonLabel:season.label||`T${idx+1}`}));
    offset+=season.totalEpisodes;
  });
  return allEps;
}

function renderStats(){
  const allSeries=state.series;
  const activeSeries=allSeries.filter(s=>!s.upcoming);

  });

}

function getEpMap(y,m){
  const map={};
  state.series.filter(s=>!s.upcoming).forEach((s)=>{
    const si=state.series.indexOf(s);
    genEps(s).forEach(ep=>{
      if(ep.skipped) return;
      const d=new Date(ep.date+'T12:00:00');
      if(d.getFullYear()===y&&d.getMonth()===m){
        if(!map[ep.date]) map[ep.date]=[];
        map[ep.date].push({s,ep,si,type:'series'});
      }
    });
  });
  state.movies.forEach((mv,mi)=>{
    if(!mv.date) return;
    const d=new Date(mv.date+'T12:00:00');
    if(d.getFullYear()===y&&d.getMonth()===m){
      if(!map[mv.date]) map[mv.date]=[];
      map[mv.date].push({s:mv,ep:{num:null,date:mv.date,skipped:false},si:mi,type:'movie'});
    }
  });
  return map;
}

// в•ђв•ђв•ђ WEEK VIEW в•ђв•ђв•ђ
let weekOffset=0; // 0=this week, 1=next, -1=prev

function getWeekDates(offset=0){
  const now=new Date();
  const dow=(now.getDay()+6)%7; // Mon=0
  const monday=new Date(now);
  monday.setDate(now.getDate()-dow+offset*7);
  const dates=[];
  for(let i=0;i<7;i++){
    const d=new Date(monday);
    d.setDate(monday.getDate()+i);
    dates.push(toStr(d.getFullYear(),d.getMonth(),d.getDate()));
  }
  return dates;
}

const DAYS_SHORT=['Lun','Mar','MiГ©','Jue','Vie','SГЎb','Dom'];
const MONTHS_SHORT=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

function renderWeekView(){
  const now=new Date();
  const todayStr=toStr(now.getFullYear(),now.getMonth(),now.getDate());
  const dates=getWeekDates(weekOffset);

  // Nav title
  const first=new Date(dates[0]+'T12:00:00'), last=new Date(dates[6]+'T12:00:00');
  const navTitle=document.getElementById('weekNavTitle');
  if(first.getMonth()===last.getMonth()){
    navTitle.innerHTML=`<span>${MONTHS[first.getMonth()]}</span> ${first.getFullYear()}`;
  } else {
    navTitle.innerHTML=`<span>${MONTHS_SHORT[first.getMonth()]}</span> вЂ“ <span>${MONTHS_SHORT[last.getMonth()]}</span> ${last.getFullYear()}`;
  }

  // Build episode map вЂ” one entry per series per day (deduplicated)
  const epMap={};
  dates.forEach(d=>{epMap[d]=[];});
  state.series.filter(s=>!s.upcoming).forEach(s=>{
    const si=state.series.indexOf(s);
    const seenDates=new Set();
    genEps(s).forEach(ep=>{
      if(ep.skipped||!epMap.hasOwnProperty(ep.date)||seenDates.has(ep.date)) return;
      seenDates.add(ep.date);
      epMap[ep.date].push({type:'series',s,ep,si});
    });
  });
  state.movies.forEach((mv,mi)=>{
    if(mv.date&&epMap.hasOwnProperty(mv.date))
      epMap[mv.date].push({type:'movie',s:mv,ep:{date:mv.date},si:mi});
  });

  let html='';
  dates.forEach((ds,i)=>{
    const d=new Date(ds+'T12:00:00');
    const isToday=ds===todayStr;
    const isPast=ds<todayStr&&!isToday;
    const items=epMap[ds]||[];

    let itemsHtml='';
    if(!items.length){
      itemsHtml=`<div class="week-empty-day">вЂ”</div>`;

function renderCal(){
  const {month:m,year:y}=state;
  document.getElementById('monthDisplay').innerHTML=`<span>${MONTHS[m]}</span> ${y}`;
  const epMap=getEpMap(y,m);
  const first=new Date(y,m,1), startDow=(first.getDay()+6)%7;
  const dim=new Date(y,m+1,0).getDate(), prevDim=new Date(y,m,0).getDate();
  const tStr=toStr(new Date().getFullYear(),new Date().getMonth(),new Date().getDate());
  let html='<div class="cal-wrap"><div class="cal-grid">';
  DAYS.forEach(d=>{html+=`<div class="day-header">${d}</div>`;});
  for(let i=startDow-1;i>=0;i--)
    html+=`<div class="day-cell other-month"><div class="day-num">${prevDim-i}</div></div>`;
  for(let d=1;d<=dim;d++){
    const ds=toStr(y,m,d), eps=epMap[ds]||[], isToday=ds===tStr;
    const isPast=ds<tStr, isFuture=ds>tStr;
    html+=`<div class="day-cell${isToday?' today':''}${isPast?' is-past':''}${isFuture?' is-future':''}${eps.length?' has-eps':''}" ${eps.length?`onclick="openDay('${ds}')"`:''}><div class="day-num">${d}</div>`;
    eps.slice(0,3).forEach(({s,ep,si,type})=>{
      if(type==='movie'){
        const bg='rgba(155,130,201,0.15)';
        const thumb=s.poster?`<img class="ep-thumb" src="${s.poster}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`:'' ;
        const ph=`<div class="ep-thumb-ph" style="${s.poster?'display:none':''}background:${bg}">рџЋҐ</div>`;
        html+=`<div class="ep-pill movie-pill" style="background:${bg}">
          ${thumb}${ph}
          <div class="ep-pill-text" style="color:var(--lavender)">
            <div class="ep-pill-name">${s.name}</div>
            <div class="ep-pill-ep">PelГ­cula</div>
          </div></div>`;
      } else {
        const col=PALETTE[si%PALETTE.length], bg=PALETTE_SOFT[si%PALETTE_SOFT.length];
        const thumb=s.poster?`<img class="ep-thumb" src="${s.poster}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`:'' ;
        const ph=`<div class="ep-thumb-ph" style="${s.poster?'display:none':''}background:${bg}">рџЋ¬</div>`;
        const calSeasons=getSeasons(s);
        const calLbl=epLabel(ep,calSeasons);
        html+=`<div class="ep-pill${ep.skipped?' skipped':''}" style="background:${bg}">
          ${thumb}${ph}
          <div class="ep-pill-text" style="color:${col}">

            <div class="ep-pill-ep">${calLbl}${ep.skipped?' В· вњ—':''}</div>

    if(eps.length>3) html+=`<div style="font-size:10px;color:var(--muted);padding:2px 4px">+${eps.length-3} mГЎs</div>`;
    html+='</div>';

  for(let d=1;d<=rem;d++) html+=`<div class="day-cell other-month"><div class="day-num">${d}</div></div>`;
  html+='</div></div>';
  document.getElementById('calInner').innerHTML=html;

};
const REGION_LABELS={'asia':'рџЊЏ Asia','europa':'рџЊЌ Europa','america':'рџЊЋ AmГ©rica','oceania':'рџЊЏ OceanГ­a','otros':'рџЊђ Otros'};

/** Dado un string de paГ­s (puede ser 'A / B'), devuelve los fragmentos atГіmicos. */
function parseCountryParts(country){
  if(!country) return [];
  return country.split('/').map(s=>s.trim()).filter(Boolean);
}

/**
 * countryFlag(country) вЂ” acepta valores simples ('Tailandia') o compuestos ('Tailandia / JapГіn').
 * Devuelve las banderas de todos los paГ­ses concatenadas, o рџЊђ si ninguno se reconoce.
 */
function countryFlag(country){
  const parts=parseCountryParts(country);
  if(!parts.length) return 'рџЊђ';
  const flags=parts.map(p=>COUNTRY_FLAGS[p]||'').filter(Boolean);
  return flags.length?flags.join(''):'рџЊђ';
}

function getRegion(country){
  // Si es multi-paГ­s ('A / B'), clasificar por el primer paГ­s
  const primary=parseCountryParts(country)[0]||country;
  for(const [r,list] of Object.entries(COUNTRY_REGIONS)){if(list.includes(primary))return r;}
  return 'otros';
}
function groupByRegion(countries){
  const groups={};
  countries.forEach(c=>{
    const r=getRegion(c);
    if(!groups[r])groups[r]=[];
    groups[r].push(c);
  });
  return groups;
}

/* в•ђв•ђв•ђ COUNTRY MULTI-PICKER LOGIC в•ђв•ђв•ђ */
// availableCountries is passed in each time the picker is built/refreshed
function buildCountryPicker(id, onChange, availableCountries){
  const wrap=document.createElement('div');
  wrap.className='country-picker-wrap';
  wrap.id='cpWrap_'+id;
  const btn=document.createElement('button');
  btn.type='button';
  btn.className='country-picker-btn';
  btn.innerHTML='<span class="cpb-label">рџЊЌ PaГ­s</span><span class="cpb-arrow">в–ј</span>';
  const drop=document.createElement('div');
  drop.className='country-picker-dropdown';
  let selected=[];
  function getAll(){return [...selected];}
  function updateBtn(){
    const all=getAll();
    if(!all.length){btn.innerHTML='<span class="cpb-label">рџЊЌ PaГ­s</span><span class="cpb-arrow">в–ј</span>';}
    else if(all.length===1){btn.innerHTML=`<span class="cpb-label">${countryFlag(all[0])} ${all[0]}</span><span class="cpb-arrow">в–ј</span>`;}
    else{btn.innerHTML=`<span class="cpb-label">рџЊЌ PaГ­s <span class="country-picker-active-count">${all.length}</span></span><span class="cpb-arrow">в–ј</span>`;}
    btn.classList.toggle('open',drop.classList.contains('open'));
  }
  function buildDrop(){
    drop.innerHTML='';
    if(!availableCountries||!availableCountries.length){
      const empty=document.createElement('div');empty.className='cpd-empty';empty.textContent='Sin paГ­ses disponibles';drop.appendChild(empty);return;
    }
    const useGroups=availableCountries.length>4;
    function makeItem(country){
      const item=document.createElement('div');
      item.className='cpd-item'+(selected.includes(country)?' selected':'');
      const flag=countryFlag(country);
      item.innerHTML=`<input type="checkbox" ${selected.includes(country)?'checked':''}><span style="display:flex;align-items:center;gap:6px"><span style="font-size:15px">${flag}</span>${country}</span>`;
      item.addEventListener('click',e=>{
        const cb=item.querySelector('input');
        if(e.target!==cb) cb.checked=!cb.checked;
        if(cb.checked){if(!selected.includes(country))selected.push(country);}
        else{selected=selected.filter(x=>x!==country);}
        item.classList.toggle('selected',selected.includes(country));
        updateBtn();onChange(getAll());
      });
      return item;
    }
    if(useGroups){
      const groups=groupByRegion(availableCountries);
      const regionOrder=['asia','europa','america','oceania','otros'];
      let first=true;
      regionOrder.forEach(r=>{
        if(!groups[r]||!groups[r].length) return;
        if(!first){const sep=document.createElement('div');sep.className='cpd-separator';drop.appendChild(sep);}
        first=false;
        const label=document.createElement('div');
        label.style.cssText='font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);padding:5px 10px 3px';
        label.textContent=REGION_LABELS[r];
        drop.appendChild(label);
        groups[r].forEach(c=>drop.appendChild(makeItem(c)));
      });
    } else {
      availableCountries.forEach(c=>drop.appendChild(makeItem(c)));
    }
  }
  btn.addEventListener('click',e=>{
    e.stopPropagation();
    const isOpen=drop.classList.contains('open');
    document.querySelectorAll('.country-picker-dropdown.open').forEach(d=>d.classList.remove('open'));
    document.querySelectorAll('.country-picker-btn.open').forEach(b=>b.classList.remove('open'));
    if(!isOpen){buildDrop();drop.classList.add('open');btn.classList.add('open');}
  });
  document.addEventListener('click',()=>{drop.classList.remove('open');btn.classList.remove('open');});
  drop.addEventListener('click',e=>e.stopPropagation());
  wrap.appendChild(btn);wrap.appendChild(drop);
  wrap._getSelected=getAll;
  wrap._reset=()=>{selected=[];buildDrop();updateBtn();onChange([]);};
  wrap._updateCountries=(newCountries)=>{
    availableCountries=newCountries;
    // Remove selected that no longer exist
    selected=selected.filter(s=>newCountries.includes(s));
    updateBtn();onChange(getAll());
  };
  return wrap;
}

const paginationState={series:{airing:1,notstarted:1,finished:1,finished_serie:1,finished_webserie:1},movies:1,upcoming:1};

function paginationHtml(current,total,onPageFn){
  if(total<=1) return '';
  const pages=[];
  // Always show first, last, currentВ±1, and ellipsis
  const show=new Set([1,total,current,current-1,current+1].filter(p=>p>=1&&p<=total));
  const sorted=[...show].sort((a,b)=>a-b);
  let html='<div class="pagination">';
  html+=`<button class="pg-btn pg-prev" onclick="${onPageFn}(${current-1})" ${current===1?'disabled':''}>&larr;</button>`;
  let prev=null;
  sorted.forEach(p=>{
    if(prev!==null&&p-prev>1) html+='<span class="pg-ellipsis">вЂ¦</span>';
    html+=`<button class="pg-btn${p===current?' pg-active':''}" onclick="${onPageFn}(${p})">${p}</button>`;
    prev=p;
  });
  html+=`<button class="pg-btn pg-next" onclick="${onPageFn}(${current+1})" ${current===total?'disabled':''}>&rarr;</button>`;
  html+='</div>';
  return html;
}

function renderListResults(){
  const resultsEl=document.getElementById('listResults');
  if(!resultsEl) return;
  // Sync select values in case called from filter clear
  const sortSel=document.getElementById('seriesSortSel');
  const bookSel=document.getElementById('seriesBookSel');
  const yearSel=document.getElementById('seriesYearSel');
  const genreSel=document.getElementById('seriesGenreSel');
  const clearBtn=document.getElementById('seriesClearBtn');
  const typeSel=document.getElementById('seriesTypeSel');
  if(sortSel) sortSel.value=seriesFilters.sort;
  if(bookSel) bookSel.value=seriesFilters.book;
  if(genreSel) genreSel.value=seriesFilters.genre;
  if(typeSel) typeSel.value=seriesFilters.type||'';
  if(clearBtn) clearBtn.style.display=(seriesFilters.countries&&seriesFilters.countries.length||seriesFilters.book!=='all'||seriesFilters.year||seriesFilters.genre||seriesFilters.type||seriesFilters.region)?'':'none';
  // Refresh region pills active state
  const regionPillsEl=document.getElementById('seriesRegionPills');
  if(regionPillsEl){
    regionPillsEl.querySelectorAll('.region-pill').forEach(btn=>{
      const r=btn.getAttribute('onclick')||'';
      const match=r.match(/region='([^']*)'/);
      const pillRegion=match?match[1]:'';
      btn.classList.toggle('active',pillRegion===seriesFilters.region);
    });
  }

  const active=state.series.filter(s=>!s.upcoming&&s.category!=='anime'&&s.category!=='reality');
  const filtered=applySeriesFilters(active);
  const now=new Date();

  // "En emisiГіn": ya ha emitido al menos 1 ep Y tiene episodios futuros pendientes
  const airing=filtered.filter(s=>{
    const eps=genEps(s);
    const hasAired=eps.some(e=>new Date(e.date+'T12:00:00')<=now&&!e.skipped);
    const hasFuture=eps.some(e=>new Date(e.date+'T12:00:00')>now&&!e.skipped);
    return hasAired&&hasFuture;
  });
  // Ordenar "en emisiГіn" por dГ­a de la semana del prГіximo ep (lun=0 вЂ¦ dom=6)
  airing.sort((a,b)=>{
    const nextEp=s=>{const eps=genEps(s);return eps.find(e=>new Date(e.date+'T12:00:00')>now&&!e.skipped);};
    const dayOf=s=>{const ep=nextEp(s);if(!ep)return 7;return(new Date(ep.date+'T12:00:00').getDay()+6)%7;};
    return dayOf(a)-dayOf(b);
  });

  // "Estreno PrГіximo": todos los episodios son futuros, ninguno emitido aГєn
  const notStarted=filtered.filter(s=>{
    const eps=genEps(s);
    const hasAired=eps.some(e=>new Date(e.date+'T12:00:00')<=now&&!e.skipped);
    const hasFuture=eps.some(e=>new Date(e.date+'T12:00:00')>now&&!e.skipped);
    return hasFuture&&!hasAired;
  });

  // "Finalizadas": sin episodios futuros
  const finished=filtered.filter(s=>{
    const eps=genEps(s);
    return !eps.some(e=>new Date(e.date+'T12:00:00')>now&&!e.skipped);
  });
  const finishedSeries=finished.filter(s=>s.seriesType!=='webserie');
  const finishedWebseries=finished.filter(s=>s.seriesType==='webserie');

  // Auto-switch subtab if current subtab has no results
  if(seriesSubtab==='airing'&&!airing.length){
    if(notStarted.length) seriesSubtab='notstarted';
    else if(finished.length) seriesSubtab='finished';
  }
  if(seriesSubtab==='notstarted'&&!notStarted.length){
    if(airing.length) seriesSubtab='airing';
    else if(finished.length) seriesSubtab='finished';
  }
  if(seriesSubtab==='finished'&&!finished.length){
    if(airing.length) seriesSubtab='airing';
    else if(notStarted.length) seriesSubtab='notstarted';
  }

  if(!filtered.length){
    resultsEl.innerHTML='<div class="search-empty">No se encontrГі ninguna serie con esos filtros.</div>';
    return;
  }

  // Build subtabs вЂ” only show "Estreno PrГіximo" tab if there are any
  let tabsHtml=`<div class="subtabs">
    <button class="subtab${seriesSubtab==='airing'?' active':''}" onclick="switchSeriesSubtab('airing')">
      En emisiГіn<span class="subtab-count">${airing.length}</span>
    </button>`;
  if(notStarted.length){
    tabsHtml+=`<button class="subtab${seriesSubtab==='notstarted'?' active':''}" onclick="switchSeriesSubtab('notstarted')">
      Estreno prГіximo<span class="subtab-count">${notStarted.length}</span>
    </button>`;
  }
  tabsHtml+=`<button class="subtab${seriesSubtab==='finished'?' active':''}" onclick="switchSeriesSubtab('finished')">
      Finalizadas<span class="subtab-count">${finished.length}</span>
    </button>
  </div>`;

  let html=tabsHtml;

  function renderSubtabGrid(list, emptyMsg, pageKey){
    if(!list.length){ return '<div class="search-empty">'+emptyMsg+'</div>'; }
    const key=pageKey||seriesSubtab;
    const page=paginationState.series[key]||1;
    const totalPages=Math.ceil(list.length/PAGE_SIZE);
    const safePage=Math.min(page,totalPages);
    if(paginationState.series[key]!==safePage) paginationState.series[key]=safePage;
    const slice=list.slice((safePage-1)*PAGE_SIZE, safePage*PAGE_SIZE);
    let out=`<div class="books-count">Mostrando <strong>${(safePage-1)*PAGE_SIZE+1}вЂ“${Math.min(safePage*PAGE_SIZE,list.length)}</strong> de <strong>${list.length}</strong> serie${list.length!==1?'s':''}</div><div class="series-grid">`;
    slice.forEach(s=>{ out+=seriesCardHtml(s, state.series.indexOf(s)); });
    out+='</div>';
    out+=paginationHtml(safePage, totalPages, `setSeriesPage_${key}`);
    return out;
  }

  // Expose page setters globally
  window.setSeriesPage_airing=p=>{paginationState.series.airing=p;saveSession();renderListResults();scrollToResults('listResults');};
  window.setSeriesPage_notstarted=p=>{paginationState.series.notstarted=p;saveSession();renderListResults();scrollToResults('listResults');};
  window.setSeriesPage_finished=p=>{paginationState.series.finished=p;saveSession();renderListResults();scrollToResults('listResults');};
  window.setSeriesPage_finished_serie=p=>{paginationState.series.finished_serie=p;saveSession();renderListResults();scrollToResults('listResults');};
  window.setSeriesPage_finished_webserie=p=>{paginationState.series.finished_webserie=p;saveSession();renderListResults();scrollToResults('listResults');};

  if(seriesSubtab==='airing'){
    html+=renderSubtabGrid(airing,'No hay series en emisiГіn con esos filtros.','airing');
  } else if(seriesSubtab==='notstarted'){
    html+=renderSubtabGrid(notStarted,'No hay series con estreno prГіximo con esos filtros.','notstarted');
  } else {
    // Finalizadas: sub-subtabs Serie / Web Serie siempre visibles
    if(seriesFinishedSubtab==='webserie'&&!finishedWebseries.length) seriesFinishedSubtab='all';
    if(seriesFinishedSubtab==='serie'&&!finishedSeries.length) seriesFinishedSubtab='all';
    html+=`<div class="subtabs" style="margin-top:10px;margin-bottom:14px">
      <button class="subtab${seriesFinishedSubtab==='all'?' active':''}" onclick="seriesFinishedSubtab='all';saveSession();renderListResults()">
        Todas<span class="subtab-count">${finished.length}</span>
      </button>
      <button class="subtab${seriesFinishedSubtab==='serie'?' active':''}" onclick="seriesFinishedSubtab='serie';saveSession();renderListResults()">
        Serie<span class="subtab-count">${finishedSeries.length}</span>
      </button>
      <button class="subtab${seriesFinishedSubtab==='webserie'?' active':''}" onclick="seriesFinishedSubtab='webserie';saveSession();renderListResults()">
        Web serie<span class="subtab-count">${finishedWebseries.length}</span>
      </button>
    </div>`;
    const shownFinished=seriesFinishedSubtab==='serie'?finishedSeries:seriesFinishedSubtab==='webserie'?finishedWebseries:finished;
    const finishedKey=seriesFinishedSubtab==='serie'?'finished_serie':seriesFinishedSubtab==='webserie'?'finished_webserie':'finished';
    html+=renderSubtabGrid(shownFinished,'No hay series finalizadas con esos filtros.',finishedKey);
  }
  resultsEl.innerHTML=html;
}

function scrollToResults(id){
  const el=document.getElementById(id);
  if(el) el.scrollIntoView({behavior:'smooth',block:'start'});
}

function getCountries(arr){
  // Expandir paГ­ses compuestos ('A / B') en atГіmicos para el picker
  const atomic=[];
  arr.forEach(s=>{
    parseCountryParts(s.country||'').forEach(p=>{if(p&&!atomic.includes(p))atomic.push(p);});
  });
  return atomic.sort((a,b)=>a.localeCompare(b,'es'));
}

function getSeriesLastActivity(s){
  const eps=genEps(s);
  const now=new Date();
  const aired=eps.filter(e=>!e.skipped&&new Date(e.date+'T12:00:00')<=now).map(e=>e.date);
  if(aired.length) return aired[aired.length-1];
  const upcoming=eps.filter(e=>!e.skipped&&new Date(e.date+'T12:00:00')>now).map(e=>e.date);
  if(upcoming.length) return upcoming[0];
  const seasons=getSeasons(s);
  return (seasons[0]&&seasons[0].startDate)||s.startDate||'';
}


/** Comprueba si un item (con campo country) pertenece a alguno de los paГ­ses seleccionados.
 *  Funciona con valores compuestos: 'Tailandia / JapГіn' matchea tanto 'Tailandia' como 'JapГіn'.
 */
function itemMatchesCountries(item, selectedCountries){
  if(!selectedCountries||!selectedCountries.length) return true;
  const parts=parseCountryParts(item.country||'');
  return selectedCountries.some(c=>parts.includes(c));
}

function applySeriesFilters(arr){
  let r=[...arr];
  const q=seriesFilters.q.toLowerCase().trim();
  if(q) r=r.filter(s=>s.name.toLowerCase().includes(q)||(s.nameEn||'').toLowerCase().includes(q)||(s.country||'').toLowerCase().includes(q)||(s.network||'').toLowerCase().includes(q));
  if(seriesFilters.countries&&seriesFilters.countries.length) r=r.filter(s=>itemMatchesCountries(s,seriesFilters.countries));
  if(seriesFilters.book==='yes') r=r.filter(s=>s.basedOnBook);
  if(seriesFilters.book==='no') r=r.filter(s=>!s.basedOnBook);
  if(seriesFilters.year) r=r.filter(s=>{ const seasons=getSeasons(s); return seasons.some(t=>t.startDate&&t.startDate.startsWith(seriesFilters.year))||(s.startDate&&s.startDate.startsWith(seriesFilters.year)); });
  if(seriesFilters.genre) r=r.filter(s=>s.genres&&s.genres.includes(seriesFilters.genre));
  if(seriesFilters.type) r=r.filter(s=>(s.seriesType||'serie')===seriesFilters.type);
  if(seriesFilters.region){
    const regionCountries=COUNTRY_REGIONS[seriesFilters.region]||[];
    r=r.filter(s=>parseCountryParts(s.country||'').some(c=>regionCountries.includes(c)));
  }
  if(seriesFilters.sort==='az') r.sort((a,b)=>a.name.localeCompare(b.name,'es'));
  else if(seriesFilters.sort==='za') r.sort((a,b)=>b.name.localeCompare(a.name,'es'));
  else if(seriesFilters.sort==='eps') r.sort((a,b)=>b.totalEpisodes-a.totalEpisodes);
  else if(seriesFilters.sort==='date') r.sort((a,b)=>{ const da=(getSeasons(a)[0]?.startDate||a.startDate||''); const db=(getSeasons(b)[0]?.startDate||b.startDate||''); return db.localeCompare(da); });
  else if(seriesFilters.sort==='dateold') r.sort((a,b)=>{ const da=(getSeasons(a)[0]?.startDate||a.startDate||''); const db=(getSeasons(b)[0]?.startDate||b.startDate||''); return da.localeCompare(db); });
  else if(seriesFilters.sort==='recent') r.sort((a,b)=>{const ua=a.updatedAt||'';const ub=b.updatedAt||'';return ub.localeCompare(ua);});
  return r;
}

let upcomingFilters={q:'',countries:[],sort:'az',book:'all',year:'',genre:''};

function applyUpcomingFilters(arr){
  let r=[...arr];
  const q=upcomingFilters.q.toLowerCase().trim();
  if(q) r=r.filter(s=>s.name.toLowerCase().includes(q)||(s.nameEn||'').toLowerCase().includes(q)||(s.country||'').toLowerCase().includes(q)||(s.network||'').toLowerCase().includes(q));
  if(upcomingFilters.countries&&upcomingFilters.countries.length) r=r.filter(s=>itemMatchesCountries(s,upcomingFilters.countries));
  if(upcomingFilters.book==='yes') r=r.filter(s=>s.basedOnBook);
  if(upcomingFilters.book==='no') r=r.filter(s=>!s.basedOnBook);
  if(upcomingFilters.year) r=r.filter(s=>s.startDate&&s.startDate.startsWith(upcomingFilters.year));
  if(upcomingFilters.genre) r=r.filter(s=>s.genres&&s.genres.includes(upcomingFilters.genre));
  if(upcomingFilters.sort==='az') r.sort((a,b)=>a.name.localeCompare(b.name,'es'));
  else if(upcomingFilters.sort==='za') r.sort((a,b)=>b.name.localeCompare(a.name,'es'));
  else if(upcomingFilters.sort==='recent') r.sort((a,b)=>{
    // Score by completeness (poster+synopsis+trailer = more recently updated)
    const score=s=>((s.poster?2:0)+(s.synopsis?2:0)+(s.trailerUrl?1:0)+(s.bookCoverUrl?1:0));
    const sd=score(b)-score(a);
    if(sd!==0) return sd;
    // Fallback: higher ID = added later
    return Number(b.id||0)-Number(a.id||0);
  });
  return r;
}

function renderUpcomingResults(){
  const resultsEl=document.getElementById('upcomingResults');
  if(!resultsEl) return;
  const sortSel=document.getElementById('upcomingSortSel');
  const clearBtn=document.getElementById('upcomingClearBtn');
  const genreSel=document.getElementById('upcomingGenreSel');
  if(sortSel) sortSel.value=upcomingFilters.sort;
  if(genreSel) genreSel.value=upcomingFilters.genre;
  if(clearBtn) clearBtn.style.display=(upcomingFilters.countries&&upcomingFilters.countries.length||upcomingFilters.book!=='all'||upcomingFilters.year||upcomingFilters.genre)?'':'none';

  const allUpcoming=state.series.filter(s=>s.upcoming&&s.category!=='anime'&&s.category!=='reality');
  const upcoming=applyUpcomingFilters(allUpcoming);

  if(!upcoming.length){
    resultsEl.innerHTML='<div class="search-empty">No se encontrГі ninguna serie con esos filtros.</div>';
    return;
  }
  window.setUpcomingPage=p=>{paginationState.upcoming=p;saveSession();renderUpcomingResults();scrollToResults('upcomingResults');};
  const upPage=Math.min(paginationState.upcoming,Math.ceil(upcoming.length/PAGE_SIZE))||1;
  paginationState.upcoming=upPage;
  const upSlice=upcoming.slice((upPage-1)*PAGE_SIZE, upPage*PAGE_SIZE);
  const upTotalPages=Math.ceil(upcoming.length/PAGE_SIZE);
  let html=`<div class="books-count">Mostrando <strong>${(upPage-1)*PAGE_SIZE+1}вЂ“${Math.min(upPage*PAGE_SIZE,upcoming.length)}</strong> de <strong>${upcoming.length}</strong> serie${upcoming.length!==1?'s':''}</div>
  <div class="upcoming-grid">`;
  upSlice.forEach((s)=>{
    const si=state.series.indexOf(s);
    const posterEl=s.poster
      ?`<div class="upcoming-poster-wrap"><img class="upcoming-poster" src="${s.poster}" alt="${s.name}" onerror="this.outerHTML='<div class=upcoming-poster-ph>рџЋ¬</div>'"></div>`
      :`<div class="upcoming-poster-wrap"><div class="upcoming-poster-ph">рџЋ¬</div></div>`;
    const links=s.watchLinks&&s.watchLinks.length?s.watchLinks:(s.networkUrl?[{name:s.network||'Ver',url:s.networkUrl}]:[]);
    const watchRow=links.length?`<div class="upcoming-watch-row">${links.map(l=>`<a class="card-watch-pill" href="${l.url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">в–¶ ${l.name}</a>`).join('')}</div>`:'';
    html+=`<div class="upcoming-card" onclick="openUpcoming(${si})">
      ${posterEl}
      <div class="upcoming-body">
        <div class="card-badges"><span class="badge badge-upcoming">рџ“… PrГіximamente</span>${s.basedOnBook?'<span class="badge badge-book">рџ“– Libro</span>':''}</div>
        <div class="upcoming-name">${s.name}</div>
        <div class="upcoming-meta">${[s.year,s.country?(countryFlag(s.country)+' '+s.country):null,s.network].filter(Boolean).join(' В· ')||'Sin detalles aГєn'}</div>
        ${watchRow}
      </div>
    </div>`;
  });
  html+='</div>';
  html+=paginationHtml(upPage, upTotalPages, 'setUpcomingPage');
  resultsEl.innerHTML=html;
}

function openDay(dateStr){

function daysUntil(dateStr){
  const now=new Date(); now.setHours(0,0,0,0);
  const target=new Date(dateStr+'T00:00:00');
  return Math.round((target-now)/(1000*60*60*24));
}

function buildCastHtml(cast){
  if(!cast||!cast.length) return '<div style="color:var(--muted);font-size:13px;padding:8px 0">Sin informaciГіn de reparto.</div>';
  const actresses=state.actresses||[];

  // Agrupar por clave
  const grouped={};
  cast.forEach(m=>{
    const key=m.coupleType==='other'?'other':(m.coupleType+'_'+(m.coupleNum||1));
    if(!grouped[key]) grouped[key]=[];
    grouped[key].push(m);
  });

  const mainKeys=Object.keys(grouped).filter(k=>k.startsWith('main_')).sort();
  const secKeys=Object.keys(grouped).filter(k=>k.startsWith('secondary_')).sort();
  const otherMembers=grouped['other']||[];

  // Construye la tarjeta de una pareja (o actriz solitaria si solo hay 1)
  function coupleCardHtml(members, cardClass){
    const valid=members.map(m=>({m, a:actresses.find(x=>x.id===m.actressId)})).filter(x=>x.a);
    if(!valid.length) return '';
    if(valid.length===1){
      const {m,a}=valid[0];
      const photo=a.photo?`<img class="cast-photo" src="${a.photo}" alt="${a.name}" onerror="this.outerHTML='<div class=cast-photo-ph>рџЋ­</div>'">`:'<div class="cast-photo-ph">рџЋ­</div>';
      return `<div class="couple-card ${cardClass}">
        <div class="cast-card" onclick="openActressProfile('${a.id}')">${photo}<div class="cast-name">${a.name}</div>${m.character?`<div class="cast-char">${m.character}</div>`:''}</div>
      </div>`;
    }
    // Dos o mГЎs: mostrar las dos primeras juntas con separador, el resto debajo
    const pair=valid.slice(0,2);
    const extra=valid.slice(2);
    const heart=cardClass==='main-couple'?'рџ’•':'рџЊё';
    let inner=pair.map(({m,a})=>{
      const photo=a.photo?`<img class="cast-photo" src="${a.photo}" alt="${a.name}" onerror="this.outerHTML='<div class=cast-photo-ph>рџЋ­</div>'">`:'<div class="cast-photo-ph">рџЋ­</div>';
      return `<div class="cast-card" onclick="openActressProfile('${a.id}')">${photo}<div class="cast-name">${a.name}</div>${m.character?`<div class="cast-char">${m.character}</div>`:''}</div>`;
    }).join(`<div class="couple-sep"><div class="couple-sep-line"></div><div class="couple-sep-heart">${heart}</div><div class="couple-sep-line"></div></div>`);
    // Actrices extra (raras veces habrГЎ mГЎs de 2 en una pareja)
    if(extra.length){
      const extraHtml=extra.map(({m,a})=>{
        const photo=a.photo?`<img class="cast-photo" src="${a.photo}" alt="${a.name}" onerror="this.outerHTML='<div class=cast-photo-ph>рџЋ­</div>'">`:'<div class="cast-photo-ph">рџЋ­</div>';
        return `<div class="cast-card" onclick="openActressProfile('${a.id}')">${photo}<div class="cast-name">${a.name}</div>${m.character?`<div class="cast-char">${m.character}</div>`:''}</div>`;
      }).join('');
      inner+=`<div style="display:flex;flex-wrap:wrap;justify-content:center;width:100%;margin-top:6px">${extraHtml}</div>`;
    }
    return `<div class="couple-card ${cardClass}">${inner}</div>`;
  }

  let html='';

  // в”Ђв”Ђ Parejas principales в”Ђв”Ђ
  if(mainKeys.length){
    const title=mainKeys.length>1?'рџ’• Parejas principales':'рџ’• Pareja principal';
    html+=`<div class="cast-section"><div class="cast-section-title">${title}</div><div class="cast-couples-grid">`;
    mainKeys.forEach(key=>{ html+=coupleCardHtml(grouped[key],'main-couple'); });
    html+=`</div></div>`;
  }

  // в”Ђв”Ђ Parejas secundarias в”Ђв”Ђ
  if(secKeys.length){
    const title=secKeys.length>1?'рџЊё Parejas secundarias':'рџЊё Pareja secundaria';
    html+=`<div class="cast-section"><div class="cast-section-title">${title}</div><div class="cast-couples-grid">`;
    secKeys.forEach(key=>{ html+=coupleCardHtml(grouped[key],'sec-couple'); });
    html+=`</div></div>`;
  }

  // в”Ђв”Ђ Reparto adicional в”Ђв”Ђ
  if(otherMembers.length){
    html+=`<div class="cast-section"><div class="cast-section-title">Reparto</div><div class="cast-solo-grid">`;
    otherMembers.forEach(m=>{
      const a=actresses.find(x=>x.id===m.actressId);
      if(!a) return;
      const photo=a.photo?`<img class="cast-photo" src="${a.photo}" alt="${a.name}" onerror="this.outerHTML='<div class=cast-photo-ph>рџЋ­</div>'">`:'<div class="cast-photo-ph">рџЋ­</div>';
      html+=`<div class="cast-card" onclick="openActressProfile('${a.id}')">${photo}<div class="cast-name">${a.name}</div>${m.character?`<div class="cast-char">${m.character}</div>`:''}</div>`;
    });
    html+=`</div></div>`;
  }

  return html||'<div style="color:var(--muted);font-size:13px;padding:8px 0">Sin informaciГіn de reparto.</div>';
}

      const char=member&&member.character?`<span style="font-size:11px;color:var(--muted)"> В· ${member.character}</span>`:'';
      const thumb=s.poster?`<img src="${s.poster}" style="width:36px;height:54px;border-radius:6px;object-fit:cover;flex-shrink:0" onerror="this.style.display='none'">`:'';
