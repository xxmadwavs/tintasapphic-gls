<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌸 GL Series Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fdf6f9; --surface: #fff; --surface2: #fdf0f5;
  --border: rgba(220,150,180,0.2); --border2: rgba(220,150,180,0.4);
  --text: #3a2535; --muted: #9c7a8a; --accent: #d4608a; --accent2: #e891b0;
  --accent-soft: #f7dce9; --teal: #5bbcb0; --teal-soft: #d4f0ed;
  --lavender: #9b82c9; --lavender-soft: #ede7f8; --radius: 14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;font-size:14px;line-height:1.6;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:
  radial-gradient(ellipse at 5% 15%,rgba(212,96,138,0.07) 0%,transparent 45%),
  radial-gradient(ellipse at 95% 85%,rgba(155,130,201,0.08) 0%,transparent 45%),
  radial-gradient(ellipse at 50% 0%,rgba(91,188,176,0.05) 0%,transparent 40%);
  pointer-events:none;z-index:0}
.petal{position:fixed;pointer-events:none;z-index:0;opacity:.15;font-size:20px;animation:floatPetal 12s ease-in-out infinite}
.petal:nth-child(1){top:8%;left:4%;animation-delay:0s}
.petal:nth-child(2){top:25%;right:3%;animation-delay:3s;font-size:14px}
.petal:nth-child(3){top:60%;left:2%;animation-delay:6s;font-size:12px}
.petal:nth-child(4){top:80%;right:5%;animation-delay:1.5s}
.petal:nth-child(5){top:45%;right:2%;animation-delay:9s;font-size:16px}
@keyframes floatPetal{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-12px) rotate(8deg)}}

.topbar{background:rgba(255,255,255,0.92);border-bottom:1px solid var(--border2);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:58px;position:sticky;top:0;z-index:50;backdrop-filter:blur(12px);box-shadow:0 2px 16px rgba(212,96,138,0.07)}
.logo{font-family:'Playfair Display',serif;font-size:19px;color:var(--accent)}
.logo-wrap{display:flex;flex-direction:column;gap:0}
.logo-sub{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.05em}
.update-badge{font-size:11px;color:var(--muted);background:var(--surface2);padding:3px 10px;border-radius:20px;border:1px solid var(--border)}

.container{max-width:1020px;margin:0 auto;padding:2rem 1.5rem;position:relative;z-index:1}
.page-header{margin-bottom:1.75rem}
.page-title{font-family:'Playfair Display',serif;font-size:34px;color:var(--text);line-height:1.2}
.page-title span{color:var(--accent);font-style:italic}
.page-desc{font-size:13px;color:var(--muted);margin-top:4px}

.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:12px}
.month-display{font-family:'Playfair Display',serif;font-size:24px;color:var(--text)}
.month-display span{color:var(--accent)}
.nav-btns{display:flex;gap:8px}
.nav-btn{background:var(--surface);border:1.5px solid var(--border2);border-radius:20px;padding:6px 16px;cursor:pointer;font-size:13px;color:var(--text);font-family:'Nunito',sans-serif;font-weight:600;transition:all .15s}
.nav-btn:hover{background:var(--accent-soft);border-color:var(--accent2);color:var(--accent)}

.tabs{display:flex;gap:4px;margin-bottom:1.5rem;background:var(--surface2);border-radius:20px;padding:4px;width:fit-content;border:1.5px solid var(--border);flex-wrap:wrap}
.tab{padding:6px 18px;border-radius:16px;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);background:transparent;border:none;font-family:'Nunito',sans-serif;transition:all .15s}
.tab.active{background:var(--surface);color:var(--accent);box-shadow:0 2px 8px rgba(212,96,138,0.12)}
.tab:hover:not(.active){color:var(--text)}

/* Calendar */
.cal-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;min-width:620px}
.day-header{text-align:center;font-size:11px;color:var(--muted);padding:6px 0;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.day-cell{min-height:100px;border-radius:12px;border:1.5px solid var(--border);padding:6px;background:var(--surface);transition:all .2s}
.day-cell.has-eps{cursor:pointer}
.day-cell.has-eps:hover{border-color:var(--accent2);box-shadow:0 4px 16px rgba(212,96,138,0.12);transform:translateY(-1px)}
.day-cell.other-month{opacity:.28;background:transparent}
.day-cell.today{border-color:var(--accent);border-width:2px}
.day-cell.today .day-num{color:var(--accent);font-weight:700}
.day-num{font-size:12px;color:var(--muted);margin-bottom:4px;font-weight:600}
.ep-pill{display:flex;align-items:center;gap:4px;border-radius:7px;padding:3px 5px;margin-bottom:3px;overflow:hidden;cursor:pointer;transition:opacity .15s}
.ep-pill:hover{opacity:.85}
.ep-pill.skipped{opacity:.35;text-decoration:line-through}
.ep-thumb{width:18px;height:26px;border-radius:3px;object-fit:cover;flex-shrink:0}
.ep-thumb-ph{width:18px;height:26px;border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px}
.ep-pill-text{font-size:10px;line-height:1.2;overflow:hidden;min-width:0}
.ep-pill-name{white-space:nowrap;text-overflow:ellipsis;overflow:hidden;font-weight:600}
.ep-pill-ep{opacity:.75;font-size:9px}

/* Series grid */
.series-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px}
.series-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:all .2s;position:relative}
.series-card:hover{border-color:var(--accent2);box-shadow:0 8px 28px rgba(212,96,138,0.14);transform:translateY(-2px)}
.series-card-poster{width:100%;height:200px;object-fit:cover;display:block;background:var(--accent-soft)}
.series-card-poster-ph{width:100%;height:200px;background:linear-gradient(135deg,var(--accent-soft) 0%,var(--lavender-soft) 100%);display:flex;align-items:center;justify-content:center;font-size:36px;color:var(--accent)}
.series-card-body{padding:12px}
.series-card-name{font-size:14px;font-weight:700;color:var(--text);line-height:1.3;margin-bottom:4px}
.series-card-meta{font-size:11px;color:var(--muted);line-height:1.5}
.series-card-next{font-size:11px;color:var(--accent);font-weight:600;margin-top:5px}
.series-card-done{font-size:11px;color:var(--teal);font-weight:600;margin-top:5px}
.progress-wrap{height:3px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width .3s}
.card-badges{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:4px}
.badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700}
.badge-book{background:#fdf3d8;color:#b08a00}
.badge-upcoming{background:var(--lavender-soft);color:var(--lavender)}

/* Upcoming section */
.upcoming-section{margin-bottom:2rem}
.section-heading{font-family:'Playfair Display',serif;font-size:20px;color:var(--text);margin-bottom:.25rem}
.section-desc{font-size:13px;color:var(--muted);margin-bottom:1rem}
.upcoming-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
.upcoming-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:all .2s;position:relative}
.upcoming-card:hover{border-color:var(--lavender);box-shadow:0 6px 20px rgba(155,130,201,0.15);transform:translateY(-2px)}
.upcoming-poster{width:100%;height:180px;object-fit:cover;display:block;background:var(--lavender-soft)}
.upcoming-poster-ph{width:100%;height:180px;background:linear-gradient(135deg,var(--lavender-soft) 0%,var(--accent-soft) 100%);display:flex;align-items:center;justify-content:center;font-size:32px}
.upcoming-overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(to bottom,transparent 40%,rgba(58,37,53,0.7) 100%);pointer-events:none}
.upcoming-label{position:absolute;bottom:8px;left:8px;right:8px;color:#fff;font-size:13px;font-weight:700;line-height:1.3;text-shadow:0 1px 4px rgba(0,0,0,.4)}
.upcoming-body{padding:10px 12px}
.upcoming-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:3px}
.upcoming-meta{font-size:11px;color:var(--muted)}

/* Stats bar */
.stats-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:1.75rem}
.stat-card{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:12px 16px;text-align:center}
.stat-num{font-family:'Playfair Display',serif;font-size:26px;color:var(--accent)}
.stat-label{font-size:11px;color:var(--muted);margin-top:2px;font-weight:600}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(58,37,53,.55);display:none;align-items:center;justify-content:center;z-index:200;padding:1rem;backdrop-filter:blur(3px)}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border:1.5px solid var(--border2);border-radius:20px;padding:0;width:100%;max-width:460px;max-height:92vh;overflow-y:auto;box-shadow:0 24px 64px rgba(212,96,138,0.18)}
.modal-poster-full{width:100%;height:200px;object-fit:cover;border-radius:18px 18px 0 0;display:block}
.modal-poster-full-ph{width:100%;height:140px;background:linear-gradient(135deg,var(--accent-soft),var(--lavender-soft));border-radius:18px 18px 0 0;display:flex;align-items:center;justify-content:center;font-size:40px}
.modal-body{padding:1.5rem}
.modal-title{font-family:'Playfair Display',serif;font-size:22px;color:var(--text);line-height:1.3;margin-bottom:4px}
.modal-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.modal-meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px}
.meta-item{background:var(--surface2);border-radius:8px;padding:7px 10px}
.meta-key{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:600}
.meta-val{font-size:13px;color:var(--text);font-weight:600;margin-top:1px}
.synopsis{font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:14px;padding:10px 14px;background:var(--surface2);border-radius:10px;border-left:3px solid var(--accent2)}
.book-source{font-size:12px;color:#b08a00;background:#fdf3d8;border-radius:8px;padding:7px 12px;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.divider{height:1px;background:var(--border);margin:14px 0}
.ep-detail-list{display:grid;gap:5px}
.ep-detail-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:10px;border:1px solid var(--border);background:var(--surface2)}
.ep-detail-num{font-size:12px;color:var(--muted);min-width:26px;font-weight:600}
.ep-detail-date{flex:1;font-size:13px;color:var(--text)}
.chip{font-size:11px;padding:2px 10px;border-radius:20px;font-weight:600}
.chip.aired{background:var(--teal-soft);color:var(--teal)}
.chip.pending{background:var(--accent-soft);color:var(--accent)}
.chip.skipped{background:#f0eeee;color:#bbb}
.btn{padding:7px 18px;border-radius:20px;border:1.5px solid var(--border2);cursor:pointer;font-size:13px;font-family:'Nunito',sans-serif;font-weight:600;background:transparent;color:var(--text);transition:all .15s}
.btn:hover{background:var(--accent-soft);border-color:var(--accent2);color:var(--accent)}

.loading{text-align:center;color:var(--muted);padding:4rem;font-size:14px}
.error-box{background:rgba(212,92,92,.07);border:1.5px solid rgba(212,92,92,.2);border-radius:12px;padding:1.25rem;color:#c05;font-size:13px;line-height:1.8;margin:1rem 0}
code{background:var(--lavender-soft);color:var(--lavender);padding:1px 7px;border-radius:6px;font-size:12px}
.empty{text-align:center;color:var(--muted);padding:3rem;font-size:13px}
.day-modal-date{font-family:'Playfair Display',serif;font-size:22px;color:var(--text);margin-bottom:4px}
.day-modal-sub{font-size:12px;color:var(--muted);margin-bottom:1.25rem}
.day-ep-row{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:12px;border:1.5px solid var(--border);background:var(--surface2);margin-bottom:6px;cursor:pointer;transition:all .15s}
.day-ep-row:hover{border-color:var(--accent2);background:var(--accent-soft)}
.day-ep-thumb{width:32px;height:46px;border-radius:6px;object-fit:cover;flex-shrink:0}
.day-ep-thumb-ph{width:32px;height:46px;border-radius:6px;background:var(--accent-soft);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.day-ep-info{flex:1;min-width:0}
.day-ep-name{font-size:14px;font-weight:700;color:var(--text)}
.day-ep-meta{font-size:12px;color:var(--muted)}
.upcoming-detail-img{width:100%;height:220px;object-fit:cover;border-radius:18px 18px 0 0;display:block}
.upcoming-detail-img-ph{width:100%;height:160px;background:linear-gradient(135deg,var(--lavender-soft),var(--accent-soft));border-radius:18px 18px 0 0;display:flex;align-items:center;justify-content:center;font-size:40px}

/* Book info */
.book-block{display:flex;align-items:flex-start;gap:12px;background:#fdf3d8;border-radius:10px;padding:10px 12px;margin-bottom:12px;border:1px solid rgba(176,138,0,0.2)}
.book-cover{width:48px;height:70px;border-radius:6px;object-fit:cover;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.12)}
.book-cover-ph{width:48px;height:70px;border-radius:6px;background:#f0e0a0;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.book-info{flex:1;min-width:0}
.book-title-text{font-size:13px;font-weight:700;color:#7a5a00;line-height:1.3;margin-bottom:4px}
.book-link{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;color:#b08a00;text-decoration:none;background:rgba(176,138,0,0.12);border-radius:20px;padding:3px 10px;border:1px solid rgba(176,138,0,0.25);transition:all .15s}
.book-link:hover{background:rgba(176,138,0,0.22);color:#7a5a00}

/* Movies */
.movies-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px}
.movie-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:all .2s;position:relative}
.movie-card:hover{border-color:var(--lavender);box-shadow:0 8px 28px rgba(155,130,201,0.18);transform:translateY(-2px)}
.movie-card-poster{width:100%;height:200px;object-fit:cover;display:block;background:var(--lavender-soft)}
.movie-card-poster-ph{width:100%;height:200px;background:linear-gradient(135deg,var(--lavender-soft) 0%,var(--accent-soft) 100%);display:flex;align-items:center;justify-content:center;font-size:36px;color:var(--lavender)}
.movie-card-body{padding:12px}
.movie-card-name{font-size:14px;font-weight:700;color:var(--text);line-height:1.3;margin-bottom:4px}
.movie-card-meta{font-size:11px;color:var(--muted);line-height:1.5}
.movie-card-date{font-size:11px;color:var(--lavender);font-weight:600;margin-top:5px}
.ep-pill.movie-pill{border:1.5px solid rgba(155,130,201,0.3)}
</style>
</head>
<body>
<div class="petal">🌸</div><div class="petal">🌷</div><div class="petal">🌸</div><div class="petal">🌺</div><div class="petal">🌸</div>

<div class="topbar">
  <div class="logo-wrap">
    <span class="logo">🌸 GL Series Calendar</span>
    <span class="logo-sub">Girls' Love · Seguimiento de emisiones</span>
  </div>
  <span class="update-badge" id="updateBadge"></span>
</div>

<div class="container">
  <div class="page-header">
    <h1 class="page-title">Calendario de <span>series GL</span></h1>
    <p class="page-desc">Todas las emisiones semanales en un solo lugar 💕</p>
  </div>

  <div class="stats-bar" id="statsBar"></div>

  <div class="tabs">
    <button class="tab active" id="tabCal" onclick="switchTab('cal')">📅 Calendario</button>
    <button class="tab" id="tabList" onclick="switchTab('list')">🎬 Series</button>
    <button class="tab" id="tabMovies" onclick="switchTab('movies')">🎥 Películas</button>
    <button class="tab" id="tabUpcoming" onclick="switchTab('upcoming')">✨ Próximamente</button>
  </div>

  <div id="viewCal">
    <div class="cal-nav">
      <div class="month-display" id="monthDisplay"></div>
      <div class="nav-btns">
        <button class="nav-btn" id="prevBtn">← Anterior</button>
        <button class="nav-btn" id="todayBtn">Hoy</button>
        <button class="nav-btn" id="nextBtn">Siguiente →</button>
      </div>
    </div>
    <div id="calInner"><div class="loading">🌸 Cargando…</div></div>
  </div>
  <div id="viewList" style="display:none"></div>
  <div id="viewMovies" style="display:none"></div>
  <div id="viewUpcoming" style="display:none"></div>
</div>

<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalBox"></div>
</div>

<script>
const MONTHS=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DAYS=['L','M','X','J','V','S','D'];
const DAYS_L=['lunes','martes','miércoles','jueves','viernes','sábado','domingo'];
const PALETTE=['#d4608a','#5bbcb0','#9b82c9','#e8a84a','#e06fa0','#4eadb5','#b07ad4','#d47a4e'];
const PALETTE_SOFT=['rgba(212,96,138,0.13)','rgba(91,188,176,0.13)','rgba(155,130,201,0.13)','rgba(232,168,74,0.13)','rgba(224,111,160,0.13)','rgba(78,173,181,0.13)','rgba(176,122,212,0.13)','rgba(212,122,78,0.13)'];

let state={month:new Date().getMonth(),year:new Date().getFullYear(),tab:'cal',series:[],movies:[]};

function getDow(d){return(new Date(d+'T12:00:00').getDay()+6)%7}
function addDays(d,n){const x=new Date(d+'T12:00:00');x.setDate(x.getDate()+n);return x.toISOString().slice(0,10)}
function fmtDate(d){const x=new Date(d+'T12:00:00');return`${x.getDate()} ${MONTHS[x.getMonth()].slice(0,3)} ${x.getFullYear()}`}
function toStr(y,m,d){return`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`}
function getEmissionDays(s){if(s.emissionDays&&s.emissionDays.length>0)return[...s.emissionDays].sort((a,b)=>a-b);if(s.dayOfWeek!==undefined)return[s.dayOfWeek];return[0]}

function genEps(s){
  const days=getEmissionDays(s), skipDates=new Set(s.skipDates||[]), epOverrides=s.episodes||[];
  let firstDate=null;
  for(let o=0;o<14;o++){const c=addDays(s.startDate,o);if(days.includes(getDow(c))){firstDate=c;break;}}
  if(!firstDate) firstDate=s.startDate;
  const weekStart=addDays(firstDate,-getDow(firstDate));
  const slots=[], wn=Math.ceil((s.totalEpisodes+(skipDates.size||0))/days.length)+4;
  for(let w=0;w<wn&&slots.length<s.totalEpisodes+skipDates.size+10;w++){
    for(const d of days){const date=addDays(weekStart,d+w*7);if(date>=firstDate)slots.push(date);}
  }
  const valid=slots.filter(d=>!skipDates.has(d));
  const eps=[];
  for(let i=0;i<s.totalEpisodes;i++){
    const epNum=i+1, base=valid[i]||addDays(firstDate,i*7);
    const ov=epOverrides.find(e=>e.num===epNum);
    eps.push(ov?{...ov}:{num:epNum,date:base,skipped:false});
  }
  return eps;
}

async function loadData(){
  try{
    const r=await fetch('data.json?t='+Date.now());
    if(!r.ok) throw new Error('No se encontró data.json (código '+r.status+')');
    const d=await r.json();
    state.series=d.series||[];
    state.movies=d.movies||[];
    if(d.exportedAt){
      const dt=new Date(d.exportedAt);
      document.getElementById('updateBadge').textContent='✓ Act. '+dt.toLocaleDateString('es-ES',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
    }
    return true;
  }catch(e){
    document.getElementById('calInner').innerHTML=`<div class="error-box"><strong>No se pudo cargar el calendario.</strong><br>Asegúrate de que <code>data.json</code> está en la misma carpeta.<br>Error: ${e.message}</div>`;
    return false;
  }
}

function renderStats(){
  const activeSeries=state.series.filter(s=>!s.upcoming);
  const now=new Date();
  const totalEps=activeSeries.reduce((a,s)=>a+s.totalEpisodes,0);
  const airedEps=activeSeries.reduce((a,s)=>{ const eps=genEps(s); return a+eps.filter(e=>new Date(e.date+'T12:00:00')<=now&&!e.skipped).length; },0);
  const upcoming=state.series.filter(s=>s.upcoming).length;
  const bookBased=state.series.filter(s=>s.basedOnBook).length;
  const movieCount=state.movies.length;
  document.getElementById('statsBar').innerHTML=`
    <div class="stat-card"><div class="stat-num">${activeSeries.length}</div><div class="stat-label">Series activas</div></div>
    <div class="stat-card"><div class="stat-num">${airedEps}</div><div class="stat-label">Episodios emitidos</div></div>
    <div class="stat-card"><div class="stat-num">${totalEps-airedEps}</div><div class="stat-label">Episodios pendientes</div></div>
    ${movieCount?`<div class="stat-card"><div class="stat-num" style="color:var(--lavender)">${movieCount}</div><div class="stat-label">Películas</div></div>`:''}
    ${upcoming?`<div class="stat-card"><div class="stat-num" style="color:var(--lavender)">${upcoming}</div><div class="stat-label">Próximamente</div></div>`:''}
    ${bookBased?`<div class="stat-card"><div class="stat-num" style="color:#b08a00">${bookBased}</div><div class="stat-label">Basadas en libro</div></div>`:''}
  `;
}

function getEpMap(y,m){
  const map={};
  state.series.filter(s=>!s.upcoming).forEach((s,si)=>{
    genEps(s).forEach(ep=>{
      const d=new Date(ep.date+'T12:00:00');
      if(d.getFullYear()===y&&d.getMonth()===m){
        if(!map[ep.date]) map[ep.date]=[];
        map[ep.date].push({s,ep,si,type:'series'});
      }
    });
  });
  state.movies.forEach((mv,mi)=>{
    if(!mv.date) return;
    const d=new Date(mv.date+'T12:00:00');
    if(d.getFullYear()===y&&d.getMonth()===m){
      if(!map[mv.date]) map[mv.date]=[];
      map[mv.date].push({s:mv,ep:{num:null,date:mv.date,skipped:false},si:mi,type:'movie'});
    }
  });
  return map;
}

function renderCal(){
  const {month:m,year:y}=state;
  document.getElementById('monthDisplay').innerHTML=`<span>${MONTHS[m]}</span> ${y}`;
  const epMap=getEpMap(y,m);
  const first=new Date(y,m,1), startDow=(first.getDay()+6)%7;
  const dim=new Date(y,m+1,0).getDate(), prevDim=new Date(y,m,0).getDate();
  const tStr=toStr(new Date().getFullYear(),new Date().getMonth(),new Date().getDate());
  let html='<div class="cal-wrap"><div class="cal-grid">';
  DAYS.forEach(d=>{html+=`<div class="day-header">${d}</div>`;});
  for(let i=startDow-1;i>=0;i--)
    html+=`<div class="day-cell other-month"><div class="day-num">${prevDim-i}</div></div>`;
  for(let d=1;d<=dim;d++){
    const ds=toStr(y,m,d), eps=epMap[ds]||[], isToday=ds===tStr;
    html+=`<div class="day-cell${isToday?' today':''}${eps.length?' has-eps':''}" ${eps.length?`onclick="openDay('${ds}')"`:''}><div class="day-num">${d}</div>`;
    eps.slice(0,3).forEach(({s,ep,si,type})=>{
      if(type==='movie'){
        const bg='rgba(155,130,201,0.15)';
        const thumb=s.poster?`<img class="ep-thumb" src="${s.poster}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`:'' ;
        const ph=`<div class="ep-thumb-ph" style="${s.poster?'display:none':''}background:${bg}">🎥</div>`;
        html+=`<div class="ep-pill movie-pill" style="background:${bg}">
          ${thumb}${ph}
          <div class="ep-pill-text" style="color:var(--lavender)">
            <div class="ep-pill-name">${s.name}</div>
            <div class="ep-pill-ep">🎥 Película</div>
          </div></div>`;
      } else {
        const col=PALETTE[si%PALETTE.length], bg=PALETTE_SOFT[si%PALETTE_SOFT.length];
        const thumb=s.poster?`<img class="ep-thumb" src="${s.poster}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`:'' ;
        const ph=`<div class="ep-thumb-ph" style="${s.poster?'display:none':''}background:${bg}">🎬</div>`;
        html+=`<div class="ep-pill${ep.skipped?' skipped':''}" style="background:${bg}">
          ${thumb}${ph}
          <div class="ep-pill-text" style="color:${col}">
            <div class="ep-pill-name">${s.name}</div>
            <div class="ep-pill-ep">Ep. ${ep.num}${ep.skipped?' · ✗':''}</div>
          </div></div>`;
      }
    });
    if(eps.length>3) html+=`<div style="font-size:10px;color:var(--muted);padding:2px 4px">+${eps.length-3} más</div>`;
    html+='</div>';
  }
  const rem=(7-(startDow+dim)%7)%7;
  for(let d=1;d<=rem;d++) html+=`<div class="day-cell other-month"><div class="day-num">${d}</div></div>`;
  html+='</div></div>';
  document.getElementById('calInner').innerHTML=html;
}

        <div class="movie-card-body">
          <div class="card-badges">${mv.basedOnBook?'<span class="badge badge-book">📖 Libro</span>':''}${mv.country?`<span class="badge" style="background:var(--surface2);color:var(--muted)">${mv.country}</span>`:''}</div>
          <div class="movie-card-name">${mv.name}</div>
          <div class="movie-card-meta">${mv.network||''}</div>
          ${mv.date?`<div class="movie-card-date" style="color:var(--teal)">✓ ${fmtDate(mv.date)}</div>`:''}
        </div></div>`;
    });
    html+='</div>';
  }
  view.innerHTML=html;
}

function closeModal(){ document.getElementById('modalBg').classList.remove('open'); }

function switchTab(tab){
  state.tab=tab;
  ['cal','list','movies','upcoming'].forEach(t=>{
    const btn=document.getElementById('tab'+t.charAt(0).toUpperCase()+t.slice(1));
    const view=document.getElementById('view'+t.charAt(0).toUpperCase()+t.slice(1));
    if(btn) btn.className='tab'+(tab===t?' active':'');
    if(view) view.style.display=tab===t?'':'none';
  });
  if(tab==='list') renderList();
  if(tab==='movies') renderMovies();
  if(tab==='upcoming') renderUpcoming();
}

document.getElementById('prevBtn').onclick=()=>{state.month--;if(state.month<0){state.month=11;state.year--;}renderCal();};
document.getElementById('nextBtn').onclick=()=>{state.month++;if(state.month>11){state.month=0;state.year++;}renderCal();};
document.getElementById('todayBtn').onclick=()=>{state.month=new Date().getMonth();state.year=new Date().getFullYear();renderCal();};

(async()=>{ if(await loadData()){renderStats();renderCal();} })();
</script>
</body>
</html>
