<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌸 GL Series Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fdf6f9;
  --surface: #fff;
  --surface2: #fdf0f5;
  --border: rgba(220,150,180,0.2);
  --border2: rgba(220,150,180,0.4);
  --text: #3a2535;
  --muted: #9c7a8a;
  --accent: #d4608a;
  --accent2: #e891b0;
  --accent-soft: #f7dce9;
  --teal: #5bbcb0;
  --teal-soft: #d4f0ed;
  --lavender: #9b82c9;
  --lavender-soft: #ede7f8;
  --radius: 14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;font-size:14px;line-height:1.6;min-height:100vh;overflow-x:hidden}

body::before{content:'';position:fixed;inset:0;background:
  radial-gradient(ellipse at 5% 15%, rgba(212,96,138,0.07) 0%,transparent 45%),
  radial-gradient(ellipse at 95% 85%, rgba(155,130,201,0.08) 0%,transparent 45%),
  radial-gradient(ellipse at 50% 0%, rgba(91,188,176,0.05) 0%,transparent 40%);
  pointer-events:none;z-index:0}

/* Floating petals decoration */
.petal{position:fixed;pointer-events:none;z-index:0;opacity:.18;font-size:20px;animation:floatPetal 12s ease-in-out infinite}
.petal:nth-child(1){top:8%;left:4%;animation-delay:0s}
.petal:nth-child(2){top:25%;right:3%;animation-delay:3s;font-size:14px}
.petal:nth-child(3){top:60%;left:2%;animation-delay:6s;font-size:12px}
.petal:nth-child(4){top:80%;right:5%;animation-delay:1.5s}
.petal:nth-child(5){top:45%;right:2%;animation-delay:9s;font-size:16px}
@keyframes floatPetal{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-12px) rotate(8deg)}}

.topbar{background:rgba(255,255,255,0.92);border-bottom:1px solid var(--border2);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:58px;position:sticky;top:0;z-index:50;backdrop-filter:blur(12px);box-shadow:0 2px 16px rgba(212,96,138,0.07)}
.logo{font-family:'Playfair Display',serif;font-size:19px;color:var(--accent);display:flex;align-items:center;gap:6px}
.logo-sub{font-family:'Nunito',sans-serif;font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.05em;margin-top:1px}
.logo-wrap{display:flex;flex-direction:column;gap:0}
.update-badge{font-size:11px;color:var(--muted);background:var(--surface2);padding:3px 10px;border-radius:20px;border:1px solid var(--border)}

.container{max-width:1020px;margin:0 auto;padding:2rem 1.5rem;position:relative;z-index:1}

.page-header{margin-bottom:2rem}
.page-title{font-family:'Playfair Display',serif;font-size:34px;color:var(--text);line-height:1.2}
.page-title span{color:var(--accent);font-style:italic}
.page-desc{font-size:13px;color:var(--muted);margin-top:4px}

.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:12px}
.month-display{font-family:'Playfair Display',serif;font-size:24px;color:var(--text)}
.month-display span{color:var(--accent)}
.nav-btns{display:flex;gap:8px}
.nav-btn{background:var(--surface);border:1.5px solid var(--border2);border-radius:20px;padding:6px 16px;cursor:pointer;font-size:13px;color:var(--text);font-family:'Nunito',sans-serif;font-weight:600;transition:all .15s}
.nav-btn:hover{background:var(--accent-soft);border-color:var(--accent2);color:var(--accent)}

.tabs{display:flex;gap:4px;margin-bottom:1.5rem;background:var(--surface2);border-radius:20px;padding:4px;width:fit-content;border:1.5px solid var(--border)}
.tab{padding:6px 20px;border-radius:16px;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);background:transparent;border:none;font-family:'Nunito',sans-serif;transition:all .15s}
.tab.active{background:var(--surface);color:var(--accent);box-shadow:0 2px 8px rgba(212,96,138,0.12)}
.tab:hover:not(.active){color:var(--text)}

/* Calendar */
.cal-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;min-width:620px}
.day-header{text-align:center;font-size:11px;color:var(--muted);padding:6px 0;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.day-cell{min-height:100px;border-radius:12px;border:1.5px solid var(--border);padding:6px;background:var(--surface);transition:all .2s;position:relative}
.day-cell.has-eps{cursor:pointer}
.day-cell.has-eps:hover{border-color:var(--accent2);box-shadow:0 4px 16px rgba(212,96,138,0.12);transform:translateY(-1px)}
.day-cell.other-month{opacity:.28;background:transparent}
.day-cell.today{border-color:var(--accent);border-width:2px}
.day-cell.today .day-num{color:var(--accent);font-weight:700}
.day-num{font-size:12px;color:var(--muted);margin-bottom:4px;font-weight:600}

/* Episode pill with poster thumbnail */
.ep-pill{display:flex;align-items:center;gap:4px;border-radius:7px;padding:3px 5px;margin-bottom:3px;overflow:hidden;cursor:pointer;transition:opacity .15s}
.ep-pill:hover{opacity:.85}
.ep-pill.skipped{opacity:.35;text-decoration:line-through}
.ep-thumb{width:18px;height:26px;border-radius:3px;object-fit:cover;flex-shrink:0}
.ep-thumb-ph{width:18px;height:26px;border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px}
.ep-pill-text{font-size:10px;line-height:1.2;overflow:hidden;min-width:0}
.ep-pill-name{white-space:nowrap;text-overflow:ellipsis;overflow:hidden;font-weight:600}
.ep-pill-ep{opacity:.75;font-size:9px}

/* Series grid */
.series-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.series-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:all .2s;position:relative}
.series-card:hover{border-color:var(--accent2);box-shadow:0 8px 28px rgba(212,96,138,0.14);transform:translateY(-2px)}
.series-card-poster{width:100%;height:160px;object-fit:cover;display:block;background:var(--accent-soft)}
.series-card-poster-ph{width:100%;height:160px;background:linear-gradient(135deg,var(--accent-soft) 0%,var(--lavender-soft) 100%);display:flex;align-items:center;justify-content:center;font-size:36px;color:var(--accent)}
.series-card-body{padding:12px}
.series-card-name{font-size:14px;font-weight:700;color:var(--text);line-height:1.3;margin-bottom:3px}
.series-card-meta{font-size:11px;color:var(--muted);line-height:1.5}
.series-card-next{font-size:11px;color:var(--accent);font-weight:600;margin-top:5px}
.series-card-done{font-size:11px;color:var(--teal);font-weight:600;margin-top:5px}
.progress-wrap{height:3px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width .3s}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(58,37,53,.5);display:none;align-items:center;justify-content:center;z-index:200;padding:1rem;backdrop-filter:blur(3px)}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border:1.5px solid var(--border2);border-radius:20px;padding:1.75rem;width:100%;max-width:440px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(212,96,138,0.18)}
.modal-header{display:flex;align-items:flex-start;gap:14px;margin-bottom:1.25rem}
.modal-poster{width:56px;height:82px;border-radius:10px;object-fit:cover;flex-shrink:0;box-shadow:0 4px 12px rgba(0,0,0,.12)}
.modal-poster-ph{width:56px;height:82px;border-radius:10px;background:var(--accent-soft);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.modal-title{font-family:'Playfair Display',serif;font-size:20px;color:var(--text);line-height:1.3}
.modal-sub{font-size:12px;color:var(--muted);margin-top:3px}
.ep-detail-list{display:grid;gap:5px}
.ep-detail-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:10px;border:1px solid var(--border);background:var(--surface2)}
.ep-detail-num{font-size:12px;color:var(--muted);min-width:26px;font-weight:600}
.ep-detail-date{flex:1;font-size:13px;color:var(--text)}
.chip{font-size:11px;padding:2px 10px;border-radius:20px;font-weight:600}
.chip.aired{background:var(--teal-soft);color:var(--teal)}
.chip.pending{background:var(--accent-soft);color:var(--accent)}
.chip.skipped{background:#f0eeee;color:#bbb}
.btn{padding:7px 18px;border-radius:20px;border:1.5px solid var(--border2);cursor:pointer;font-size:13px;font-family:'Nunito',sans-serif;font-weight:600;background:transparent;color:var(--text);transition:all .15s}
.btn:hover{background:var(--accent-soft);border-color:var(--accent2);color:var(--accent)}

.loading{text-align:center;color:var(--muted);padding:4rem;font-size:14px}
.error-box{background:rgba(212,92,92,.07);border:1.5px solid rgba(212,92,92,.2);border-radius:12px;padding:1.25rem;color:#c05;font-size:13px;line-height:1.8;margin:1rem 0}
.empty{text-align:center;color:var(--muted);padding:3rem;font-size:13px}

/* Day detail modal day title */
.day-modal-date{font-family:'Playfair Display',serif;font-size:22px;color:var(--text);margin-bottom:4px}
.day-modal-sub{font-size:12px;color:var(--muted);margin-bottom:1.25rem}
.day-ep-row{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:12px;border:1.5px solid var(--border);background:var(--surface2);margin-bottom:6px;cursor:pointer;transition:all .15s}
.day-ep-row:hover{border-color:var(--accent2);background:var(--accent-soft)}
.day-ep-thumb{width:32px;height:46px;border-radius:6px;object-fit:cover;flex-shrink:0}
.day-ep-thumb-ph{width:32px;height:46px;border-radius:6px;background:var(--accent-soft);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.day-ep-info{flex:1;min-width:0}
.day-ep-name{font-size:14px;font-weight:700;color:var(--text)}
.day-ep-meta{font-size:12px;color:var(--muted)}
</style>
</head>
<body>

<div class="petal">🌸</div>
<div class="petal">🌷</div>
<div class="petal">🌸</div>
<div class="petal">🌺</div>
<div class="petal">🌸</div>

<div class="topbar">
  <div class="logo-wrap">
    <span class="logo">🌸 GL Series Calendar</span>
    <span class="logo-sub">Girls' Love · Seguimiento de emisiones</span>
  </div>
  <span class="update-badge" id="updateBadge"></span>
</div>

<div class="container">
  <div class="page-header">
    <h1 class="page-title">Calendario de <span>series GL</span></h1>
    <p class="page-desc">Todas las emisiones semanales en un solo lugar 💕</p>
  </div>

  <div class="cal-nav">
    <div class="month-display" id="monthDisplay"></div>
    <div class="nav-btns">
      <button class="nav-btn" id="prevBtn">← Anterior</button>
      <button class="nav-btn" id="todayBtn">Hoy</button>
      <button class="nav-btn" id="nextBtn">Siguiente →</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" id="tabCal" onclick="switchTab('cal')">📅 Calendario</button>
    <button class="tab" id="tabList" onclick="switchTab('list')">🎬 Series</button>
  </div>

  <div id="viewCal"><div class="loading">🌸 Cargando…</div></div>
  <div id="viewList" style="display:none"></div>
</div>

<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalBox"></div>
</div>

<script>
const MONTHS=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DAYS=['L','M','X','J','V','S','D'];
const DAYS_L=['lunes','martes','miércoles','jueves','viernes','sábado','domingo'];
const PALETTE=['#d4608a','#5bbcb0','#9b82c9','#e8a84a','#e06fa0','#4eadb5','#b07ad4','#d47a4e'];
const PALETTE_SOFT=['rgba(212,96,138,0.13)','rgba(91,188,176,0.13)','rgba(155,130,201,0.13)','rgba(232,168,74,0.13)','rgba(224,111,160,0.13)','rgba(78,173,181,0.13)','rgba(176,122,212,0.13)','rgba(212,122,78,0.13)'];

let state={month:new Date().getMonth(),year:new Date().getFullYear(),tab:'cal',series:[]};

function getDow(d){return(new Date(d+'T12:00:00').getDay()+6)%7}
function addDays(d,n){const x=new Date(d+'T12:00:00');x.setDate(x.getDate()+n);return x.toISOString().slice(0,10)}
function fmtDate(d){const x=new Date(d+'T12:00:00');return`${x.getDate()} ${MONTHS[x.getMonth()].slice(0,3)} ${x.getFullYear()}`}
function toStr(y,m,d){return`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`}

function genEps(s){
  const eps=[], diff=(s.dayOfWeek-getDow(s.startDate)+7)%7;
  let cur=addDays(s.startDate,diff);
  for(let i=0;i<s.totalEpisodes;i++){
    const ov=(s.episodes||[]).find(e=>e.num===i+1);
    eps.push(ov||{num:i+1,date:cur,skipped:false});
    cur=addDays(cur,7);
  }
  return eps;
}

async function loadData(){
  try{
    const r=await fetch('data.json?t='+Date.now());
    if(!r.ok) throw new Error('No se encontró data.json (código '+r.status+')');
    const d=await r.json();
    state.series=d.series||[];
    if(d.exportedAt){
      const dt=new Date(d.exportedAt);
      document.getElementById('updateBadge').textContent='✓ Act. '+dt.toLocaleDateString('es-ES',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
    }
    return true;
  }catch(e){
    document.getElementById('viewCal').innerHTML=`<div class="error-box">
      <strong>No se pudo cargar el calendario.</strong><br>
      Asegúrate de que el archivo <code>data.json</code> está en la misma carpeta que este HTML.<br>
      Si eres el admin: exporta los datos desde <code>admin.html</code> y súbelos a GitHub.<br><br>
      Error técnico: ${e.message}
    </div>`;
    return false;
  }
}

function getEpMap(y,m){
  const map={};
  state.series.forEach((s,si)=>{
    genEps(s).forEach(ep=>{
      const d=new Date(ep.date+'T12:00:00');
      if(d.getFullYear()===y&&d.getMonth()===m){
        if(!map[ep.date]) map[ep.date]=[];
        map[ep.date].push({s,ep,si});
      }
    });
  });
  return map;
}

function renderCal(){
  const {month:m,year:y}=state;
  document.getElementById('monthDisplay').innerHTML=`<span>${MONTHS[m]}</span> ${y}`;
  const epMap=getEpMap(y,m);
  const first=new Date(y,m,1);
  const startDow=(first.getDay()+6)%7;
  const dim=new Date(y,m+1,0).getDate();
  const prevDim=new Date(y,m,0).getDate();
  const tStr=toStr(new Date().getFullYear(),new Date().getMonth(),new Date().getDate());

  let html='<div class="cal-wrap"><div class="cal-grid">';
  DAYS.forEach(d=>{html+=`<div class="day-header">${d}</div>`;});

  for(let i=startDow-1;i>=0;i--)
    html+=`<div class="day-cell other-month"><div class="day-num">${prevDim-i}</div></div>`;

  for(let d=1;d<=dim;d++){
    const ds=toStr(y,m,d);
    const eps=epMap[ds]||[];
    const isToday=ds===tStr;
    html+=`<div class="day-cell${isToday?' today':''}${eps.length?' has-eps':''}" ${eps.length?`onclick="openDay('${ds}')"`:''}>`;
    html+=`<div class="day-num">${d}</div>`;
    eps.slice(0,3).forEach(({s,ep,si})=>{
      const col=PALETTE[si%PALETTE.length];
      const bg=PALETTE_SOFT[si%PALETTE_SOFT.length];
      const thumb=s.poster
        ? `<img class="ep-thumb" src="${s.poster}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        : '';
      const ph=`<div class="ep-thumb-ph" style="${s.poster?'display:none':''}background:${bg}">🎬</div>`;
      html+=`<div class="ep-pill${ep.skipped?' skipped':''}" style="background:${bg}" onclick="event.stopPropagation();openDay('${ds}')">
        ${thumb}${ph}
        <div class="ep-pill-text" style="color:${col}">
          <div class="ep-pill-name">${s.name}</div>
          <div class="ep-pill-ep">Ep. ${ep.num}${ep.skipped?' · no emitido':''}</div>
        </div>
      </div>`;
    });
    if(eps.length>3) html+=`<div style="font-size:10px;color:var(--muted);padding:2px 4px">+${eps.length-3} más</div>`;
    html+='</div>';
  }
  const total=startDow+dim;
  const rem=(7-total%7)%7;
  for(let d=1;d<=rem;d++)
    html+=`<div class="day-cell other-month"><div class="day-num">${d}</div></div>`;

  html+='</div></div>';
  document.getElementById('viewCal').innerHTML=html;
}

function renderList(){
  if(!state.series.length){
    document.getElementById('viewList').innerHTML='<div class="empty">🌸 No hay series todavía.</div>';
    return;
  }
  const now=new Date();
  let html='<div class="series-grid">';
  state.series.forEach((s,si)=>{
    const eps=genEps(s);
    const aired=eps.filter(e=>new Date(e.date+'T12:00:00')<=now&&!e.skipped).length;
    const pct=Math.round(aired/s.totalEpisodes*100);
    const col=PALETTE[si%PALETTE.length];
    const next=eps.find(e=>new Date(e.date+'T12:00:00')>now&&!e.skipped);
    const posterEl=s.poster
      ? `<img class="series-card-poster" src="${s.poster}" alt="${s.name}" onerror="this.outerHTML='<div class=series-card-poster-ph>🎬</div>'">`
      : `<div class="series-card-poster-ph">🎬</div>`;
    html+=`<div class="series-card" onclick="openSeries(${si})">
      ${posterEl}
      <div class="series-card-body">
        <div class="series-card-name">${s.name}</div>
        <div class="series-card-meta">${s.network?s.network+' · ':''}${DAYS_L[s.dayOfWeek]}s · ${s.totalEpisodes} ep</div>
        ${next
          ? `<div class="series-card-next">▶ Ep. ${next.num} — ${fmtDate(next.date)}</div>`
          : `<div class="series-card-done">✓ Temporada finalizada</div>`}
        <div class="progress-wrap"><div class="progress-fill" style="width:${pct}%;background:${col}"></div></div>
        <div style="font-size:10px;color:var(--muted);margin-top:3px">${aired}/${s.totalEpisodes} emitidos</div>
      </div>
    </div>`;
  });
  html+='</div>';
  document.getElementById('viewList').innerHTML=html;
}

function openDay(dateStr){
  const epMap=getEpMap(state.year,state.month);
  const items=(epMap[dateStr]||[]);
  if(!items.length) return;
  const now=new Date();
  let html=`<div class="day-modal-date">${fmtDate(dateStr)}</div>
  <div class="day-modal-sub">${items.length} serie${items.length>1?'s':''} este día</div>`;
  items.forEach(({s,ep,si})=>{
    const col=PALETTE[si%PALETTE.length];
    const isPast=new Date(ep.date+'T12:00:00')<=now;
    const status=ep.skipped?'skipped':isPast?'aired':'pending';
    const label=ep.skipped?'No emitido':isPast?'Emitido':'Pendiente';
    const thumb=s.poster
      ? `<img class="day-ep-thumb" src="${s.poster}" alt="" onerror="this.outerHTML='<div class=day-ep-thumb-ph>🎬</div>'">`
      : `<div class="day-ep-thumb-ph">🎬</div>`;
    html+=`<div class="day-ep-row" onclick="openSeries(${si})">
      ${thumb}
      <div class="day-ep-info">
        <div class="day-ep-name" style="color:${col}">${s.name}</div>
        <div class="day-ep-meta">Episodio ${ep.num} · ${s.network||''}</div>
      </div>
      <span class="chip ${status}">${label}</span>
    </div>`;
  });
  html+=`<div style="display:flex;justify-content:flex-end;margin-top:1rem"><button class="btn" onclick="closeModal()">Cerrar</button></div>`;
  document.getElementById('modalBox').innerHTML=html;
  document.getElementById('modalBg').classList.add('open');
}

function openSeries(si){
  const s=state.series[si];
  const eps=genEps(s);
  const now=new Date();
  const col=PALETTE[si%PALETTE.length];
  const aired=eps.filter(e=>new Date(e.date+'T12:00:00')<=now&&!e.skipped).length;
  const pct=Math.round(aired/s.totalEpisodes*100);
  const posterEl=s.poster
    ? `<img class="modal-poster" src="${s.poster}" alt="${s.name}" onerror="this.outerHTML='<div class=modal-poster-ph>🎬</div>'">`
    : `<div class="modal-poster-ph">🎬</div>`;
  let html=`<div class="modal-header">
    ${posterEl}
    <div>
      <div class="modal-title">${s.name}</div>
      <div class="modal-sub">${s.network?s.network+' · ':''}${DAYS_L[s.dayOfWeek]}s · ${s.totalEpisodes} episodios</div>
      <div style="margin-top:6px;height:4px;width:140px;background:var(--border);border-radius:2px;overflow:hidden">
        <div style="width:${pct}%;height:100%;background:${col};border-radius:2px"></div>
      </div>
      <div style="font-size:11px;color:var(--muted);margin-top:3px">${aired}/${s.totalEpisodes} emitidos</div>
    </div>
  </div>
  <div class="ep-detail-list">`;
  eps.forEach(ep=>{
    const isPast=new Date(ep.date+'T12:00:00')<=now;
    const st=ep.skipped?'skipped':isPast?'aired':'pending';
    const lb=ep.skipped?'No emitido':isPast?'Emitido':'Pendiente';
    html+=`<div class="ep-detail-row">
      <span class="ep-detail-num" style="color:${col}">E${ep.num}</span>
      <span class="ep-detail-date">${fmtDate(ep.date)}</span>
      <span class="chip ${st}">${lb}</span>
    </div>`;
  });
  html+=`</div><div style="display:flex;justify-content:flex-end;margin-top:1rem"><button class="btn" onclick="closeModal()">Cerrar</button></div>`;
  document.getElementById('modalBox').innerHTML=html;
  document.getElementById('modalBg').classList.add('open');
}

function closeModal(){ document.getElementById('modalBg').classList.remove('open'); }

function switchTab(tab){
  state.tab=tab;
  document.getElementById('tabCal').className='tab'+(tab==='cal'?' active':'');
  document.getElementById('tabList').className='tab'+(tab==='list'?' active':'');
  document.getElementById('viewCal').style.display=tab==='cal'?'':'none';
  document.getElementById('viewList').style.display=tab==='list'?'':'none';
  if(tab==='list') renderList();
}

document.getElementById('prevBtn').onclick=()=>{ state.month--; if(state.month<0){state.month=11;state.year--;} renderCal(); };
document.getElementById('nextBtn').onclick=()=>{ state.month++; if(state.month>11){state.month=0;state.year++;} renderCal(); };
document.getElementById('todayBtn').onclick=()=>{ state.month=new Date().getMonth(); state.year=new Date().getFullYear(); renderCal(); };

(async()=>{ if(await loadData()) renderCal(); })();
</script>
</body>
</html>
