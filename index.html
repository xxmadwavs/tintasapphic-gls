<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TINTA SAPPHIC ~ GL Series & Películas</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600;1,700;1,800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #faf5f8;
  --surface: #ffffff;
  --surface2: #fdf0f6;
  --surface3: #f8eaf3;
  --border: rgba(210,140,175,0.15);
  --border2: rgba(210,140,175,0.35);
  --text: #2d1f2b;
  --muted: #8a6878;
  --accent: #c94f7c;
  --accent2: #e07aa0;
  --accent-soft: #fce8f1;
  --teal: #4aada0;
  --teal-soft: #d0ede9;
  --lavender: #8b72be;
  --lavender-soft: #ede8f8;
  --gold: #b08030;
  --gold-soft: #fdf2d8;
  --radius: 16px;
  --radius-lg: 22px;
  --shadow-sm: 0 2px 12px rgba(180,80,120,0.08);
  --shadow-md: 0 6px 28px rgba(180,80,120,0.13);
  --shadow-lg: 0 16px 52px rgba(180,80,120,0.18);
  --font-display: 'Playfair Display', Georgia, serif;
  --font-body: 'DM Sans', system-ui, sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:14px;line-height:1.6;min-height:100vh}

/* Background atmosphere */
body::before{content:'';position:fixed;inset:0;background:
  radial-gradient(ellipse at 8% 10%,rgba(201,79,124,0.06) 0%,transparent 50%),
  radial-gradient(ellipse at 92% 90%,rgba(139,114,190,0.07) 0%,transparent 50%),
  radial-gradient(ellipse at 50% 50%,rgba(74,173,160,0.03) 0%,transparent 60%);
  pointer-events:none;z-index:0}

/* Sin orbes ni pétalos flotantes */
.petal{display:none}


/* ═══ TOPBAR ═══ */
.topbar{
  background:rgba(255,255,255,0.92);
  border-bottom:1px solid var(--border2);
  padding:0 2.5rem;
  display:flex;align-items:center;justify-content:space-between;
  height:64px;position:sticky;top:0;z-index:50;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  box-shadow:0 1px 0 var(--border), 0 4px 24px rgba(180,80,120,0.05);
}
.logo-wrap{display:flex;align-items:center;gap:12px}
.logo{
  font-family:var(--font-display);
  font-size:21px;
  font-weight:400;
  color:var(--text);
  letter-spacing:.01em;
  line-height:1;
  display:flex;
  align-items:baseline;
  gap:.3em;
  position:relative;
}
/* TINTA en versalitas con tracking abierto */
.logo-tinta{
  font-weight:700;
  letter-spacing:.14em;
  font-size:.95em;
  text-transform:uppercase;
  color:var(--text);
}
/* Sapphic en cursiva elegante */
.logo em{
  font-style:italic;
  font-weight:600;
  font-size:1.05em;
  color:var(--accent);
  letter-spacing:-.01em;
}
/* Línea degradada bajo el logo */
.logo::after{
  content:'';
  position:absolute;
  bottom:-4px;left:0;right:0;
  height:1.5px;
  background:linear-gradient(90deg,var(--accent) 0%,var(--lavender) 55%,rgba(74,173,160,0.4) 100%);
  border-radius:2px;
}
.logo-divider{width:1px;height:20px;background:var(--border2);margin:0 4px}
.logo-sub{font-size:10.5px;font-weight:500;color:var(--muted);letter-spacing:.06em;text-transform:uppercase}
.topbar-search-btn{
  display:none;background:transparent;border:none;cursor:pointer;
  color:var(--muted);padding:8px;border-radius:10px;
  transition:all .15s;
}
.topbar-search-btn:hover{background:var(--surface2);color:var(--accent)}
.topbar-right{display:flex;align-items:center;gap:8px}
.topbar-x-btn{
  display:flex;align-items:center;gap:7px;
  padding:6px 14px;border-radius:20px;
  background:var(--surface);border:1.5px solid var(--border2);
  color:var(--text);font-size:12.5px;font-weight:700;
  text-decoration:none;font-family:var(--font-body);
  transition:all .18s;white-space:nowrap;
  box-shadow:var(--shadow-sm);
}
.topbar-x-btn:hover{
  background:#000;color:#fff;border-color:#000;
  box-shadow:0 4px 16px rgba(0,0,0,0.15);transform:translateY(-1px);
}
.topbar-x-btn svg{flex-shrink:0;transition:inherit}
@media(max-width:600px){
  .topbar-x-btn span.x-handle{display:none}
  .topbar-x-btn{padding:6px 10px}
}
@media(max-width:600px){
  .topbar-search-btn{display:flex;align-items:center}
  .logo-divider,.logo-sub{display:none}
  .topbar{padding:0 1rem}
  .logo{font-size:17px}
}

/* ═══ HERO ═══ */
.hero{
  position:relative;z-index:1;
  background:linear-gradient(150deg,rgba(201,79,124,0.055) 0%,rgba(139,114,190,0.04) 55%,rgba(74,173,160,0.03) 100%);
  border-bottom:1px solid var(--border);
  padding:3rem 2.5rem 2.2rem;
  overflow:hidden;
}
/* Marca de agua TS detrás del título */
.hero::before{
  content:'TS';
  position:absolute;
  right:-.02em;
  top:50%;
  transform:translateY(-52%);
  font-family:var(--font-display);
  font-size:clamp(8rem,20vw,15rem);
  font-weight:800;
  font-style:italic;
  line-height:1;
  letter-spacing:-.05em;
  color:transparent;
  -webkit-text-stroke:1px rgba(201,79,124,0.07);
  pointer-events:none;
  user-select:none;
  z-index:0;
}
/* Línea degradada al pie del hero */
.hero::after{
  content:'';
  position:absolute;
  bottom:0;left:0;right:0;
  height:1.5px;
  background:linear-gradient(90deg,transparent 0%,var(--accent) 25%,var(--lavender) 65%,transparent 100%);
  opacity:.45;
}
.hero-inner{max-width:1020px;margin:0 auto;position:relative;z-index:1}

/* Título del hero — tratamiento tipográfico principal */
.hero-title{
  font-family:var(--font-display);
  line-height:1;
  letter-spacing:-.01em;
  margin-bottom:.5rem;
  display:inline-block;
  position:relative;
}
/* TINTA: versalitas con tracking, tamaño equilibrado con Sapphic */
.hero-tinta{
  display:block;
  font-size:clamp(1.6rem,3.5vw,2.6rem);
  font-weight:700;
  letter-spacing:.38em;
  text-transform:uppercase;
  color:var(--text);
  margin-bottom:.05em;
}
/* Sapphic: cursiva, el protagonista */
.hero-title em{
  display:block;
  font-style:italic;
  font-weight:700;
  font-size:clamp(3rem,7vw,5rem);
  color:var(--accent);
  letter-spacing:-.02em;
  line-height:.95;
}
/* Subrayado degradado bajo "Sapphic" */
.hero-title::after{
  content:'';
  position:absolute;
  bottom:-8px;left:0;
  width:65%;
  height:3px;
  background:linear-gradient(90deg,var(--accent) 0%,var(--lavender) 60%,transparent 100%);
  border-radius:3px;
}
.hero-desc{
  font-size:13.5px;color:var(--muted);
  max-width:520px;line-height:1.7;
  margin-bottom:1.5rem;
  margin-top:1.2rem;
}
.hero-stats{display:flex;flex-wrap:wrap;gap:8px}
.hero-stat{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,0.78);border:1px solid var(--border2);border-radius:30px;padding:5px 14px;backdrop-filter:blur(8px)}
.hero-stat-num{font-family:var(--font-display);font-size:18px;font-weight:700;line-height:1;color:var(--accent)}
.hero-stat-num.teal{color:var(--teal)}
.hero-stat-num.lav{color:var(--lavender)}
.hero-stat-num.gold{color:var(--gold)}
.hero-stat-label{font-size:11px;font-weight:500;color:var(--muted)}
@media(max-width:600px){
  .hero{padding:1.75rem 1rem 1.5rem}
  .hero-title em{font-size:3rem}
  .hero-tinta{font-size:.8rem;letter-spacing:.35em}
  .hero::before{font-size:8rem}
  .hero-stat{padding:4px 10px}
  .hero-stat-num{font-size:15px}
}

/* ═══ CONTAINER ═══ */
.container{max-width:1020px;margin:0 auto;padding:2rem 1.5rem;position:relative;z-index:1}
@media(max-width:600px){
  .container{padding:1.25rem 1rem 2rem;width:100%;}
  .hero-stats{flex-wrap:wrap}
  #viewList,#viewMovies,#viewUpcoming,#viewBooks,#viewAnime,#viewRealities{width:100%;}
}

/* Legacy page-header (hidden now) */
.page-header{display:none}

/* ═══ TABS ═══ */
.tabs{
  display:flex;gap:2px;margin-bottom:1.75rem;
  background:var(--surface);
  border-radius:var(--radius-lg);
  padding:4px;
  width:fit-content;max-width:100%;
  border:1.5px solid var(--border2);
  box-shadow:var(--shadow-sm);
  flex-wrap:wrap;
}
.tab{
  padding:8px 20px;border-radius:14px;cursor:pointer;
  font-size:13px;font-weight:600;color:var(--muted);
  background:transparent;border:none;font-family:var(--font-body);
  transition:all .2s;white-space:nowrap;flex-shrink:0;
  display:flex;align-items:center;gap:5px;
}
.tab.active{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;
  box-shadow:0 3px 12px rgba(201,79,124,0.3);
}
.tab:hover:not(.active){color:var(--text);background:var(--surface2)}

/* Móvil: tabs en grid, sin scroll horizontal */
@media(max-width:900px) and (min-width:701px){
  .tabs{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:5px;width:100%;
    background:transparent;border:none;box-shadow:none;padding:0;
    margin-bottom:1.25rem;
  }
  .tab{
    justify-content:center;flex-direction:column;
    padding:8px 6px;border-radius:12px;font-size:11px;font-weight:700;
    background:var(--surface);border:1.5px solid var(--border2);
    box-shadow:var(--shadow-sm);gap:2px;text-align:center;
    white-space:normal;min-width:0;
  }
  .tab.active{
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:#fff;border-color:var(--accent);
    box-shadow:0 3px 14px rgba(201,79,124,0.25);
  }
}
@media(max-width:700px){
  .tabs{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:5px;width:100%;
    background:transparent;border:none;box-shadow:none;padding:0;
    margin-bottom:1.25rem;
  }
  .tab{
    justify-content:center;flex-direction:column;
    padding:8px 4px;border-radius:12px;font-size:10px;font-weight:700;
    background:var(--surface);border:1.5px solid var(--border2);
    box-shadow:var(--shadow-sm);gap:2px;text-align:center;
    white-space:normal;min-width:0;
  }
  .tab.active{
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:#fff;border-color:var(--accent);
    box-shadow:0 3px 14px rgba(201,79,124,0.25);
  }
}

/* ═══ CALENDAR LEGEND ═══ */
.cal-legend{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px;padding:10px 14px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-sm)}
.cal-legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text);font-weight:600;cursor:pointer;padding:3px 8px;border-radius:20px;transition:background .15s}
.cal-legend-item:hover{background:var(--surface2)}
.cal-legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.cal-legend-movie{background:var(--lavender)}

/* ═══ WEEK PANEL ═══ */
.week-panel{
  background:var(--surface);border:1.5px solid var(--border2);
  border-radius:var(--radius);padding:12px 16px;margin-bottom:14px;
  box-shadow:var(--shadow-sm);
}
.week-panel-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:10px}
.week-panel-list{display:flex;flex-direction:column;gap:5px}
.week-panel-empty{font-size:12px;color:var(--muted);font-style:italic}
.week-ep-row{
  display:flex;align-items:center;gap:8px;
  padding:5px 8px;border-radius:8px;
  background:var(--surface2);border:1px solid var(--border);
  cursor:pointer;transition:all .14s;font-size:12px;
}
.week-ep-row:hover{border-color:var(--accent2);background:var(--accent-soft)}
.week-ep-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.week-ep-name{font-weight:600;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.week-ep-date{font-size:11px;color:var(--muted);white-space:nowrap}
.week-ep-badge{font-size:10px;padding:1px 7px;border-radius:20px;font-weight:700;white-space:nowrap}
.week-ep-today{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:10px;padding:1px 8px;border-radius:20px;font-weight:700;animation:todayPulse 2.2s ease-in-out infinite}

/* ═══ MONTH PICKER ═══ */
.month-picker-year{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.month-picker-year-val{font-family:var(--font-display);font-size:22px;font-weight:700;color:var(--text)}
.month-picker-arr{background:var(--surface2);border:1.5px solid var(--border2);border-radius:20px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;transition:all .15s;font-family:var(--font-body)}
.month-picker-arr:hover{background:var(--accent-soft);border-color:var(--accent2);color:var(--accent)}
.month-picker-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.month-picker-btn{
  padding:8px 4px;border-radius:10px;border:1.5px solid var(--border);
  background:var(--surface2);color:var(--text);font-size:12px;font-weight:600;
  cursor:pointer;font-family:var(--font-body);transition:all .15s;text-align:center;
}
.month-picker-btn:hover{border-color:var(--accent2);background:var(--accent-soft);color:var(--accent)}
.month-picker-btn.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-color:var(--accent);box-shadow:0 3px 10px rgba(201,79,124,.3)}

/* ═══ MONTH DISPLAY HINT ═══ */
.month-display::after{content:' ▾';font-size:16px;opacity:.4;font-family:var(--font-body);font-weight:400}

/* ═══ MODAL IMPROVEMENTS ═══ */
.modal-progress-block{margin-bottom:14px}
.modal-progress-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px}
.modal-progress-label{font-size:11.5px;color:var(--muted);font-weight:600}
.modal-progress-pct{font-family:var(--font-display);font-size:20px;font-weight:700;line-height:1}
.modal-next-badge{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px;margin-bottom:10px}
.modal-next-badge.today{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;animation:todayPulse 2.2s ease-in-out infinite}
.modal-next-badge.soon{background:var(--accent-soft);color:var(--accent);border:1px solid rgba(201,79,124,.2)}
.modal-next-badge.done{background:var(--teal-soft);color:var(--teal);border:1px solid rgba(74,173,160,.2)}
.modal-dates-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.modal-date-chip{font-size:11px;color:var(--muted);background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-weight:600}
.modal-completeness{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);margin-bottom:10px;padding:6px 10px;background:var(--surface2);border-radius:10px;border:1px solid var(--border)}
.modal-completeness-bar{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.modal-completeness-fill{height:100%;border-radius:2px;background:linear-gradient(to right,var(--accent),var(--lavender))}


.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:10px}
.month-display{font-family:var(--font-display);font-size:28px;font-weight:700;color:var(--text);letter-spacing:-.02em}
.month-display span{color:var(--accent);font-style:italic}
.nav-btns{display:flex;gap:6px}
.nav-btn{
  background:var(--surface);border:1.5px solid var(--border2);
  border-radius:20px;padding:7px 18px;cursor:pointer;
  font-size:13px;color:var(--text);font-family:var(--font-body);font-weight:600;
  transition:all .18s;box-shadow:var(--shadow-sm);
}
.nav-btn:hover{background:var(--accent-soft);border-color:var(--accent2);color:var(--accent);transform:translateY(-1px)}
@media(max-width:600px){
  .cal-nav{flex-direction:column;align-items:stretch;gap:8px}
  .month-display{font-size:22px;text-align:center}
  .nav-btns{display:grid;grid-template-columns:1fr auto 1fr;gap:6px}
  .nav-btn{font-size:12px;padding:8px 10px;border-radius:12px;text-align:center}
}

/* Calendario: scroll horizontal propio en móvil */
.cal-wrap{width:100%}
@media(max-width:600px){
  .cal-wrap{
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
    width:100%;
  }
  .cal-wrap::-webkit-scrollbar{display:none}
}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;width:100%}
@media(max-width:600px){
  .cal-grid{min-width:420px} /* mínimo para que las celdas sean legibles */
}
.day-header{
  text-align:center;font-size:10px;color:var(--muted);
  padding:7px 0;font-weight:600;text-transform:uppercase;letter-spacing:.08em;
}
.day-cell{
  min-height:96px;border-radius:10px;
  border:1.5px solid var(--border);padding:6px;
  background:var(--surface);transition:all .18s;
}
.day-cell.has-eps{cursor:pointer;background:rgba(255,255,255,1)}
.day-cell.has-eps:hover{
  border-color:var(--accent2);
  box-shadow:0 6px 20px rgba(201,79,124,0.14);
  transform:translateY(-2px);
  background:var(--surface);
}
.day-cell.other-month{opacity:.22;background:transparent;border-color:transparent}
.day-cell.today{border-color:var(--accent);border-width:2px;background:rgba(252,232,241,0.4)}
.day-cell.today .day-num{color:var(--accent);font-weight:700}
.day-num{font-size:11.5px;color:var(--muted);margin-bottom:4px;font-weight:600}
.ep-pill{display:flex;align-items:center;gap:4px;border-radius:6px;padding:3px 5px;margin-bottom:3px;overflow:hidden;cursor:pointer;transition:opacity .15s}
.ep-pill:hover{opacity:.8}
.ep-pill.skipped{opacity:.4}
.ep-thumb{width:16px;height:23px;border-radius:3px;object-fit:cover;flex-shrink:0}
.ep-thumb-ph{width:16px;height:23px;border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px}
.ep-pill-text{font-size:9.5px;line-height:1.2;overflow:hidden;min-width:0}
.ep-pill-name{white-space:nowrap;text-overflow:ellipsis;overflow:hidden;font-weight:600}
.ep-pill-ep{opacity:.7;font-size:8.5px}
@media(max-width:600px){
  .cal-grid{gap:2px}
  .day-cell{min-height:58px;padding:3px;border-radius:6px}
  .day-num{font-size:10px;margin-bottom:2px}
  .ep-thumb,.ep-thumb-ph{display:none}
  .ep-pill{padding:2px 3px}
  .ep-pill-text{font-size:8px}
  .ep-pill-ep{display:none}
}

/* ═══ CARDS ═══ */
/* Series */
.series-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:16px}
.series-card{
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:var(--radius-lg);overflow:hidden;cursor:pointer;
  transition:all .22s;position:relative;display:flex;flex-direction:column;
  box-shadow:var(--shadow-sm);
}
.series-card:hover{
  border-color:var(--accent2);
  box-shadow:var(--shadow-lg);
  transform:translateY(-4px);
}
.series-card-poster-wrap{position:relative;overflow:hidden}
.series-card-poster{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;background:var(--accent-soft)}
.series-card-poster-ph{width:100%;aspect-ratio:2/3;background:linear-gradient(135deg,var(--accent-soft) 0%,var(--lavender-soft) 100%);display:flex;align-items:center;justify-content:center;font-size:40px;color:var(--accent)}
.series-card-poster-wrap::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:55%;
  background:linear-gradient(to top,rgba(30,15,25,0.65) 0%,transparent 100%);
  pointer-events:none;
}
.series-card-body{padding:12px 13px;flex:1;display:flex;flex-direction:column;gap:3px}
.series-card-name{font-size:13.5px;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:3px}
.series-card-meta{font-size:11px;color:var(--muted);line-height:1.5}
.series-card-next{font-size:11px;color:var(--accent);font-weight:600;margin-top:4px}
.series-card-done{font-size:11px;color:var(--teal);font-weight:600;margin-top:4px}
.series-card-today{
  font-size:11px;font-weight:700;margin-top:4px;
  display:inline-flex;align-items:center;gap:5px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;border-radius:20px;padding:3px 10px;
  animation:todayPulse 2.2s ease-in-out infinite;
}
@keyframes todayPulse{0%,100%{box-shadow:0 0 0 0 rgba(201,79,124,0.35)}60%{box-shadow:0 0 0 6px rgba(201,79,124,0)}}
.progress-wrap{height:5px;background:var(--border);border-radius:3px;margin-top:8px;overflow:hidden;position:relative}
.progress-fill{height:100%;border-radius:3px;transition:width .4s}
.progress-today-marker{
  position:absolute;top:-1px;bottom:-1px;width:2px;
  background:rgba(255,255,255,0.85);border-radius:2px;
  box-shadow:0 0 4px rgba(0,0,0,.2);pointer-events:none;
}
.day-cell.is-past{background:rgba(245,240,243,0.7)}
.day-cell.is-past .day-num{color:rgba(138,104,120,0.5)}
.day-cell.is-past .ep-pill{opacity:.55}
.day-cell.is-future{background:#fff}
.day-cell.today{border-color:var(--accent)!important;border-width:2px!important;background:rgba(252,232,241,0.5)!important}
.card-badges{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:4px}
.badge{font-size:9.5px;padding:2px 8px;border-radius:20px;font-weight:700;letter-spacing:.02em}
.badge-book{background:var(--gold-soft);color:var(--gold)}
.badge-upcoming{background:var(--lavender-soft);color:var(--lavender)}
.card-watch-pill{
  display:inline-flex;align-items:center;gap:3px;
  font-size:10px;font-weight:600;color:var(--teal);
  text-decoration:none;background:var(--teal-soft);
  border-radius:20px;padding:2px 9px;
  border:1px solid rgba(74,173,160,0.3);
  transition:all .15s;white-space:nowrap;
}
.card-watch-pill:hover{background:var(--teal);color:#fff;border-color:var(--teal);transform:translateY(-1px)}
@media(max-width:480px){
  .series-grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .series-card-body{padding:9px 10px}
  .series-card-name{font-size:12.5px}
}

/* Upcoming */
.upcoming-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:16px}
.upcoming-card{
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:var(--radius-lg);overflow:hidden;cursor:pointer;
  transition:all .22s;position:relative;display:flex;flex-direction:column;
  box-shadow:var(--shadow-sm);
}
.upcoming-card:hover{border-color:var(--lavender);box-shadow:0 12px 36px rgba(139,114,190,0.2);transform:translateY(-4px)}
.upcoming-poster-wrap{position:relative;overflow:hidden}
.upcoming-poster{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;background:var(--lavender-soft)}
.upcoming-poster-ph{width:100%;aspect-ratio:2/3;background:linear-gradient(135deg,var(--lavender-soft) 0%,var(--accent-soft) 100%);display:flex;align-items:center;justify-content:center;font-size:40px}
.upcoming-poster-wrap::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:55%;
  background:linear-gradient(to top,rgba(25,15,35,0.65) 0%,transparent 100%);
  pointer-events:none;
}
.upcoming-body{padding:12px 13px;flex:1;display:flex;flex-direction:column;gap:3px}
.upcoming-name{font-size:13.5px;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:2px}
.upcoming-meta{font-size:11px;color:var(--muted);line-height:1.5}
.upcoming-watch-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
@media(max-width:480px){
  .upcoming-grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .upcoming-body{padding:9px 10px}
  .upcoming-name{font-size:12.5px}
}

/* Movies */
.movies-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:16px}
.movie-card{
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:var(--radius-lg);overflow:hidden;cursor:pointer;
  transition:all .22s;position:relative;display:flex;flex-direction:column;
  box-shadow:var(--shadow-sm);
}
.movie-card:hover{border-color:var(--lavender);box-shadow:0 12px 36px rgba(139,114,190,0.2);transform:translateY(-4px)}
.movie-card-poster-wrap{position:relative;overflow:hidden}
.movie-card-poster{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;background:var(--lavender-soft)}
.movie-card-poster-ph{width:100%;aspect-ratio:2/3;background:linear-gradient(135deg,var(--lavender-soft) 0%,var(--accent-soft) 100%);display:flex;align-items:center;justify-content:center;font-size:40px;color:var(--lavender)}
.movie-card-poster-wrap::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:55%;
  background:linear-gradient(to top,rgba(25,15,35,0.65) 0%,transparent 100%);
  pointer-events:none;
}
.movie-card-body{padding:12px 13px;flex:1;display:flex;flex-direction:column}
.movie-card-name{font-size:13.5px;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:3px}
.movie-card-meta{font-size:11px;color:var(--muted);line-height:1.5}
.movie-card-date{font-size:11px;color:var(--lavender);font-weight:600;margin-top:4px}
.movie-card-watch{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
@media(max-width:480px){
  .movies-grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .movie-card-body{padding:9px 10px}
  .movie-card-name{font-size:12.5px}
}

/* Section headings */
.section-heading{font-family:var(--font-display);font-size:22px;font-weight:700;color:var(--text);margin-bottom:.2rem;letter-spacing:-.01em}
.section-desc{font-size:13px;color:var(--muted);margin-bottom:1rem;line-height:1.6}

/* Subtabs */
.subtabs{
  display:flex;gap:3px;margin-bottom:1.25rem;
  background:var(--surface);border-radius:var(--radius-lg);
  padding:4px;width:fit-content;max-width:100%;
  border:1.5px solid var(--border2);
  box-shadow:var(--shadow-sm);
  overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.subtabs::-webkit-scrollbar{display:none}
.subtab{
  padding:6px 16px;border-radius:12px;cursor:pointer;
  font-size:12.5px;font-weight:600;color:var(--muted);
  background:transparent;border:none;font-family:var(--font-body);
  transition:all .18s;display:flex;align-items:center;gap:5px;
  white-space:nowrap;flex-shrink:0;
}
.subtab.active{background:var(--accent-soft);color:var(--accent)}
.subtab:hover:not(.active){color:var(--text);background:var(--surface2)}
.subtab-count{font-size:10.5px;background:var(--border2);color:var(--muted);border-radius:20px;padding:1px 7px;font-weight:700}
.subtab.active .subtab-count{background:var(--accent);color:#fff}
@media(max-width:480px){.subtabs{width:100%}.subtab{font-size:12px;padding:5px 10px}}

/* Stats bar (kept as fallback hidden) */
.stats-bar{display:none}

/* Search */
.search-wrap{margin-bottom:1.25rem;position:relative}
.search-input{
  width:100%;padding:10px 16px 10px 42px;
  border-radius:var(--radius-lg);border:1.5px solid var(--border2);
  background:var(--surface);color:var(--text);
  font-size:14px;font-family:var(--font-body);outline:none;
  transition:border-color .15s, box-shadow .15s;
  box-shadow:var(--shadow-sm);
}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(201,79,124,0.1)}
.search-icon{position:absolute;left:15px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none}
.search-empty{text-align:center;color:var(--muted);padding:2.5rem;font-size:13px}

/* Books toolbar */
.books-toolbar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1.25rem;align-items:center}
.books-toolbar .search-wrap{margin-bottom:0;flex:1;min-width:0;width:100%}
.filter-group{display:flex;align-items:center;gap:6px}
.filter-label{font-size:10.5px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
.filter-select{
  padding:7px 12px;border-radius:var(--radius-lg);
  border:1.5px solid var(--border2);background:var(--surface);color:var(--text);
  font-size:13px;font-family:var(--font-body);font-weight:600;
  outline:none;cursor:pointer;transition:border-color .15s;
  box-shadow:var(--shadow-sm);max-width:100%;
}
.filter-select:focus{border-color:var(--accent)}
.filter-clear-btn{
  padding:6px 12px;border-radius:20px;border:1.5px solid rgba(201,79,124,0.3);
  background:var(--accent-soft);color:var(--accent);
  font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font-body);
  transition:all .15s;white-space:nowrap;
}
.filter-clear-btn:hover{background:var(--accent);color:#fff}
/* Toolbar rows para separar búsqueda de filtros */
.toolbar-search-row{width:100%;margin-bottom:0}
.toolbar-filters-row{display:flex;flex-wrap:wrap;gap:8px;width:100%;align-items:center}
@media(max-width:600px){
  .books-toolbar{gap:6px;flex-direction:column;align-items:stretch}
  .books-toolbar .search-wrap{width:100%;margin-bottom:0}
  .toolbar-search-row{width:100%}
  .toolbar-filters-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;width:100%}
  .toolbar-filters-row .filter-group{width:100%;min-width:0}
  .toolbar-filters-row .filter-group select,
  .toolbar-filters-row .filter-group input{width:100%}
  .filter-group{flex:1;min-width:0}
  .filter-select{width:100%;font-size:12px;padding:7px 8px}
  .filter-label{font-size:10px;display:block;margin-bottom:2px;color:var(--muted)}
  .filter-clear-btn{width:100%;text-align:center;margin-top:2px}
}
@media(min-width:601px){
  .filter-label{display:none}
  .toolbar-search-row,.toolbar-filters-row{display:contents}
}
.alpha-bar{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:1.25rem}
.alpha-btn{
  width:28px;height:28px;border-radius:8px;
  border:1.5px solid var(--border);background:var(--surface);
  color:var(--muted);font-size:11.5px;font-weight:700;cursor:pointer;
  font-family:var(--font-body);transition:all .15s;
  display:flex;align-items:center;justify-content:center;
}
.alpha-btn:hover:not(.alpha-active):not(.alpha-disabled){border-color:var(--accent2);color:var(--accent);background:var(--accent-soft)}
.alpha-btn.alpha-active{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(201,79,124,0.3)}
.alpha-btn.alpha-disabled{opacity:.25;cursor:default}
.books-count{font-size:12px;color:var(--muted);margin-bottom:1rem}
.books-count strong{color:var(--text)}

/* Books grid */
.books-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:16px}
.book-card{
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:var(--radius-lg);overflow:hidden;cursor:default;
  transition:all .22s;display:flex;flex-direction:column;
  box-shadow:var(--shadow-sm);
}
.book-card:hover{border-color:#c9a227;box-shadow:0 10px 32px rgba(176,128,48,0.18);transform:translateY(-3px)}
.book-card-cover{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;background:linear-gradient(135deg,var(--gold-soft),#f0e0a0)}
.book-card-cover-ph{width:100%;aspect-ratio:2/3;background:linear-gradient(135deg,var(--gold-soft) 0%,#f0e0a0 100%);display:flex;align-items:center;justify-content:center;font-size:48px}
.book-card-body{padding:12px 13px;flex:1;display:flex;flex-direction:column;gap:5px}
.book-card-title{font-size:13.5px;font-weight:700;color:var(--gold);line-height:1.3}
.book-card-series{font-size:11px;color:var(--muted)}
.book-card-series strong{color:var(--text)}
.book-type-tag{display:inline-block;background:var(--accent);color:#fff;font-size:9px;padding:1px 6px;border-radius:10px;font-weight:700;margin-left:3px;vertical-align:middle}
.book-editions-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
.book-edition-pill{
  display:inline-flex;align-items:center;gap:4px;
  font-size:11px;font-weight:600;color:var(--gold);
  text-decoration:none;background:rgba(176,128,48,0.08);
  border-radius:20px;padding:3px 10px;border:1px solid rgba(176,128,48,0.22);
  transition:all .15s;white-space:nowrap;
}
.book-edition-pill-active{background:rgba(176,128,48,0.22)!important;border-color:rgba(176,128,48,0.5)!important;box-shadow:0 2px 6px rgba(176,128,48,0.2)}
@media(max-width:600px){#monthPickerBg .modal{border-radius:20px!important;max-height:80vh}}


.book-edition-flag{font-size:13px}
.book-edition-store{font-size:10px;opacity:.85}
@media(max-width:480px){
  .books-grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .book-card-body{padding:9px 10px}
  .book-card-title{font-size:12.5px}
  .book-edition-pill{font-size:10px;padding:2px 7px}
  .alpha-btn{width:24px;height:24px;font-size:10.5px;border-radius:6px}
  .filter-select{font-size:12px;padding:6px 10px}
}

/* ═══ COUNTRY MULTI-PICKER ═══ */
.country-picker-wrap{position:relative;display:inline-block}
.country-picker-btn{
  display:flex;align-items:center;gap:6px;
  padding:7px 12px;border-radius:var(--radius-lg);
  border:1.5px solid var(--border2);background:var(--surface);color:var(--text);
  font-size:13px;font-family:var(--font-body);font-weight:600;
  outline:none;cursor:pointer;transition:border-color .15s;
  box-shadow:var(--shadow-sm);white-space:nowrap;
  min-width:110px;justify-content:space-between;
}
.country-picker-btn:focus,.country-picker-btn.open{border-color:var(--accent)}
.country-picker-btn .cpb-arrow{font-size:10px;opacity:.5;transition:transform .2s}
.country-picker-btn.open .cpb-arrow{transform:rotate(180deg)}
.country-picker-active-count{
  background:var(--accent);color:#fff;
  font-size:10px;font-weight:700;
  padding:1px 6px;border-radius:20px;
  min-width:18px;text-align:center;
}
.country-picker-dropdown{
  position:absolute;top:calc(100% + 6px);left:0;z-index:100;
  background:var(--surface);border:1.5px solid var(--border2);
  border-radius:var(--radius);box-shadow:var(--shadow-lg);
  padding:6px;min-width:200px;max-height:340px;overflow-y:auto;
  display:none;
}
.country-picker-dropdown.open{display:block}
.cpd-item{
  display:flex;align-items:center;gap:8px;
  padding:7px 10px;border-radius:10px;
  cursor:pointer;font-size:13px;font-weight:500;color:var(--text);
  transition:background .12s;user-select:none;
}
.cpd-item *{cursor:pointer;pointer-events:none}
.cpd-item:hover{background:var(--surface2)}
.cpd-item.selected{background:var(--accent-soft);color:var(--accent);font-weight:700}
.cpd-item input[type=checkbox]{
  accent-color:var(--accent);width:14px;height:14px;flex-shrink:0;cursor:pointer;
}
.cpd-separator{height:1px;background:var(--border);margin:4px 0}
.cpd-other-wrap{padding:4px 2px 2px}
.cpd-other-input{
  width:100%;padding:6px 10px;border-radius:8px;
  border:1.5px solid var(--border2);background:var(--surface2);
  color:var(--text);font-size:12px;font-family:var(--font-body);
  outline:none;transition:border-color .15s;
}
.cpd-other-input:focus{border-color:var(--accent)}
.cpd-other-hint{font-size:10.5px;color:var(--muted);padding:2px 2px 0;font-style:italic}
.cpd-empty{font-size:12px;color:var(--muted);padding:10px;text-align:center;font-style:italic}
@media(max-width:600px){
  .country-picker-btn{font-size:12px;padding:7px 8px;min-width:90px}
  .country-picker-dropdown{min-width:180px}
}

/* ═══ MODAL ═══ */
.modal-bg{
  position:fixed;inset:0;
  background:rgba(20,10,18,.6);
  display:none;align-items:flex-end;justify-content:center;
  z-index:200;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
}
.modal-bg.open{display:flex}
@media(min-width:601px){.modal-bg{align-items:center;padding:1.5rem}}
.modal{
  background:var(--surface);border:1.5px solid var(--border2);
  border-radius:var(--radius-lg);padding:0;
  width:100%;max-width:480px;max-height:92vh;overflow-y:auto;
  box-shadow:0 28px 80px rgba(150,60,100,0.25);
  position:relative;
}
@media(max-width:600px){.modal{border-radius:24px 24px 0 0;max-height:92vh}}
.modal-close-btn{
  position:absolute;top:12px;right:12px;z-index:10;
  width:32px;height:32px;border-radius:50%;
  background:rgba(255,255,255,0.9);border:1px solid var(--border2);
  color:var(--muted);cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;backdrop-filter:blur(4px);font-family:var(--font-body);
  box-shadow:0 2px 8px rgba(0,0,0,.1);
}
.modal-close-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent);transform:scale(1.1)}
.modal-poster-full{width:100%;aspect-ratio:2/3;max-height:300px;object-fit:cover;object-position:top center;border-radius:calc(var(--radius-lg) - 1px) calc(var(--radius-lg) - 1px) 0 0;display:block}
.modal-poster-full-ph{width:100%;height:160px;background:linear-gradient(135deg,var(--accent-soft),var(--lavender-soft));border-radius:calc(var(--radius-lg) - 1px) calc(var(--radius-lg) - 1px) 0 0;display:flex;align-items:center;justify-content:center;font-size:40px}
.modal-body{padding:1.5rem 1.5rem 1.75rem}
.modal-title{font-family:var(--font-display);font-size:24px;font-weight:700;color:var(--text);line-height:1.2;margin-bottom:4px;letter-spacing:-.01em}
.modal-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.modal-meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px}
.meta-item{background:var(--surface2);border-radius:10px;padding:8px 12px;border:1px solid var(--border)}
.meta-key{font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;font-weight:700}
.meta-val{font-size:13px;color:var(--text);font-weight:600;margin-top:2px}
/* Trailer */
.trailer-wrap{margin:14px 0 10px;border-radius:12px;overflow:hidden;background:#000}
.trailer-thumb-wrap{position:relative;cursor:pointer;width:100%;aspect-ratio:16/9;display:block;overflow:hidden;border-radius:12px}

.trailer-thumb-wrap:hover .trailer-thumb{transform:scale(1.03)}

.trailer-play-circle{width:60px;height:60px;background:rgba(201,79,124,.9);border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background .15s;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.trailer-thumb-wrap:hover .trailer-play-circle{background:rgba(201,79,124,1)}
.trailer-play-circle svg{width:24px;height:24px;fill:#fff;margin-left:5px}
.trailer-iframe{width:100%;aspect-ratio:16/9;border:none;display:block;border-radius:12px}

.trailer-yt-btn:hover{background:rgba(255,0,0,.16)}
.synopsis{
  font-size:13px;color:var(--muted);line-height:1.75;

}
.divider{height:1px;background:var(--border);margin:14px 0}
.ep-detail-list{display:grid;gap:5px}
.ep-detail-row{

  padding:8px 12px;border-radius:10px;
  border:1px solid var(--border);background:var(--surface2);
}
.ep-detail-num{font-size:12px;color:var(--muted);min-width:28px;font-weight:700}
.ep-detail-date{flex:1;font-size:13px;color:var(--text)}
.chip{font-size:11px;padding:2px 10px;border-radius:20px;font-weight:600}
.chip.aired{background:var(--teal-soft);color:var(--teal)}
.chip.pending{background:var(--accent-soft);color:var(--accent)}
.chip.skipped{background:#f0eeee;color:#bbb}
.btn{
  padding:8px 20px;border-radius:20px;border:1.5px solid var(--border2);
  cursor:pointer;font-size:13px;font-family:var(--font-body);font-weight:600;
  background:var(--surface);color:var(--text);transition:all .18s;

<script>
const MONTHS=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DAYS=['L','M','X','J','V','S','D'];
const DAYS_L=['lunes','martes','miércoles','jueves','viernes','sábado','domingo'];
const PALETTE=['#d4608a','#5bbcb0','#9b82c9','#e8a84a','#e06fa0','#4eadb5','#b07ad4','#d47a4e'];
const PALETTE_SOFT=['rgba(212,96,138,0.13)','rgba(91,188,176,0.13)','rgba(155,130,201,0.13)','rgba(232,168,74,0.13)','rgba(224,111,160,0.13)','rgba(78,173,181,0.13)','rgba(176,122,212,0.13)','rgba(212,122,78,0.13)'];
const GENRES=[
  'Romance','Drama','Comedia','Acción','Thriller','Misterio','Terror',
  'Fantasía','Ciencia Ficción','Sobrenatural','Aventura','Crimen',
  'Histórico','Médico','Legal','Político','Negocios','Deportes','Musical','Documental',
  'Slice of Life','Vida cotidiana','Melodrama','Psicológico',
  'Escolar','Universitario','Coming of Age','Familia','Amistad',
  'Artes marciales','Militar','Misterio sobrenatural',
  'Reencarnación','Viaje en el tiempo','Idols / Entretenimiento','Oficina / Trabajo','Food / Cocina',
];

let state={month:new Date().getMonth(),year:new Date().getFullYear(),tab:'cal',series:[],movies:[]};

function getDow(d){return(new Date(d+'T12:00:00').getDay()+6)%7}
function addDays(d,n){const x=new Date(d+'T12:00:00');x.setDate(x.getDate()+n);return x.toISOString().slice(0,10)}
function fmtDate(d){const x=new Date(d+'T12:00:00');return`${x.getDate()} ${MONTHS[x.getMonth()].slice(0,3)} ${x.getFullYear()}`}
function toStr(y,m,d){return`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`}
function getEmissionDays(s){if(s.emissionDays&&s.emissionDays.length>0)return[...s.emissionDays].sort((a,b)=>a-b);if(s.dayOfWeek!==undefined)return[s.dayOfWeek];return[0]}

// Normalize a series to always have a seasons array (backward compat)
function getSeasons(s){
  if(s.seasons&&s.seasons.length) return s.seasons;
  // Legacy: single-season series
  if(s.startDate&&s.totalEpisodes) return [{
    label:'Temporada 1',
    startDate:s.startDate, totalEpisodes:s.totalEpisodes,
    emissionDays:s.emissionDays||[s.dayOfWeek||0],
    skipDates:s.skipDates||[], episodes:s.episodes||[]
  }];
  return [];
}

// Generate episodes for a single season object
function genSeasonEps(season, globalEpOffset=0){
  const days=(season.emissionDays&&season.emissionDays.length)?[...season.emissionDays].sort((a,b)=>a-b):[season.dayOfWeek||0];
  const skipDates=new Set(season.skipDates||[]);
  const epOverrides=season.episodes||[];
  let firstDate=null;
  for(let o=0;o<14;o++){const c=addDays(season.startDate,o);if(days.includes(getDow(c))){firstDate=c;break;}}
  if(!firstDate) firstDate=season.startDate;
  const weekStart=addDays(firstDate,-getDow(firstDate));
  const slots=[], wn=Math.ceil((season.totalEpisodes+(skipDates.size||0))/days.length)+4;
  for(let w=0;w<wn&&slots.length<season.totalEpisodes+skipDates.size+10;w++){
    for(const d of days){const date=addDays(weekStart,d+w*7);if(date>=firstDate)slots.push(date);}
  }
  const valid=slots.filter(d=>!skipDates.has(d));
  const eps=[];
  for(let i=0;i<season.totalEpisodes;i++){
    const epNum=i+1, globalNum=globalEpOffset+epNum, base=valid[i]||addDays(firstDate,i*7);
    const ov=epOverrides.find(e=>e.num===epNum);
    eps.push(ov?{...ov,num:globalNum,seasonNum:epNum}:{num:globalNum,seasonNum:epNum,date:base,skipped:false});
  }
  return eps;
}

function genEps(s){
  const seasons=getSeasons(s);
  if(!seasons.length) return [];
  const allEps=[];
  let offset=0;
  seasons.forEach((season,idx)=>{
    const eps=genSeasonEps(season,offset);
    eps.forEach(ep=>allEps.push({...ep,season:idx+1,seasonLabel:season.label||`T${idx+1}`}));
    offset+=season.totalEpisodes;
  });
  return allEps;
}

async function loadData(){
  try{
    const r=await fetch('data.json?t='+Date.now());
    if(!r.ok) throw new Error('No se encontró data.json (código '+r.status+')');
    const d=await r.json();
    state.series=d.series||[];
    state.movies=d.movies||[];
    if(d.exportedAt){
      const dt=new Date(d.exportedAt);
      const badge=document.getElementById('updateBadge'); if(badge){badge.textContent='✓ Act. '+dt.toLocaleDateString('es-ES',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});badge.style.display='';}
    }
    return true;
  }catch(e){
    document.getElementById('calInner').innerHTML=`<div class="error-box"><strong>No se pudo cargar el calendario.</strong><br>Asegúrate de que <code>data.json</code> está en la misma carpeta.<br>Error: ${e.message}</div>`;
    return false;
  }
}

function renderStats(){
  const activeSeries=state.series.filter(s=>!s.upcoming);
  const now=new Date();
  // Solo las que tienen ≥1 ep emitido Y episodios futuros pendientes (= realmente en emisión)
  const airingNow=activeSeries.filter(s=>{
    const eps=genEps(s);
    const hasAired=eps.some(e=>new Date(e.date+'T12:00:00')<=now&&!e.skipped);
    const hasFuture=eps.some(e=>new Date(e.date+'T12:00:00')>now&&!e.skipped);
    return hasAired&&hasFuture;
  });
  const totalEps=activeSeries.reduce((a,s)=>{ return a+getSeasons(s).reduce((b,t)=>b+t.totalEpisodes,0); },0);
  const airedEps=activeSeries.reduce((a,s)=>{ const eps=genEps(s); return a+eps.filter(e=>new Date(e.date+'T12:00:00')<=now&&!e.skipped).length; },0);
  const upcoming=state.series.filter(s=>s.upcoming).length;
  const bookBased=state.series.filter(s=>s.basedOnBook).length;
  const movieCount=state.movies.length;
  const stats=[
    {num:airingNow.length, label:'series activas', cls:''},
  ];
  if(movieCount) stats.push({num:movieCount, label:'películas', cls:'lav'});
  if(upcoming) stats.push({num:upcoming, label:'próximamente', cls:'lav'});
  if(bookBased) stats.push({num:bookBased, label:'basadas en libro', cls:'gold'});
  document.getElementById('statsBar').innerHTML=stats.map(s=>
    `<div class="hero-stat"><span class="hero-stat-num ${s.cls}">${s.num}</span><span class="hero-stat-label">${s.label}</span></div>`
  ).join('');
}

function getEpMap(y,m){
  const map={};
  state.series.filter(s=>!s.upcoming).forEach((s)=>{
    const si=state.series.indexOf(s);
    genEps(s).forEach(ep=>{
      if(ep.skipped) return;
      const d=new Date(ep.date+'T12:00:00');
      if(d.getFullYear()===y&&d.getMonth()===m){
        if(!map[ep.date]) map[ep.date]=[];
        map[ep.date].push({s,ep,si,type:'series'});
      }
    });
  });
  state.movies.forEach((mv,mi)=>{
    if(!mv.date) return;
    const d=new Date(mv.date+'T12:00:00');
    if(d.getFullYear()===y&&d.getMonth()===m){
      if(!map[mv.date]) map[mv.date]=[];
      map[mv.date].push({s:mv,ep:{num:null,date:mv.date,skipped:false},si:mi,type:'movie'});
    }
  });
  return map;
}

function renderWeekPanel(){
  const now=new Date();
  const todayStr=toStr(now.getFullYear(),now.getMonth(),now.getDate());
  const items=[];
  state.series.filter(s=>!s.upcoming).forEach((s)=>{
    const si=state.series.indexOf(s);
    genEps(s).forEach(ep=>{
      if(!ep.skipped && ep.date===todayStr)
        items.push({type:'series',s,ep,si});
    });
  });
  state.movies.forEach((mv,mi)=>{
    if(mv.date && mv.date===todayStr)
      items.push({type:'movie',s:mv,ep:{date:mv.date},si:mi});
  });
  const panel=document.getElementById('weekPanel');
  if(!items.length){panel.innerHTML='';return;}
  let html=`<div class="week-panel"><div class="week-panel-title">🌸 Hoy</div><div class="week-panel-list">`;
  items.forEach(({type,s,ep,si})=>{
    if(type==='movie'){
      html+=`<div class="week-ep-row" onclick="openMovie(${si})">
        <div class="week-ep-dot" style="background:var(--lavender)"></div>
        <div class="week-ep-name">🎥 ${s.name}</div>
        <span class="week-ep-today">HOY</span>
      </div>`;
    } else {
      const col=PALETTE[si%PALETTE.length];
      html+=`<div class="week-ep-row" onclick="openSeries(${si})">
        <div class="week-ep-dot" style="background:${col}"></div>
        <div class="week-ep-name">${s.name} <span style="font-weight:400;color:var(--muted)">Ep.${ep.num}</span></div>
        <span class="week-ep-today">HOY</span>
      </div>`;
    }
  });
  html+='</div></div>';
  panel.innerHTML=html;
}

function renderCalLegend(){
  const {month:m,year:y}=state;
  const epMap=getEpMap(y,m);
  // Collect which series indices and whether any movie appears this month
  const seriesInMonth=new Set();
  let movieInMonth=false;
  Object.values(epMap).forEach(items=>{
    items.forEach(({si,type})=>{
      if(type==='series') seriesInMonth.add(si);
      if(type==='movie') movieInMonth=true;
    });
  });
  if(!seriesInMonth.size && !movieInMonth){document.getElementById('calLegend').innerHTML='';return;}
  let html='<div class="cal-legend">';
  seriesInMonth.forEach(si=>{
    const s=state.series[si];
    const col=PALETTE[si%PALETTE.length];

}

function renderCal(){
  const {month:m,year:y}=state;
  document.getElementById('monthDisplay').innerHTML=`<span>${MONTHS[m]}</span> ${y}`;
  const epMap=getEpMap(y,m);
  const first=new Date(y,m,1), startDow=(first.getDay()+6)%7;
  const dim=new Date(y,m+1,0).getDate(), prevDim=new Date(y,m,0).getDate();
  const tStr=toStr(new Date().getFullYear(),new Date().getMonth(),new Date().getDate());
  let html='<div class="cal-wrap"><div class="cal-grid">';
  DAYS.forEach(d=>{html+=`<div class="day-header">${d}</div>`;});
  for(let i=startDow-1;i>=0;i--)
    html+=`<div class="day-cell other-month"><div class="day-num">${prevDim-i}</div></div>`;
  for(let d=1;d<=dim;d++){
    const ds=toStr(y,m,d), eps=epMap[ds]||[], isToday=ds===tStr;
    const isPast=ds<tStr, isFuture=ds>tStr;
    html+=`<div class="day-cell${isToday?' today':''}${isPast?' is-past':''}${isFuture?' is-future':''}${eps.length?' has-eps':''}" ${eps.length?`onclick="openDay('${ds}')"`:''}><div class="day-num">${d}</div>`;
    eps.slice(0,3).forEach(({s,ep,si,type})=>{
      if(type==='movie'){
        const bg='rgba(155,130,201,0.15)';
        const thumb=s.poster?`<img class="ep-thumb" src="${s.poster}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`:'' ;
        const ph=`<div class="ep-thumb-ph" style="${s.poster?'display:none':''}background:${bg}">🎥</div>`;
        html+=`<div class="ep-pill movie-pill" style="background:${bg}">
          ${thumb}${ph}
          <div class="ep-pill-text" style="color:var(--lavender)">
            <div class="ep-pill-name">${s.name}</div>
            <div class="ep-pill-ep">🎥 Película</div>
          </div></div>`;
      } else {
        const col=PALETTE[si%PALETTE.length], bg=PALETTE_SOFT[si%PALETTE_SOFT.length];
        const thumb=s.poster?`<img class="ep-thumb" src="${s.poster}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`:'' ;
        const ph=`<div class="ep-thumb-ph" style="${s.poster?'display:none':''}background:${bg}">🎬</div>`;
        html+=`<div class="ep-pill${ep.skipped?' skipped':''}" style="background:${bg}">
          ${thumb}${ph}
          <div class="ep-pill-text" style="color:${col}">
            <div class="ep-pill-name">${s.name}</div>
            <div class="ep-pill-ep">Ep. ${ep.num}${ep.skipped?' · ✗':''}</div>
          </div></div>`;
      }
    });
    if(eps.length>3) html+=`<div style="font-size:10px;color:var(--muted);padding:2px 4px">+${eps.length-3} más</div>`;
    html+='</div>';
  }
  const rem=(7-(startDow+dim)%7)%7;
  for(let d=1;d<=rem;d++) html+=`<div class="day-cell other-month"><div class="day-num">${d}</div></div>`;
  html+='</div></div>';
  document.getElementById('calInner').innerHTML=html;
  renderCalLegend();
  renderWeekPanel();
}

function seriesCardHtml(s, si){
  const now=new Date();
  const todayStr=toStr(now.getFullYear(),now.getMonth(),now.getDate());
  const eps=genEps(s);
  const seasons=getSeasons(s);
  const totalEps=seasons.reduce((a,t)=>a+t.totalEpisodes,0);
  const aired=eps.filter(e=>new Date(e.date+'T12:00:00')<=now&&!e.skipped).length;
  const pct=Math.round(aired/Math.max(totalEps,1)*100);
  const col=PALETTE[si%PALETTE.length];
  const next=eps.find(e=>new Date(e.date+'T12:00:00')>now&&!e.skipped);
  const todayEps=eps.filter(e=>e.date===todayStr&&!e.skipped);
  // Days label: use last season's emission days (currently airing season)
  const activeSeason=seasons[seasons.length-1];
  const activeDays=((activeSeason?.emissionDays&&activeSeason.emissionDays.length)?activeSeason.emissionDays:[activeSeason?.dayOfWeek||0]).map(d=>DAYS_L[d]).join(' y ');
  const seasonsBadge=seasons.length>1?`<span class="badge" style="background:var(--lavender-soft);color:var(--lavender)">T${seasons.length}</span>`:'';
  const posterEl=s.poster
    ?`<div class="series-card-poster-wrap"><img class="series-card-poster" src="${s.poster}" alt="${s.name}" onerror="this.outerHTML='<div class=series-card-poster-ph>🎬</div>'"></div>`
    :`<div class="series-card-poster-wrap"><div class="series-card-poster-ph">🎬</div></div>`;
  const links=s.watchLinks&&s.watchLinks.length?s.watchLinks:(s.networkUrl?[{name:s.network||'Ver serie',url:s.networkUrl}]:[]);
  const watchRow=links.length?`<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:4px">${links.map(l=>`<a class="card-watch-pill" href="${l.url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">▶ ${l.name}</a>`).join('')}</div>`:'';
  let nextLine='';
  if(todayEps.length){
    nextLine=`<div class="series-card-today">🌸 Hoy · Ep. ${todayEps.map(e=>e.num).join(' & ')}</div>`;
  } else if(next){
    const seasonLabel=seasons.length>1?` <span style="font-size:9px;opacity:.7">${next.seasonLabel}</span>`:'';
    nextLine=`<div class="series-card-next">▶ Ep. ${next.seasonNum}${seasonLabel} — ${fmtDate(next.date)}</div>`;
  } else {
    nextLine=`<div class="series-card-done">✓ Finalizada</div>`;
  }
  const progressBar=`<div class="progress-wrap">
    <div class="progress-fill" style="width:${pct}%;background:${col}"></div>
    ${pct>0&&pct<100?`<div class="progress-today-marker" style="left:${pct}%"></div>`:''}
  </div>`;
  const genrePills=s.genres&&s.genres.length
    ?`<div style="display:flex;flex-wrap:wrap;gap:3px;margin-top:5px">${s.genres.slice(0,3).map(g=>`<span style="font-size:9.5px;padding:2px 7px;border-radius:20px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-weight:600;cursor:pointer" onclick="event.stopPropagation();seriesFilters.genre='${g}';renderListResults()">${g}</span>`).join('')}${s.genres.length>3?`<span style="font-size:9.5px;padding:2px 6px;border-radius:20px;background:var(--surface2);color:var(--muted)">+${s.genres.length-3}</span>`:''}</div>`:'';
  return `<div class="series-card" onclick="openSeries(${si})">
    ${posterEl}
    <div class="series-card-body">
      <div class="card-badges">${s.basedOnBook?'<span class="badge badge-book">📖 Libro</span>':''}${seasonsBadge}${s.country?`<span class="badge" style="background:var(--surface2);color:var(--muted)">${countryFlag(s.country)} ${s.country}</span>`:''}</div>
      <div class="series-card-name">${s.name}</div>
      <div class="series-card-meta">${s.network?s.network+' · ':''}${activeDays}</div>
      ${genrePills}
      ${watchRow}
      ${nextLine}
      ${progressBar}
      <div style="font-size:10px;color:var(--muted);margin-top:3px">${aired}/${totalEps} emitidos${seasons.length>1?` · ${seasons.length} temporadas`:''}</div>
      ${s.basedOnBook&&s.bookCoverUrl?`<div style="margin-top:8px;display:flex;align-items:center;gap:6px"><img src="${s.bookCoverUrl}" style="width:28px;height:40px;border-radius:4px;object-fit:cover;box-shadow:0 1px 4px rgba(0,0,0,.1)" onerror="this.style.display='none'">${s.bookUrl?`<a href="${s.bookUrl}" target="_blank" rel="noopener" style="font-size:10px;color:#b08a00;font-weight:600;text-decoration:none" onclick="event.stopPropagation()">📖 Ver libro</a>`:''}${!s.bookUrl&&s.bookSource?`<span style="font-size:10px;color:#b08a00;font-weight:600">${s.bookSource}</span>`:''}</div>`:''} 
    </div>
  </div>`;

  'Suecia':'🇸🇪','Noruega':'🇳🇴','Dinamarca':'🇩🇰','Finlandia':'🇫🇮','Países Bajos':'🇳🇱','Bélgica':'🇧🇪',

  'Argentina':'🇦🇷','Colombia':'🇨🇴','Chile':'🇨🇱','Perú':'🇵🇪',
  'Australia':'🇦🇺','Nueva Zelanda':'🇳🇿',
};
const COUNTRY_REGIONS={
  asia:['Corea del Sur','Corea','Japón','China','Taiwán','Tailandia','Filipinas','Hong Kong','Indonesia','Vietnam','Singapur','India','Malasia','Mongolia'],
  europa:['España','Francia','Italia','Reino Unido','Alemania','Portugal','Suecia','Noruega','Dinamarca','Finlandia','Países Bajos','Bélgica','Polonia','Rusia','Grecia','Turquía','Israel'],
  america:['EE.UU.','EEUU','Estados Unidos','Canadá','México','Brasil','Argentina','Colombia','Chile','Perú'],
  oceania:['Australia','Nueva Zelanda'],
};
const REGION_LABELS={'asia':'🌏 Asia','europa':'🌍 Europa','america':'🌎 América','oceania':'🌏 Oceanía','otros':'🌐 Otros'};

function countryFlag(country){return COUNTRY_FLAGS[country]||'🌐';}
function getRegion(country){
  for(const [r,list] of Object.entries(COUNTRY_REGIONS)){if(list.includes(country))return r;}
  return 'otros';
}
function groupByRegion(countries){
  const groups={};
  countries.forEach(c=>{
    const r=getRegion(c);
    if(!groups[r])groups[r]=[];
    groups[r].push(c);
  });
  return groups;
}

/* ═══ COUNTRY MULTI-PICKER LOGIC ═══ */
// availableCountries is passed in each time the picker is built/refreshed
function buildCountryPicker(id, onChange, availableCountries){
  const wrap=document.createElement('div');
  wrap.className='country-picker-wrap';
  wrap.id='cpWrap_'+id;
  const btn=document.createElement('button');
  btn.type='button';
  btn.className='country-picker-btn';
  btn.innerHTML='<span class="cpb-label">🌍 País</span><span class="cpb-arrow">▼</span>';
  const drop=document.createElement('div');
  drop.className='country-picker-dropdown';
  let selected=[];
  function getAll(){return [...selected];}
  function updateBtn(){
    const all=getAll();
    if(!all.length){btn.innerHTML='<span class="cpb-label">🌍 País</span><span class="cpb-arrow">▼</span>';}
    else if(all.length===1){btn.innerHTML=`<span class="cpb-label">${countryFlag(all[0])} ${all[0]}</span><span class="cpb-arrow">▼</span>`;}
    else{btn.innerHTML=`<span class="cpb-label">🌍 País <span class="country-picker-active-count">${all.length}</span></span><span class="cpb-arrow">▼</span>`;}
    btn.classList.toggle('open',drop.classList.contains('open'));
  }
  function buildDrop(){
    drop.innerHTML='';
    if(!availableCountries||!availableCountries.length){
      const empty=document.createElement('div');empty.className='cpd-empty';empty.textContent='Sin países disponibles';drop.appendChild(empty);return;
    }
    const useGroups=availableCountries.length>4;
    function makeItem(country){
      const item=document.createElement('div');
      item.className='cpd-item'+(selected.includes(country)?' selected':'');
      const flag=countryFlag(country);
      item.innerHTML=`<input type="checkbox" ${selected.includes(country)?'checked':''}><span style="display:flex;align-items:center;gap:6px"><span style="font-size:15px">${flag}</span>${country}</span>`;
      item.addEventListener('click',e=>{
        const cb=item.querySelector('input');
        if(e.target!==cb) cb.checked=!cb.checked;
        if(cb.checked){if(!selected.includes(country))selected.push(country);}
        else{selected=selected.filter(x=>x!==country);}
        item.classList.toggle('selected',selected.includes(country));
        updateBtn();onChange(getAll());
      });
      return item;
    }
    if(useGroups){
      const groups=groupByRegion(availableCountries);
      const regionOrder=['asia','europa','america','oceania','otros'];
      let first=true;
      regionOrder.forEach(r=>{
        if(!groups[r]||!groups[r].length) return;
        if(!first){const sep=document.createElement('div');sep.className='cpd-separator';drop.appendChild(sep);}
        first=false;
        const label=document.createElement('div');
        label.style.cssText='font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);padding:5px 10px 3px';
        label.textContent=REGION_LABELS[r];
        drop.appendChild(label);
        groups[r].forEach(c=>drop.appendChild(makeItem(c)));
      });
    } else {
      availableCountries.forEach(c=>drop.appendChild(makeItem(c)));
    }
  }
  btn.addEventListener('click',e=>{
    e.stopPropagation();
    const isOpen=drop.classList.contains('open');
    document.querySelectorAll('.country-picker-dropdown.open').forEach(d=>d.classList.remove('open'));
    document.querySelectorAll('.country-picker-btn.open').forEach(b=>b.classList.remove('open'));
    if(!isOpen){buildDrop();drop.classList.add('open');btn.classList.add('open');}
  });
  document.addEventListener('click',()=>{drop.classList.remove('open');btn.classList.remove('open');});
  drop.addEventListener('click',e=>e.stopPropagation());
  wrap.appendChild(btn);wrap.appendChild(drop);
  wrap._getSelected=getAll;
  wrap._reset=()=>{selected=[];buildDrop();updateBtn();onChange([]);};
  wrap._updateCountries=(newCountries)=>{
    availableCountries=newCountries;
    // Remove selected that no longer exist
    selected=selected.filter(s=>newCountries.includes(s));
    updateBtn();onChange(getAll());
  };
  return wrap;
}

let seriesSubtab='airing';
let seriesFilters={q:'',countries:[],sort:'recent',book:'all',year:'',genre:''};
// Pagination state
const PAGE_SIZE=20;
const paginationState={series:{airing:1,notstarted:1,finished:1},movies:1,upcoming:1};

function paginationHtml(current,total,onPageFn){
  if(total<=1) return '';
  const pages=[];
  // Always show first, last, current±1, and ellipsis
  const show=new Set([1,total,current,current-1,current+1].filter(p=>p>=1&&p<=total));
  const sorted=[...show].sort((a,b)=>a-b);
  let html='<div class="pagination">';
  html+=`<button class="pg-btn pg-prev" onclick="${onPageFn}(${current-1})" ${current===1?'disabled':''}>&larr;</button>`;
  let prev=null;
  sorted.forEach(p=>{
    if(prev!==null&&p-prev>1) html+='<span class="pg-ellipsis">…</span>';
    html+=`<button class="pg-btn${p===current?' pg-active':''}" onclick="${onPageFn}(${p})">${p}</button>`;
    prev=p;
  });
  html+=`<button class="pg-btn pg-next" onclick="${onPageFn}(${current+1})" ${current===total?'disabled':''}>&rarr;</button>`;
  html+='</div>';
  return html;
}

function renderListResults(){
  const resultsEl=document.getElementById('listResults');
  if(!resultsEl) return;
  // Sync select values in case called from filter clear
  const sortSel=document.getElementById('seriesSortSel');
  const bookSel=document.getElementById('seriesBookSel');
  const yearSel=document.getElementById('seriesYearSel');
  const genreSel=document.getElementById('seriesGenreSel');
  const clearBtn=document.getElementById('seriesClearBtn');
  if(sortSel) sortSel.value=seriesFilters.sort;
  if(bookSel) bookSel.value=seriesFilters.book;
  if(genreSel) genreSel.value=seriesFilters.genre;
  if(clearBtn) clearBtn.style.display=(seriesFilters.countries&&seriesFilters.countries.length||seriesFilters.book!=='all'||seriesFilters.year||seriesFilters.genre)?'':'none';

  const active=state.series.filter(s=>!s.upcoming);
  const filtered=applySeriesFilters(active);
  const now=new Date();

  // "En emisión": ya ha emitido al menos 1 ep Y tiene episodios futuros pendientes
  const airing=filtered.filter(s=>{
    const eps=genEps(s);
    const hasAired=eps.some(e=>new Date(e.date+'T12:00:00')<=now&&!e.skipped);
    const hasFuture=eps.some(e=>new Date(e.date+'T12:00:00')>now&&!e.skipped);
    return hasAired&&hasFuture;
  });
  // Ordenar "en emisión" por día de la semana del próximo ep (lun=0 … dom=6)
  airing.sort((a,b)=>{
    const nextEp=s=>{const eps=genEps(s);return eps.find(e=>new Date(e.date+'T12:00:00')>now&&!e.skipped);};
    const dayOf=s=>{const ep=nextEp(s);if(!ep)return 7;return(new Date(ep.date+'T12:00:00').getDay()+6)%7;};
    return dayOf(a)-dayOf(b);
  });

  // "Estreno Próximo": todos los episodios son futuros, ninguno emitido aún
  const notStarted=filtered.filter(s=>{
    const eps=genEps(s);
    const hasAired=eps.some(e=>new Date(e.date+'T12:00:00')<=now&&!e.skipped);
    const hasFuture=eps.some(e=>new Date(e.date+'T12:00:00')>now&&!e.skipped);
    return hasFuture&&!hasAired;
  });

  // "Finalizadas": sin episodios futuros
  const finished=filtered.filter(s=>{
    const eps=genEps(s);
    return !eps.some(e=>new Date(e.date+'T12:00:00')>now&&!e.skipped);
  });

  // Auto-switch subtab if current subtab has no results
  if(seriesSubtab==='airing'&&!airing.length){
    if(notStarted.length) seriesSubtab='notstarted';
    else if(finished.length) seriesSubtab='finished';
  }
  if(seriesSubtab==='notstarted'&&!notStarted.length){
    if(airing.length) seriesSubtab='airing';
    else if(finished.length) seriesSubtab='finished';
  }
  if(seriesSubtab==='finished'&&!finished.length){
    if(airing.length) seriesSubtab='airing';
    else if(notStarted.length) seriesSubtab='notstarted';
  }

  if(!filtered.length){
    resultsEl.innerHTML='<div class="search-empty">No se encontró ninguna serie con esos filtros.</div>';
    return;
  }

  // Build subtabs — only show "Estreno Próximo" tab if there are any
  let tabsHtml=`<div class="subtabs">
    <button class="subtab${seriesSubtab==='airing'?' active':''}" onclick="switchSeriesSubtab('airing')">
      🌸 En emisión<span class="subtab-count">${airing.length}</span>
    </button>`;
  if(notStarted.length){
    tabsHtml+=`<button class="subtab${seriesSubtab==='notstarted'?' active':''}" onclick="switchSeriesSubtab('notstarted')">
      🗓️ Estreno Próximo<span class="subtab-count">${notStarted.length}</span>
    </button>`;
  }
  tabsHtml+=`<button class="subtab${seriesSubtab==='finished'?' active':''}" onclick="switchSeriesSubtab('finished')">
      ✓ Finalizadas<span class="subtab-count">${finished.length}</span>
    </button>
  </div>`;

  let html=tabsHtml;

  function renderSubtabGrid(list, emptyMsg){
    if(!list.length){ return '<div class="search-empty">'+emptyMsg+'</div>'; }
    const sub=seriesSubtab;
    const page=paginationState.series[sub]||1;
    const totalPages=Math.ceil(list.length/PAGE_SIZE);
    const safePage=Math.min(page,totalPages);
    if(paginationState.series[sub]!==safePage) paginationState.series[sub]=safePage;
    const slice=list.slice((safePage-1)*PAGE_SIZE, safePage*PAGE_SIZE);
    let out=`<div class="books-count">Mostrando <strong>${(safePage-1)*PAGE_SIZE+1}–${Math.min(safePage*PAGE_SIZE,list.length)}</strong> de <strong>${list.length}</strong> serie${list.length!==1?'s':''}</div><div class="series-grid">`;
    slice.forEach(s=>{ out+=seriesCardHtml(s, state.series.indexOf(s)); });
    out+='</div>';
    out+=paginationHtml(safePage, totalPages, `setSeriesPage_${sub}`);
    return out;
  }

  // Expose page setters globally
  window.setSeriesPage_airing=p=>{paginationState.series.airing=p;renderListResults();scrollToResults('listResults');};
  window.setSeriesPage_notstarted=p=>{paginationState.series.notstarted=p;renderListResults();scrollToResults('listResults');};
  window.setSeriesPage_finished=p=>{paginationState.series.finished=p;renderListResults();scrollToResults('listResults');};

  if(seriesSubtab==='airing'){
    html+=renderSubtabGrid(airing,'No hay series en emisión con esos filtros.');
  } else if(seriesSubtab==='notstarted'){
    html+=renderSubtabGrid(notStarted,'No hay series con estreno próximo con esos filtros.');
  } else {
    html+=renderSubtabGrid(finished,'No hay series finalizadas con esos filtros.');
  }
  resultsEl.innerHTML=html;
}

function scrollToResults(id){
  const el=document.getElementById(id);
  if(el) el.scrollIntoView({behavior:'smooth',block:'start'});
}

function getCountries(arr){ return [...new Set(arr.map(s=>s.country).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'es')); }

function getSeriesLastActivity(s){
  const eps=genEps(s);
  const now=new Date();
  const aired=eps.filter(e=>!e.skipped&&new Date(e.date+'T12:00:00')<=now).map(e=>e.date);
  if(aired.length) return aired[aired.length-1];
  const upcoming=eps.filter(e=>!e.skipped&&new Date(e.date+'T12:00:00')>now).map(e=>e.date);
  if(upcoming.length) return upcoming[0];
  const seasons=getSeasons(s);
  return (seasons[0]&&seasons[0].startDate)||s.startDate||'';
}

function applySeriesFilters(arr){
  let r=[...arr];
  const q=seriesFilters.q.toLowerCase().trim();
  if(q) r=r.filter(s=>s.name.toLowerCase().includes(q)||(s.country||'').toLowerCase().includes(q)||(s.network||'').toLowerCase().includes(q));
  if(seriesFilters.countries&&seriesFilters.countries.length) r=r.filter(s=>seriesFilters.countries.includes(s.country));
  if(seriesFilters.book==='yes') r=r.filter(s=>s.basedOnBook);
  if(seriesFilters.book==='no') r=r.filter(s=>!s.basedOnBook);
  if(seriesFilters.year) r=r.filter(s=>{ const seasons=getSeasons(s); return seasons.some(t=>t.startDate&&t.startDate.startsWith(seriesFilters.year))||(s.startDate&&s.startDate.startsWith(seriesFilters.year)); });
  if(seriesFilters.genre) r=r.filter(s=>s.genres&&s.genres.includes(seriesFilters.genre));
  if(seriesFilters.sort==='az') r.sort((a,b)=>a.name.localeCompare(b.name,'es'));
  else if(seriesFilters.sort==='za') r.sort((a,b)=>b.name.localeCompare(a.name,'es'));
  else if(seriesFilters.sort==='eps') r.sort((a,b)=>b.totalEpisodes-a.totalEpisodes);
  else if(seriesFilters.sort==='date') r.sort((a,b)=>{ const da=(getSeasons(a)[0]?.startDate||a.startDate||''); const db=(getSeasons(b)[0]?.startDate||b.startDate||''); return db.localeCompare(da); });
  else if(seriesFilters.sort==='dateold') r.sort((a,b)=>{ const da=(getSeasons(a)[0]?.startDate||a.startDate||''); const db=(getSeasons(b)[0]?.startDate||b.startDate||''); return da.localeCompare(db); });
  else if(seriesFilters.sort==='recent') r.sort((a,b)=>{const ua=a.updatedAt||'';const ub=b.updatedAt||'';return ub.localeCompare(ua);});
  return r;
}

let upcomingFilters={q:'',countries:[],sort:'az',book:'all',year:'',genre:''};

function applyUpcomingFilters(arr){
  let r=[...arr];
  const q=upcomingFilters.q.toLowerCase().trim();
  if(q) r=r.filter(s=>s.name.toLowerCase().includes(q)||(s.country||'').toLowerCase().includes(q)||(s.network||'').toLowerCase().includes(q));
  if(upcomingFilters.countries&&upcomingFilters.countries.length) r=r.filter(s=>upcomingFilters.countries.includes(s.country));
  if(upcomingFilters.book==='yes') r=r.filter(s=>s.basedOnBook);
  if(upcomingFilters.book==='no') r=r.filter(s=>!s.basedOnBook);
  if(upcomingFilters.year) r=r.filter(s=>s.startDate&&s.startDate.startsWith(upcomingFilters.year));
  if(upcomingFilters.genre) r=r.filter(s=>s.genres&&s.genres.includes(upcomingFilters.genre));
  if(upcomingFilters.sort==='az') r.sort((a,b)=>a.name.localeCompare(b.name,'es'));
  else if(upcomingFilters.sort==='za') r.sort((a,b)=>b.name.localeCompare(a.name,'es'));
  else if(upcomingFilters.sort==='recent') r.sort((a,b)=>{
    // Score by completeness (poster+synopsis+trailer = more recently updated)
    const score=s=>((s.poster?2:0)+(s.synopsis?2:0)+(s.trailerUrl?1:0)+(s.bookCoverUrl?1:0));
    const sd=score(b)-score(a);
    if(sd!==0) return sd;
    // Fallback: higher ID = added later
    return Number(b.id||0)-Number(a.id||0);
  });
  return r;
}

function daysUntil(dateStr){
  const now=new Date(); now.setHours(0,0,0,0);
  const target=new Date(dateStr+'T00:00:00');
  return Math.round((target-now)/(1000*60*60*24));
}

function openSeries(si){
  const s=state.series[si], allEps=genEps(s), now=new Date();
  const seasons=getSeasons(s);
  const totalEps=seasons.reduce((a,t)=>a+t.totalEpisodes,0);
  const col=PALETTE[si%PALETTE.length];
  const aired=allEps.filter(e=>new Date(e.date+'T12:00:00')<=now&&!e.skipped).length;
  const pct=Math.round(aired/Math.max(totalEps,1)*100);
  const activeSeason=seasons[seasons.length-1];
  const activeDays=((activeSeason?.emissionDays&&activeSeason.emissionDays.length)?activeSeason.emissionDays:[activeSeason?.dayOfWeek||0]).map(d=>DAYS_L[d]).join(' y ');
  const next=allEps.find(e=>new Date(e.date+'T12:00:00')>now&&!e.skipped);
  const todayStr=toStr(now.getFullYear(),now.getMonth(),now.getDate());
  const todayEps=allEps.filter(e=>e.date===todayStr&&!e.skipped);
  const isFinished=!next;
  const datesWithEps=allEps.filter(e=>!e.skipped).map(e=>e.date).sort();
  const firstEpDate=datesWithEps[0]||(seasons[0]&&seasons[0].startDate)||s.startDate;
  const lastEpDate=datesWithEps[datesWithEps.length-1];

    nextBadgeHtml=`<div class="modal-next-badge today">🌸 Hoy · Ep. ${todayEps.map(e=>e.seasonNum).join(' & ')}${seasons.length>1?' ('+todayEps[0].seasonLabel+')':''}</div>`;
  } else if(next){
    const du=daysUntil(next.date);
    const label=du===1?'mañana':du===0?'hoy':`en ${du} días`;
    const seasonHint=seasons.length>1?` · ${next.seasonLabel}`:'';
    nextBadgeHtml=`<div class="modal-next-badge soon">▶ Ep. ${next.seasonNum}${seasonHint} — ${fmtDate(next.date)} · ${label}</div>`;

  if(s.network) metaGrid+=`<div class="meta-item"><div class="meta-key">Plataforma</div><div class="meta-val">${s.network}</div></div>`;
  metaGrid+=`<div class="meta-item"><div class="meta-key">Episodios</div><div class="meta-val">${totalEps}${seasons.length>1?` (${seasons.length}T)`:''}</div></div>`;
  const watchLinksHtml=(()=>{const links=s.watchLinks&&s.watchLinks.length?s.watchLinks:(s.networkUrl?[{name:s.network||'Ver serie',url:s.networkUrl}]:[]);if(!links.length)return '';return `<div class="watch-links-label">▶ Dónde ver</div><div class="watch-links">${links.map(l=>`<a class="watch-link" href="${l.url}" target="_blank" rel="noopener"><span class="watch-link-icon">▶</span>${l.name}</a>`).join('')}</div>`;})();
  const progressBlock=`<div class="modal-progress-block">
    <div class="modal-progress-header">
      <span class="modal-progress-label">${aired} / ${totalEps} emitidos · ${activeDays}</span>
      <span class="modal-progress-pct" style="color:${col}">${pct}%</span>

    </div>

  let html=`${posterEl}<div class="modal-body">

function applyMoviesFilters(arr){
  let r=[...arr];
  const q=moviesFilters.q.toLowerCase().trim();
  if(q) r=r.filter(mv=>mv.name.toLowerCase().includes(q)||(mv.country||'').toLowerCase().includes(q)||(mv.network||'').toLowerCase().includes(q));
  if(moviesFilters.countries&&moviesFilters.countries.length) r=r.filter(mv=>moviesFilters.countries.includes(mv.country));
  if(moviesFilters.book==='yes') r=r.filter(mv=>mv.basedOnBook);
  if(moviesFilters.book==='no') r=r.filter(mv=>!mv.basedOnBook);
  if(moviesFilters.year) r=r.filter(mv=>mv.date&&mv.date.startsWith(moviesFilters.year));
  if(moviesFilters.genre) r=r.filter(mv=>mv.genres&&mv.genres.includes(moviesFilters.genre));
  if(moviesFilters.sort==='az') r.sort((a,b)=>a.name.localeCompare(b.name,'es'));
  else if(moviesFilters.sort==='za') r.sort((a,b)=>b.name.localeCompare(a.name,'es'));
  else if(moviesFilters.sort==='date') r.sort((a,b)=>{if(!a.date&&!b.date)return 0;if(!a.date)return 1;if(!b.date)return-1;return b.date.localeCompare(a.date);});
  else if(moviesFilters.sort==='dateold') r.sort((a,b)=>{if(!a.date&&!b.date)return 0;if(!a.date)return 1;if(!b.date)return-1;return a.date.localeCompare(b.date);});
  else if(moviesFilters.sort==='recent') r.sort((a,b)=>{const ua=a.updatedAt||'';const ub=b.updatedAt||'';return ub.localeCompare(ua);});
  return r;
}

function renderMoviesResults(){
  const resultsEl=document.getElementById('moviesResults');
  if(!resultsEl) return;

  const clearBtn=document.getElementById('moviesClearBtn');
  const genreSel=document.getElementById('moviesGenreSel');

  if(clearBtn) clearBtn.style.display=(moviesFilters.countries&&moviesFilters.countries.length||moviesFilters.book!=='all'||moviesFilters.year||moviesFilters.genre)?'':'none';

  const now=new Date();
  const filtered=applyMoviesFilters(state.movies);
  const inTheaters=filtered.filter(mv=>mv.date&&new Date(mv.date+'T12:00:00')<=now);
  const comingSoon=filtered.filter(mv=>!mv.date||new Date(mv.date+'T12:00:00')>now);

  if(moviesSubtab==='soon'&&!comingSoon.length) moviesSubtab='all';

  if(!filtered.length){

  if(!shown.length){
    html+='<div class="search-empty">No hay películas en esta categoría con esos filtros.</div>';

  }
  // Expose page setter
  window.setMoviesPage=p=>{paginationState.movies=p;renderMoviesResults();scrollToResults('moviesResults');};
  const mvPage=Math.min(paginationState.movies,Math.ceil(shown.length/PAGE_SIZE))||1;
  paginationState.movies=mvPage;
  const mvSlice=shown.slice((mvPage-1)*PAGE_SIZE, mvPage*PAGE_SIZE);

  html+=`<div class="books-count">Mostrando <strong>${(mvPage-1)*PAGE_SIZE+1}–${Math.min(mvPage*PAGE_SIZE,shown.length)}</strong> de <strong>${shown.length}</strong> película${shown.length!==1?'s':''}</div>

function getYoutubeId(url){
  if(!url) return null;
  // Normalize: trim whitespace
  url = url.trim();
  // Already an 11-char ID (no slashes or dots)
  if(/^[\w-]{11}$/.test(url)) return url;
  // youtu.be/ID or youtu.be/ID?si=...
  let m=url.match(/youtu\.be\/([\w-]{11})/);
  if(m) return m[1];
  // ?v=ID or &v=ID
  m=url.match(/[?&]v=([\w-]{11})/);
  if(m) return m[1];
  // /embed/ID
  m=url.match(/\/embed\/([\w-]{11})/);
  if(m) return m[1];
  // /shorts/ID
  m=url.match(/\/shorts\/([\w-]{11})/);
  if(m) return m[1];
  // /watch/ID
  m=url.match(/\/watch\/([\w-]{11})/);
  if(m) return m[1];
  // Last resort: any 11-char word after last /
  m=url.match(/\/([\w-]{11})(?:[?&]|$)/);
  if(m) return m[1];
  return null;
}

function getAllBooks(){
  const books=[];
  state.series.forEach((s,i)=>{
    if(s.basedOnBook){
      const editions=s.bookLinks&&s.bookLinks.length?s.bookLinks:(s.bookUrl?[{lang:'es',store:'Amazon',url:s.bookUrl}]:[]);
      books.push({title:s.bookSource||'Sin título',cover:s.bookCoverUrl||'',editions,seriesName:s.name,type:'serie',order:i});
    }
  });
  (state.movies||[]).forEach((mv,i)=>{
    if(mv.basedOnBook){
      const editions=mv.bookLinks&&mv.bookLinks.length?mv.bookLinks:(mv.bookUrl?[{lang:'es',store:'Amazon',url:mv.bookUrl}]:[]);
      books.push({title:mv.bookSource||'Sin título',cover:mv.bookCoverUrl||'',editions,seriesName:mv.name,type:'película',order:1000+i});
    }
  });
  return books;
}

function renderBooksResults(){
  const resultsEl=document.getElementById('booksResults');
  const alphaEl=document.getElementById('booksAlphaBar');
  if(!resultsEl) return;

  // Sync selects
  const typeSel=document.getElementById('booksTypeSel');
  const langSel=document.getElementById('booksLangSel');
  const sortSel=document.getElementById('booksSortSel');
  const clearBtn=document.getElementById('booksClearBtn');
  if(typeSel) typeSel.value=booksState.type;
  if(langSel) langSel.value=booksState.lang;
  if(sortSel) sortSel.value=booksState.sort;
  if(clearBtn) clearBtn.style.display=(booksState.type!=='all'||booksState.lang||booksState.letter)?'':'none';

  const allBooks=getAllBooks();
  const usedLetters=new Set(allBooks.map(b=>b.title[0]?.toUpperCase()).filter(Boolean));
  const ALPHABET='ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');

  // Render alpha bar (lightweight, no inputs)
  if(alphaEl){
    alphaEl.className='alpha-bar';
    alphaEl.innerHTML=`<button class="alpha-btn${!booksState.letter?' alpha-active':''}" onclick="booksState.letter='';renderBooksResults()" title="Todos">Todas</button>`
      +ALPHABET.map(l=>{
        const has=usedLetters.has(l);
        return `<button class="alpha-btn${booksState.letter===l?' alpha-active':''}${!has?' alpha-disabled':''}" onclick="${has?`booksState.letter=booksState.letter==='${l}'?'':'${l}';renderBooksResults()`:''}" title="${l}">${l}</button>`;
      }).join('');
  }

  let books=[...allBooks];
  const q=booksState.q.toLowerCase().trim();
  if(q) books=books.filter(b=>b.title.toLowerCase().includes(q)||b.seriesName.toLowerCase().includes(q));
  if(booksState.type!=='all') books=books.filter(b=>b.type===booksState.type);
  if(booksState.letter) books=books.filter(b=>b.title[0]?.toUpperCase()===booksState.letter);
  if(booksState.lang) books=books.filter(b=>b.editions.some(e=>e.lang===booksState.lang));
  if(booksState.sort==='az') books.sort((a,b)=>a.title.localeCompare(b.title,'es'));
  else if(booksState.sort==='za') books.sort((a,b)=>b.title.localeCompare(a.title,'es'));
  else if(booksState.sort==='serie') books.sort((a,b)=>a.seriesName.localeCompare(b.seriesName,'es'));
  else if(booksState.sort==='pub') books.sort((a,b)=>a.order-b.order);

  if(!books.length){
    resultsEl.innerHTML='<div class="search-empty">No se encontró ningún libro con esos criterios.</div>';
    return;
  }
  let html=`<div class="books-count">Mostrando <strong>${books.length}</strong> de <strong>${allBooks.length}</strong> libro${allBooks.length!==1?'s':''}</div>`;
  html+='<div class="books-grid">';
  books.forEach(b=>{
    const coverEl=b.cover?`<img class="book-card-cover" src="${b.cover}" alt="${b.title}" onerror="this.outerHTML='<div class=book-card-cover-ph>📖</div>'">`:`<div class="book-card-cover-ph">📖</div>`;
    const editionPills=b.editions.map(e=>{
      const isActive=booksState.lang&&e.lang===booksState.lang;
      return `<a class="book-edition-pill${isActive?' book-edition-pill-active':''}" href="${e.url}" target="_blank" rel="noopener"><span class="book-edition-flag">${langFlag(e.lang)}</span><span class="book-edition-store">${e.store}</span></a>`;
    }).join('');
    html+=`<div class="book-card">
      ${coverEl}
      <div class="book-card-body">
        <div class="book-card-title">${b.title}</div>
        <div class="book-card-series">Adaptada en <strong>${b.seriesName}</strong> <span class="book-type-tag">${b.type}</span></div>
        ${b.editions.length?`<div class="book-editions-row">${editionPills}</div>`:'<div style="font-size:11px;color:var(--muted);font-style:italic;margin-top:4px">Sin ediciones enlazadas</div>'}
      </div>
    </div>`;
  });
  html+='</div>';
  resultsEl.innerHTML=html;
}
