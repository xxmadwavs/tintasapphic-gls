function applyAnimeFilters(arr){
  let r=[...arr];
  const q=animeFilters.q.toLowerCase().trim();
  if(q) r=r.filter(s=>s.name.toLowerCase().includes(q)||(s.country||'').toLowerCase().includes(q)||(s.network||'').toLowerCase().includes(q));
  if(animeFilters.countries&&animeFilters.countries.length) r=r.filter(s=>animeFilters.countries.includes(s.country));
  if(animeFilters.book==='yes') r=r.filter(s=>s.basedOnBook);
  if(animeFilters.book==='no') r=r.filter(s=>!s.basedOnBook);
  if(animeFilters.year) r=r.filter(s=>{ const y=(s.startDate||s.date||'').substring(0,4); return y===animeFilters.year||(s.year&&String(s.year)===animeFilters.year); });
  if(animeFilters.genre) r=r.filter(s=>s.genres&&s.genres.includes(animeFilters.genre));
  if(animeFilters.sort==='az') r.sort((a,b)=>a.name.localeCompare(b.name,'es'));
  else if(animeFilters.sort==='za') r.sort((a,b)=>b.name.localeCompare(a.name,'es'));
  else if(animeFilters.sort==='date') r.sort((a,b)=>((b.startDate||b.date||'')).localeCompare((a.startDate||a.date||'')));
  else if(animeFilters.sort==='dateold') r.sort((a,b)=>((a.startDate||a.date||'')).localeCompare((b.startDate||b.date||'')));
  return r;
}

function applyRealitiesFilters(arr){
  let r=[...arr];
  const q=realitiesFilters.q.toLowerCase().trim();
  if(q) r=r.filter(s=>s.name.toLowerCase().includes(q)||(s.country||'').toLowerCase().includes(q)||(s.network||'').toLowerCase().includes(q));
  if(realitiesFilters.countries&&realitiesFilters.countries.length) r=r.filter(s=>realitiesFilters.countries.includes(s.country));
  if(realitiesFilters.year) r=r.filter(s=>{ const y=(s.startDate||s.date||'').substring(0,4); return y===realitiesFilters.year||(s.year&&String(s.year)===realitiesFilters.year); });
  if(realitiesFilters.genre) r=r.filter(s=>s.genres&&s.genres.includes(realitiesFilters.genre));
  if(realitiesFilters.sort==='az') r.sort((a,b)=>a.name.localeCompare(b.name,'es'));
  else if(realitiesFilters.sort==='za') r.sort((a,b)=>b.name.localeCompare(a.name,'es'));
  else if(realitiesFilters.sort==='date') r.sort((a,b)=>((b.startDate||b.date||'')).localeCompare((a.startDate||a.date||'')));
  else if(realitiesFilters.sort==='dateold') r.sort((a,b)=>((a.startDate||a.date||'')).localeCompare((b.startDate||b.date||'')));
  return r;
}

        ${posterEl}
        <div class="series-card-body">
          <div class="card-badges">${seasonsCount}${s.country?`<span class="badge" style="background:var(--teal-soft);color:var(--teal)">${countryFlag(s.country)} ${s.country}</span>`:''}</div>
          <div class="series-card-name">${s.name}</div>
          <div class="series-card-meta">${[s.network,year?'📅 '+year:null].filter(Boolean).join(' · ')}</div>
          ${genrePills}
          ${watchRow}
        </div>
      </div>`;
    });
    html+='</div>'+paginationHtml(page,totalPages,'setRealitiesPage');
    resultsEl.innerHTML=html;
  } else {
    const all=getRealitiesMoviesData();
    const filtered=applyRealitiesFilters(all);
    const page=paginationRealities.movies;
    const totalPages=Math.ceil(filtered.length/PAGE_SIZE)||1;
    const paged=filtered.slice((page-1)*PAGE_SIZE,page*PAGE_SIZE);
    window.setRealitiesMoviePage=p=>{paginationRealities.movies=p;renderRealitiesResults();scrollToResults('realitiesResults');};
    if(!filtered.length){resultsEl.innerHTML='<div class="search-empty">No se encontró ningún documental con esos filtros.</div>';return;}
    let html=`<div class="books-count">Mostrando <strong>${paged.length}</strong> de <strong>${filtered.length}</strong> documental${filtered.length!==1?'es':''}</div><div class="movies-grid">`;
    paged.forEach((mv,mi)=>{
      const posterEl=mv.poster?`<img class="movie-card-poster" src="${mv.poster}" alt="${mv.name}" onerror="this.outerHTML='<div class=movie-card-poster-ph>🎤</div>'">`:`<div class="movie-card-poster-ph">🎤</div>`;
      const dateStr=mv.date?fmtDate(mv.date):(mv.year?String(mv.year):'Fecha por confirmar');
      const links=mv.watchLinks&&mv.watchLinks.length?mv.watchLinks:(mv.networkUrl?[{name:mv.network||'Ver',url:mv.networkUrl}]:[]);
      const watchRow=links.length?`<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:4px">${links.map(l=>`<a class="card-watch-pill" href="${l.url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">▶ ${l.name}</a>`).join('')}</div>`:'';
      const genrePills=mv.genres&&mv.genres.length?`<div style="display:flex;flex-wrap:wrap;gap:3px;margin-top:5px">${mv.genres.slice(0,3).map(g=>`<span style="font-size:9.5px;padding:2px 7px;border-radius:20px;background:var(--teal-soft);border:1px solid rgba(74,173,160,0.2);color:var(--teal);font-weight:600">${g}</span>`).join('')}</div>`:'';
      html+=`<div class="movie-card" onclick="openRealityDetail('movie',${mi})">
        ${posterEl}
        <div class="movie-card-body">
          <div class="card-badges">${mv.country?`<span class="badge" style="background:var(--teal-soft);color:var(--teal)">${countryFlag(mv.country)} ${mv.country}</span>`:''}</div>
          <div class="movie-card-name">${mv.name}</div>
          <div class="movie-card-meta">📹 Documental · ${dateStr}</div>
          ${genrePills}
          ${watchRow}
        </div>
      </div>`;
    });
    html+='</div>'+paginationHtml(page,totalPages,'setRealitiesMoviePage');
    resultsEl.innerHTML=html;
  }
}

function openRealityDetail(type,idx){
  const item=(type==='series'?getRealitiesSeriesData():getRealitiesMoviesData())[idx];
  if(!item) return;
  const genrePills=item.genres&&item.genres.length?`<div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px">${item.genres.map(g=>`<span style="font-size:11px;padding:2px 10px;border-radius:20px;background:var(--teal-soft);color:var(--teal);font-weight:600;border:1px solid rgba(74,173,160,0.2)">${g}</span>`).join('')}</div>`:'';
  const links=(item.watchLinks&&item.watchLinks.length?item.watchLinks:(item.networkUrl?[{name:item.network||'Ver',url:item.networkUrl}]:[]));
  const watchPills=links.length?`<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">${links.map(l=>`<a class="card-watch-pill" href="${l.url}" target="_blank" rel="noopener">▶ ${l.name}</a>`).join('')}</div>`:'';
  const trailerBtn=item.trailerUrl?`<a class="btn btn-outline" href="${item.trailerUrl}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:6px;text-decoration:none">▶ Ver tráiler</a>`:'';
  const poster=item.poster?`<img src="${item.poster}" alt="${item.name}" style="width:130px;height:auto;border-radius:12px;object-fit:cover;box-shadow:var(--shadow-md);flex-shrink:0" onerror="this.outerHTML=''">`:'';
  const metaLine=[item.country?`${countryFlag(item.country)} ${item.country}`:null,item.year?String(item.year):null,item.network||null].filter(Boolean).join(' · ');
  const seasonsStr=item.seasons&&item.seasons.length>1?`<div style="font-size:12px;color:var(--muted);margin-bottom:8px">📺 ${item.seasons.length} temporadas · ${item.totalEpisodes||'?'} episodios</div>`:(item.totalEpisodes?`<div style="font-size:12px;color:var(--muted);margin-bottom:8px">📺 ${item.totalEpisodes} episodios</div>`:'');
  const synopsis=item.synopsis?`<div style="font-size:13px;line-height:1.7;color:var(--text);margin-bottom:14px">${item.synopsis}</div>`:'';
  document.getElementById('modalBox').innerHTML=`<button class="modal-close-btn" onclick="closeModal()">✕</button>
    <div class="modal-body">
      <div style="display:flex;gap:18px;margin-bottom:14px;align-items:flex-start">
        ${poster}
        <div style="flex:1;min-width:0">
          <div style="font-family:var(--font-display);font-size:20px;font-weight:700;color:var(--text);line-height:1.2;margin-bottom:6px">${item.name}</div>
          <div style="font-size:12px;color:var(--muted);margin-bottom:10px">${metaLine}</div>
          ${seasonsStr}
          ${genrePills}
          ${watchPills}
          ${trailerBtn}
        </div>
      </div>
      ${synopsis}
    </div>`;
  document.getElementById('modalBg').classList.add('open');
}


function switchTab(tab){
  state.tab=tab;
  ['cal','list','movies','upcoming','books','anime','realities'].forEach(t=>{
    const btn=document.getElementById('tab'+t.charAt(0).toUpperCase()+t.slice(1));
    const view=document.getElementById('view'+t.charAt(0).toUpperCase()+t.slice(1));
    if(btn) btn.className='tab'+(tab===t?' active':'');
    if(view) view.style.display=tab===t?'':'none';
  });
  // Scroll to top of content on mobile
  if(window.innerWidth<=600) window.scrollTo({top:0,behavior:'smooth'});
  if(tab==='cal') renderCal();
  if(tab==='list') renderList();
  if(tab==='movies') renderMovies();
  if(tab==='upcoming') renderUpcoming();
  if(tab==='books') renderBooks();
  if(tab==='anime') renderAnime();
  if(tab==='realities') renderRealities();
}

document.getElementById('prevBtn').onclick=()=>{state.month--;if(state.month<0){state.month=11;state.year--;}renderCal();};
document.getElementById('nextBtn').onclick=()=>{state.month++;if(state.month>11){state.month=0;state.year++;}renderCal();};
document.getElementById('todayBtn').onclick=()=>{state.month=new Date().getMonth();state.year=new Date().getFullYear();renderCal();};

function openSearch(){
  document.getElementById('searchOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('searchOverlayInput').focus(),100);
  renderSearchResults('');
}
function closeSearch(){
  document.getElementById('searchOverlay').classList.remove('open');
  document.getElementById('searchOverlayInput').value='';
}
function renderSearchResults(q){
  const box=document.getElementById('searchOverlayResults');
  const term=q.toLowerCase().trim();
  if(!term){box.innerHTML='<div style="text-align:center;color:var(--muted);font-size:13px;padding:1rem">Escribe para buscar series o películas</div>';return;}
  const results=[];
  state.series.forEach((s,si)=>{
    if(s.name.toLowerCase().includes(term)||(s.network||'').toLowerCase().includes(term)||(s.country||'').toLowerCase().includes(term))
      results.push({type:'serie',s,si});
  });
  state.movies.forEach((mv,mi)=>{
    if(mv.name.toLowerCase().includes(term)||(mv.network||'').toLowerCase().includes(term)||(mv.country||'').toLowerCase().includes(term))
      results.push({type:'pelicula',s:mv,si:mi});
  });
  getAnimeSeriesData().forEach((s,si)=>{
    if(s.name.toLowerCase().includes(term)||(s.network||'').toLowerCase().includes(term)||(s.country||'').toLowerCase().includes(term))
      results.push({type:'anime',s,si});
  });
  getAnimeMoviesData().forEach((mv,mi)=>{
    if(mv.name.toLowerCase().includes(term)||(mv.network||'').toLowerCase().includes(term)||(mv.country||'').toLowerCase().includes(term))
      results.push({type:'anime-movie',s:mv,si:mi});
  });
  getRealitiesSeriesData().forEach((s,si)=>{
    if(s.name.toLowerCase().includes(term)||(s.network||'').toLowerCase().includes(term)||(s.country||'').toLowerCase().includes(term))
      results.push({type:'reality',s,si});
  });
  getRealitiesMoviesData().forEach((mv,mi)=>{
    if(mv.name.toLowerCase().includes(term)||(mv.network||'').toLowerCase().includes(term)||(mv.country||'').toLowerCase().includes(term))
      results.push({type:'reality-movie',s:mv,si:mi});
  });
  if(!results.length){box.innerHTML='<div style="text-align:center;color:var(--muted);font-size:13px;padding:1rem">Sin resultados para "'+q+'"</div>';return;}
  box.innerHTML=results.slice(0,12).map(r=>{
    const icons={serie:'🎬',pelicula:'🎥',anime:'🌸','anime-movie':'🌸',reality:'🎤','reality-movie':'🎤'};
    const labels={serie:'Serie GL',pelicula:'Película GL',anime:'Anime GL','anime-movie':'Película Anime',reality:'Reality/Docuserie','reality-movie':'Documental'};
    const icon=icons[r.type]||'🎬';
    const label=labels[r.type]||r.type;
    const thumb=r.s.poster
      ?`<img class="search-result-thumb" src="${r.s.poster}" alt="" onerror="this.outerHTML='<div class=search-result-thumb-ph>${icon}</div>'">`
      :`<div class="search-result-thumb-ph">${icon}</div>`;
    let onclick='';
    if(r.type==='serie') onclick=`closeSearch();switchTab('list');setTimeout(()=>openSeries(${r.si}),50)`;
    else if(r.type==='pelicula') onclick=`closeSearch();switchTab('movies');setTimeout(()=>openMovie(${r.si}),50)`;
    else if(r.type==='anime') onclick=`closeSearch();switchTab('anime');setTimeout(()=>openAnimeDetail('series',${r.si}),50)`;
    else if(r.type==='anime-movie') onclick=`closeSearch();switchTab('anime');setTimeout(()=>{animeSubtab='movies';renderAnime();openAnimeDetail('movie',${r.si})},50)`;
    else if(r.type==='reality') onclick=`closeSearch();switchTab('realities');setTimeout(()=>openRealityDetail('series',${r.si}),50)`;
    else if(r.type==='reality-movie') onclick=`closeSearch();switchTab('realities');setTimeout(()=>{realitiesSubtab='movies';renderRealities();openRealityDetail('movie',${r.si})},50)`;
    return `<div class="search-result-row" onclick="${onclick}">
      ${thumb}
      <div>
        <div class="search-result-name">${r.s.name}</div>
        <div class="search-result-meta">${label}${r.s.country?' · '+countryFlag(r.s.country)+' '+r.s.country:''}${r.s.network?' · '+r.s.network:''}</div>
      </div>
    </div>`;
  }).join('');
}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    if(document.getElementById('searchOverlay').classList.contains('open')){closeSearch();return;}
    if(document.getElementById('modalBg').classList.contains('open')){closeModal();return;}
    if(document.getElementById('monthPickerBg').classList.contains('open')){closeMonthPicker();return;}
  }
});

(async()=>{ if(await loadData()){renderStats();renderCal();} })();
