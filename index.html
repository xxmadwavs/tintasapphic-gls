<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TINTA SAPPHIC ~ GL Series & Películas</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #faf5f8;
  --surface: #ffffff;
  --surface2: #fdf0f6;
  --surface3: #f8eaf3;
  --border: rgba(210,140,175,0.15);
  --border2: rgba(210,140,175,0.35);
  --text: #2d1f2b;
  --muted: #8a6878;
  --accent: #c94f7c;
  --accent2: #e07aa0;
  --accent-soft: #fce8f1;
  --teal: #4aada0;
  --teal-soft: #d0ede9;
  --lavender: #8b72be;
  --lavender-soft: #ede8f8;
  --gold: #b08030;
  --gold-soft: #fdf2d8;
  --radius: 16px;
  --radius-lg: 22px;
  --shadow-sm: 0 2px 12px rgba(180,80,120,0.08);
  --shadow-md: 0 6px 28px rgba(180,80,120,0.13);
  --shadow-lg: 0 16px 52px rgba(180,80,120,0.18);
  --font-display: 'Cormorant Garamond', Georgia, serif;
  --font-body: 'DM Sans', system-ui, sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;overflow-x:hidden;max-width:100%}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:14px;line-height:1.6;min-height:100vh;overflow-x:hidden;max-width:100vw}

/* Background atmosphere */
body::before{content:'';position:fixed;inset:0;background:
  radial-gradient(ellipse at 8% 10%,rgba(201,79,124,0.06) 0%,transparent 50%),
  radial-gradient(ellipse at 92% 90%,rgba(139,114,190,0.07) 0%,transparent 50%),
  radial-gradient(ellipse at 50% 50%,rgba(74,173,160,0.03) 0%,transparent 60%);
  pointer-events:none;z-index:0}

/* Floating petals */
.petal{position:fixed;pointer-events:none;z-index:0;opacity:.1;animation:floatPetal 14s ease-in-out infinite}
.petal:nth-child(1){top:6%;left:3%;font-size:18px;animation-delay:0s}
.petal:nth-child(2){top:22%;right:2.5%;font-size:12px;animation-delay:4s}
.petal:nth-child(3){top:58%;left:1.5%;font-size:10px;animation-delay:8s}
.petal:nth-child(4){top:78%;right:4%;font-size:16px;animation-delay:2s}
.petal:nth-child(5){top:42%;right:1.5%;font-size:13px;animation-delay:11s}
@keyframes floatPetal{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-14px) rotate(10deg)}}

/* ═══ TOPBAR ═══ */
.topbar{
  background:rgba(255,255,255,0.88);
  border-bottom:1px solid var(--border2);
  padding:0 2.5rem;
  display:flex;align-items:center;justify-content:space-between;
  height:64px;position:sticky;top:0;z-index:50;
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  box-shadow:0 1px 0 var(--border), 0 4px 24px rgba(180,80,120,0.06);
  overflow:hidden;width:100%;
}
.logo-wrap{display:flex;align-items:center;gap:10px}
.logo-icon{font-size:20px;opacity:.85}
.logo{font-family:var(--font-display);font-size:22px;font-weight:700;color:var(--text);letter-spacing:-.01em}
.logo em{color:var(--accent);font-style:italic;font-weight:600}
.logo-divider{width:1px;height:18px;background:var(--border2);margin:0 2px}
.logo-sub{font-size:11px;font-weight:500;color:var(--muted);letter-spacing:.04em}
@media(max-width:520px){.logo-divider,.logo-sub{display:none}.topbar{padding:0 1rem}.logo{font-size:18px}}

/* ═══ HERO ═══ */
.hero{
  position:relative;z-index:1;
  background:linear-gradient(135deg,rgba(201,79,124,0.07) 0%,rgba(139,114,190,0.06) 50%,rgba(74,173,160,0.04) 100%);
  border-bottom:1px solid var(--border);
  padding:2.5rem 2.5rem 2rem;
  overflow:hidden;width:100%;
}
/* hero::before removed */
.hero-inner{max-width:1020px;margin:0 auto;position:relative}
.hero-title{font-family:var(--font-display);font-size:clamp(2rem,5vw,3.2rem);font-weight:700;color:var(--text);line-height:1.1;letter-spacing:-.02em;margin-bottom:.4rem}
.hero-title em{color:var(--accent);font-style:italic}
.hero-desc{font-size:13.5px;color:var(--muted);max-width:560px;line-height:1.65;margin-bottom:1.5rem}
.hero-stats{display:flex;flex-wrap:wrap;gap:8px}
.hero-stat{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,0.75);border:1px solid var(--border2);border-radius:30px;padding:5px 14px;backdrop-filter:blur(8px)}
.hero-stat-num{font-family:var(--font-display);font-size:18px;font-weight:700;line-height:1;color:var(--accent)}
.hero-stat-num.teal{color:var(--teal)}
.hero-stat-num.lav{color:var(--lavender)}
.hero-stat-num.gold{color:var(--gold)}
.hero-stat-label{font-size:11px;font-weight:500;color:var(--muted)}
@media(max-width:600px){
  .hero{padding:1.5rem 1rem 1.25rem}
  .hero-title{font-size:1.75rem}
  .hero-stat{padding:4px 10px}
  .hero-stat-num{font-size:15px}
}

/* ═══ CONTAINER ═══ */
.container{max-width:1020px;margin:0 auto;padding:2rem 1.5rem;position:relative;z-index:1}
@media(max-width:600px){
  .container{padding:1.25rem 1rem 6rem}
  /* Forzar que nada se salga del viewport */
  .hero,.topbar,.container,#calInner,.cal-wrap,.cal-grid{max-width:100vw;overflow-x:hidden}
  .hero-stats{max-width:calc(100vw - 2rem)}
}

/* Legacy page-header (hidden now) */
.page-header{display:none}

/* ═══ BOTTOM NAV (móvil) ═══ */
.bottom-nav{display:none}
@media(max-width:600px){
  .tabs{display:none}
  .bottom-nav{
    display:flex;
    position:fixed;bottom:0;left:0;right:0;
    z-index:100;
    background:rgba(255,255,255,0.96);
    border-top:1px solid var(--border2);
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    box-shadow:0 -4px 24px rgba(180,80,120,0.10);
    padding:0 0 env(safe-area-inset-bottom,0);
  }
  .bnav-item{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:3px;padding:9px 4px 8px;cursor:pointer;
    border:none;background:transparent;font-family:var(--font-body);
    color:var(--muted);transition:color .15s;
    -webkit-tap-highlight-color:transparent;
  }
  .bnav-item.active{color:var(--accent)}
  .bnav-icon{font-size:19px;line-height:1;transition:transform .18s}
  .bnav-item.active .bnav-icon{transform:scale(1.15)}
  .bnav-label{font-size:9.5px;font-weight:600;letter-spacing:.02em;white-space:nowrap}
  .bnav-dot{
    width:4px;height:4px;border-radius:50%;background:var(--accent);
    position:absolute;bottom:6px;opacity:0;transition:opacity .15s;
  }
  .bnav-item{position:relative}
  .bnav-item.active .bnav-dot{opacity:1}
}

/* ═══ TABS ═══ */
.tabs{
  display:flex;gap:2px;margin-bottom:1.75rem;
  background:var(--surface);
  border-radius:var(--radius-lg);
  padding:4px;
  width:fit-content;max-width:100%;
  border:1.5px solid var(--border2);
  box-shadow:var(--shadow-sm);
}
.tab{
  padding:8px 20px;border-radius:14px;cursor:pointer;
  font-size:13px;font-weight:600;color:var(--muted);
  background:transparent;border:none;font-family:var(--font-body);
  transition:all .2s;white-space:nowrap;flex-shrink:0;
  display:flex;align-items:center;gap:5px;
}
.tab.active{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;
  box-shadow:0 3px 12px rgba(201,79,124,0.3);
}
.tab:hover:not(.active){color:var(--text);background:var(--surface2)}

/* ═══ CALENDAR ═══ */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:10px}
.month-display{font-family:var(--font-display);font-size:28px;font-weight:700;color:var(--text);letter-spacing:-.02em}
.month-display span{color:var(--accent);font-style:italic}
.nav-btns{display:flex;gap:6px}
.nav-btn{
  background:var(--surface);border:1.5px solid var(--border2);
  border-radius:20px;padding:7px 18px;cursor:pointer;
  font-size:13px;color:var(--text);font-family:var(--font-body);font-weight:600;
  transition:all .18s;box-shadow:var(--shadow-sm);
}
.nav-btn:hover{background:var(--accent-soft);border-color:var(--accent2);color:var(--accent);transform:translateY(-1px)}
@media(max-width:600px){
  .cal-nav{flex-direction:column;align-items:stretch;gap:8px}
  .month-display{font-size:22px;text-align:center}
  .nav-btns{display:grid;grid-template-columns:1fr auto 1fr;gap:6px}
  .nav-btn{font-size:12px;padding:8px 10px;border-radius:12px;text-align:center}
}

.cal-wrap{width:100%}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;width:100%}
.day-header{
  text-align:center;font-size:10px;color:var(--muted);
  padding:7px 0;font-weight:600;text-transform:uppercase;letter-spacing:.08em;
}
.day-cell{
  min-height:96px;border-radius:10px;
  border:1.5px solid var(--border);padding:6px;
  background:var(--surface);transition:all .18s;
}
.day-cell.has-eps{cursor:pointer;background:rgba(255,255,255,1)}
.day-cell.has-eps:hover{
  border-color:var(--accent2);
  box-shadow:0 6px 20px rgba(201,79,124,0.14);
  transform:translateY(-2px);
  background:var(--surface);
}
.day-cell.other-month{opacity:.22;background:transparent;border-color:transparent}
.day-cell.today{border-color:var(--accent);border-width:2px;background:rgba(252,232,241,0.4)}
.day-cell.today .day-num{color:var(--accent);font-weight:700}
.day-num{font-size:11.5px;color:var(--muted);margin-bottom:4px;font-weight:600}
.ep-pill{display:flex;align-items:center;gap:4px;border-radius:6px;padding:3px 5px;margin-bottom:3px;overflow:hidden;cursor:pointer;transition:opacity .15s}
.ep-pill:hover{opacity:.8}
.ep-pill.skipped{opacity:.4}
.ep-thumb{width:16px;height:23px;border-radius:3px;object-fit:cover;flex-shrink:0}
.ep-thumb-ph{width:16px;height:23px;border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px}
.ep-pill-text{font-size:9.5px;line-height:1.2;overflow:hidden;min-width:0}
.ep-pill-name{white-space:nowrap;text-overflow:ellipsis;overflow:hidden;font-weight:600}
.ep-pill-ep{opacity:.7;font-size:8.5px}
@media(max-width:600px){
  .cal-grid{gap:2px}
  .day-cell{min-height:58px;padding:3px;border-radius:6px}
  .day-num{font-size:10px;margin-bottom:2px}
  .ep-thumb,.ep-thumb-ph{display:none}
  .ep-pill{padding:2px 3px}
  .ep-pill-text{font-size:8px}
  .ep-pill-ep{display:none}
}

/* ═══ CARDS ═══ */
/* Series */
.series-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:16px}
.series-card{
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:var(--radius-lg);overflow:hidden;cursor:pointer;
  transition:all .22s;position:relative;display:flex;flex-direction:column;
  box-shadow:var(--shadow-sm);
}
.series-card:hover{
  border-color:var(--accent2);
  box-shadow:var(--shadow-lg);
  transform:translateY(-4px);
}
.series-card-poster-wrap{position:relative;overflow:hidden}
.series-card-poster{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;background:var(--accent-soft)}
.series-card-poster-ph{width:100%;aspect-ratio:2/3;background:linear-gradient(135deg,var(--accent-soft) 0%,var(--lavender-soft) 100%);display:flex;align-items:center;justify-content:center;font-size:40px;color:var(--accent)}
.series-card-poster-wrap::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:55%;
  background:linear-gradient(to top,rgba(30,15,25,0.65) 0%,transparent 100%);
  pointer-events:none;
}
.series-card-body{padding:12px 13px;flex:1;display:flex;flex-direction:column;gap:3px}
.series-card-name{font-size:13.5px;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:3px}
.series-card-meta{font-size:11px;color:var(--muted);line-height:1.5}
.series-card-next{font-size:11px;color:var(--accent);font-weight:600;margin-top:4px}
.series-card-done{font-size:11px;color:var(--teal);font-weight:600;margin-top:4px}
.series-card-today{
  font-size:11px;font-weight:700;margin-top:4px;
  display:inline-flex;align-items:center;gap:5px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;border-radius:20px;padding:3px 10px;
  animation:todayPulse 2.2s ease-in-out infinite;
}
@keyframes todayPulse{0%,100%{box-shadow:0 0 0 0 rgba(201,79,124,0.35)}60%{box-shadow:0 0 0 6px rgba(201,79,124,0)}}
.progress-wrap{height:5px;background:var(--border);border-radius:3px;margin-top:8px;overflow:hidden;position:relative}
.progress-fill{height:100%;border-radius:3px;transition:width .4s}
.progress-today-marker{
  position:absolute;top:-1px;bottom:-1px;width:2px;
  background:rgba(255,255,255,0.85);border-radius:2px;
  box-shadow:0 0 4px rgba(0,0,0,.2);pointer-events:none;
}
.day-cell.is-past{background:rgba(245,240,243,0.7)}
.day-cell.is-past .day-num{color:rgba(138,104,120,0.5)}
.day-cell.is-past .ep-pill{opacity:.55}
.day-cell.is-future{background:#fff}
.day-cell.today{border-color:var(--accent)!important;border-width:2px!important;background:rgba(252,232,241,0.5)!important}
.card-badges{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:4px}
.badge{font-size:9.5px;padding:2px 8px;border-radius:20px;font-weight:700;letter-spacing:.02em}
.badge-book{background:var(--gold-soft);color:var(--gold)}
.badge-upcoming{background:var(--lavender-soft);color:var(--lavender)}
.card-watch-pill{
  display:inline-flex;align-items:center;gap:3px;
  font-size:10px;font-weight:600;color:var(--teal);
  text-decoration:none;background:var(--teal-soft);
  border-radius:20px;padding:2px 9px;
  border:1px solid rgba(74,173,160,0.3);
  transition:all .15s;white-space:nowrap;
}
.card-watch-pill:hover{background:var(--teal);color:#fff;border-color:var(--teal);transform:translateY(-1px)}
@media(max-width:480px){
  .series-grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .series-card-body{padding:9px 10px}
  .series-card-name{font-size:12.5px}
}

/* Upcoming */
.upcoming-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:16px}
.upcoming-card{
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:var(--radius-lg);overflow:hidden;cursor:pointer;
  transition:all .22s;position:relative;display:flex;flex-direction:column;
  box-shadow:var(--shadow-sm);
}
.upcoming-card:hover{border-color:var(--lavender);box-shadow:0 12px 36px rgba(139,114,190,0.2);transform:translateY(-4px)}
.upcoming-poster-wrap{position:relative;overflow:hidden}
.upcoming-poster{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;background:var(--lavender-soft)}
.upcoming-poster-ph{width:100%;aspect-ratio:2/3;background:linear-gradient(135deg,var(--lavender-soft) 0%,var(--accent-soft) 100%);display:flex;align-items:center;justify-content:center;font-size:40px}
.upcoming-poster-wrap::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:55%;
  background:linear-gradient(to top,rgba(25,15,35,0.65) 0%,transparent 100%);
  pointer-events:none;
}
.upcoming-body{padding:12px 13px;flex:1;display:flex;flex-direction:column;gap:3px}
.upcoming-name{font-size:13.5px;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:2px}
.upcoming-meta{font-size:11px;color:var(--muted);line-height:1.5}
.upcoming-watch-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
@media(max-width:480px){
  .upcoming-grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .upcoming-body{padding:9px 10px}
  .upcoming-name{font-size:12.5px}
}

/* Movies */
.movies-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:16px}
.movie-card{
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:var(--radius-lg);overflow:hidden;cursor:pointer;
  transition:all .22s;position:relative;display:flex;flex-direction:column;
  box-shadow:var(--shadow-sm);
}
.movie-card:hover{border-color:var(--lavender);box-shadow:0 12px 36px rgba(139,114,190,0.2);transform:translateY(-4px)}
.movie-card-poster-wrap{position:relative;overflow:hidden}
.movie-card-poster{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;background:var(--lavender-soft)}
.movie-card-poster-ph{width:100%;aspect-ratio:2/3;background:linear-gradient(135deg,var(--lavender-soft) 0%,var(--accent-soft) 100%);display:flex;align-items:center;justify-content:center;font-size:40px;color:var(--lavender)}
.movie-card-poster-wrap::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:55%;
  background:linear-gradient(to top,rgba(25,15,35,0.65) 0%,transparent 100%);
  pointer-events:none;
}
.movie-card-body{padding:12px 13px;flex:1;display:flex;flex-direction:column}
.movie-card-name{font-size:13.5px;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:3px}
.movie-card-meta{font-size:11px;color:var(--muted);line-height:1.5}
.movie-card-date{font-size:11px;color:var(--lavender);font-weight:600;margin-top:4px}
.movie-card-watch{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
@media(max-width:480px){
  .movies-grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .movie-card-body{padding:9px 10px}
  .movie-card-name{font-size:12.5px}
}

/* Section headings */
.section-heading{font-family:var(--font-display);font-size:22px;font-weight:700;color:var(--text);margin-bottom:.2rem;letter-spacing:-.01em}
.section-desc{font-size:13px;color:var(--muted);margin-bottom:1rem;line-height:1.6}

/* Subtabs */
.subtabs{
  display:flex;gap:3px;margin-bottom:1.25rem;
  background:var(--surface);border-radius:var(--radius-lg);
  padding:4px;width:fit-content;max-width:100%;
  border:1.5px solid var(--border2);
  box-shadow:var(--shadow-sm);
  overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.subtabs::-webkit-scrollbar{display:none}
.subtab{
  padding:6px 16px;border-radius:12px;cursor:pointer;
  font-size:12.5px;font-weight:600;color:var(--muted);
  background:transparent;border:none;font-family:var(--font-body);
  transition:all .18s;display:flex;align-items:center;gap:5px;
  white-space:nowrap;flex-shrink:0;
}
.subtab.active{background:var(--accent-soft);color:var(--accent)}
.subtab:hover:not(.active){color:var(--text);background:var(--surface2)}
.subtab-count{font-size:10.5px;background:var(--border2);color:var(--muted);border-radius:20px;padding:1px 7px;font-weight:700}
.subtab.active .subtab-count{background:var(--accent);color:#fff}
@media(max-width:480px){.subtabs{width:100%}.subtab{font-size:12px;padding:5px 10px}}

/* Stats bar (kept as fallback hidden) */
.stats-bar{display:none}

/* Search */
.search-wrap{margin-bottom:1.25rem;position:relative}
.search-input{
  width:100%;padding:10px 16px 10px 42px;
  border-radius:var(--radius-lg);border:1.5px solid var(--border2);
  background:var(--surface);color:var(--text);
  font-size:14px;font-family:var(--font-body);outline:none;
  transition:border-color .15s, box-shadow .15s;
  box-shadow:var(--shadow-sm);
}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(201,79,124,0.1)}
.search-icon{position:absolute;left:15px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none}
.search-empty{text-align:center;color:var(--muted);padding:2.5rem;font-size:13px}

/* Books toolbar */
.books-toolbar{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:1.25rem;align-items:center}
.books-toolbar .search-wrap{margin-bottom:0;flex:1;min-width:180px}
.filter-group{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.filter-label{font-size:10.5px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
.filter-select{
  padding:7px 12px;border-radius:var(--radius-lg);
  border:1.5px solid var(--border2);background:var(--surface);color:var(--text);

<body>
<div class="petal">🌸</div><div class="petal">🌷</div><div class="petal">🌸</div><div class="petal">🌺</div><div class="petal">🌸</div>

    <p class="hero-desc">Calendario de series en emisión y películas GL — series asiáticas y occidentales donde las protagonistas son sáficas 💕</p>
    <div class="hero-stats" id="statsBar"></div>

    <button class="tab active" id="tabCal" onclick="switchTab('cal')">📅 Calendario</button>
    <button class="tab" id="tabList" onclick="switchTab('list')">🎬 Series</button>
    <button class="tab" id="tabMovies" onclick="switchTab('movies')">🎥 Películas</button>
    <button class="tab" id="tabUpcoming" onclick="switchTab('upcoming')">✨ Próximamente</button>

  </div>

  <div id="viewCal">

  <div class="modal" id="modalBox">

  </div>

<script>
const MONTHS=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DAYS=['L','M','X','J','V','S','D'];
const DAYS_L=['lunes','martes','miércoles','jueves','viernes','sábado','domingo'];
const PALETTE=['#d4608a','#5bbcb0','#9b82c9','#e8a84a','#e06fa0','#4eadb5','#b07ad4','#d47a4e'];
const PALETTE_SOFT=['rgba(212,96,138,0.13)','rgba(91,188,176,0.13)','rgba(155,130,201,0.13)','rgba(232,168,74,0.13)','rgba(224,111,160,0.13)','rgba(78,173,181,0.13)','rgba(176,122,212,0.13)','rgba(212,122,78,0.13)'];

let state={month:new Date().getMonth(),year:new Date().getFullYear(),tab:'cal',series:[],movies:[]};

function getDow(d){return(new Date(d+'T12:00:00').getDay()+6)%7}
function addDays(d,n){const x=new Date(d+'T12:00:00');x.setDate(x.getDate()+n);return x.toISOString().slice(0,10)}
function fmtDate(d){const x=new Date(d+'T12:00:00');return`${x.getDate()} ${MONTHS[x.getMonth()].slice(0,3)} ${x.getFullYear()}`}
function toStr(y,m,d){return`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`}
function getEmissionDays(s){if(s.emissionDays&&s.emissionDays.length>0)return[...s.emissionDays].sort((a,b)=>a-b);if(s.dayOfWeek!==undefined)return[s.dayOfWeek];return[0]}

function genEps(s){
  const days=getEmissionDays(s), skipDates=new Set(s.skipDates||[]), epOverrides=s.episodes||[];
  let firstDate=null;
  for(let o=0;o<14;o++){const c=addDays(s.startDate,o);if(days.includes(getDow(c))){firstDate=c;break;}}
  if(!firstDate) firstDate=s.startDate;
  const weekStart=addDays(firstDate,-getDow(firstDate));
  const slots=[], wn=Math.ceil((s.totalEpisodes+(skipDates.size||0))/days.length)+4;
  for(let w=0;w<wn&&slots.length<s.totalEpisodes+skipDates.size+10;w++){
    for(const d of days){const date=addDays(weekStart,d+w*7);if(date>=firstDate)slots.push(date);}
  }
  const valid=slots.filter(d=>!skipDates.has(d));
  const eps=[];
  for(let i=0;i<s.totalEpisodes;i++){
    const epNum=i+1, base=valid[i]||addDays(firstDate,i*7);
    const ov=epOverrides.find(e=>e.num===epNum);
    eps.push(ov?{...ov}:{num:epNum,date:base,skipped:false});
  }
  return eps;
}

async function loadData(){
  try{
    const r=await fetch('data.json?t='+Date.now());
    if(!r.ok) throw new Error('No se encontró data.json (código '+r.status+')');
    const d=await r.json();
    state.series=d.series||[];
    state.movies=d.movies||[];
    if(d.exportedAt){
      const dt=new Date(d.exportedAt);
      const badge=document.getElementById('updateBadge'); if(badge) badge.textContent='✓ Act. '+dt.toLocaleDateString('es-ES',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
    }
    return true;
  }catch(e){
    document.getElementById('calInner').innerHTML=`<div class="error-box"><strong>No se pudo cargar el calendario.</strong><br>Asegúrate de que <code>data.json</code> está en la misma carpeta.<br>Error: ${e.message}</div>`;
    return false;
  }
}

function renderStats(){
  const activeSeries=state.series.filter(s=>!s.upcoming);
  const now=new Date();
  const totalEps=activeSeries.reduce((a,s)=>a+s.totalEpisodes,0);
  const airedEps=activeSeries.reduce((a,s)=>{ const eps=genEps(s); return a+eps.filter(e=>new Date(e.date+'T12:00:00')<=now&&!e.skipped).length; },0);
  const upcoming=state.series.filter(s=>s.upcoming).length;
  const bookBased=state.series.filter(s=>s.basedOnBook).length;
  const movieCount=state.movies.length;
  const stats=[
    {num:activeSeries.length, label:'series activas', cls:''},
  ];
  if(movieCount) stats.push({num:movieCount, label:'películas', cls:'lav'});
  if(upcoming) stats.push({num:upcoming, label:'próximamente', cls:'lav'});
  if(bookBased) stats.push({num:bookBased, label:'basadas en libro', cls:'gold'});
  document.getElementById('statsBar').innerHTML=stats.map(s=>
    `<div class="hero-stat"><span class="hero-stat-num ${s.cls}">${s.num}</span><span class="hero-stat-label">${s.label}</span></div>`
  ).join('');
}

function getEpMap(y,m){
  const map={};
  state.series.filter(s=>!s.upcoming).forEach((s)=>{
    const si=state.series.indexOf(s);
    genEps(s).forEach(ep=>{
      if(ep.skipped) return;
      const d=new Date(ep.date+'T12:00:00');
      if(d.getFullYear()===y&&d.getMonth()===m){
        if(!map[ep.date]) map[ep.date]=[];
        map[ep.date].push({s,ep,si,type:'series'});
      }
    });
  });
  state.movies.forEach((mv,mi)=>{
    if(!mv.date) return;
    const d=new Date(mv.date+'T12:00:00');
    if(d.getFullYear()===y&&d.getMonth()===m){
      if(!map[mv.date]) map[mv.date]=[];
      map[mv.date].push({s:mv,ep:{num:null,date:mv.date,skipped:false},si:mi,type:'movie'});
    }
  });
  return map;
}

function renderCal(){
  const {month:m,year:y}=state;
  document.getElementById('monthDisplay').innerHTML=`<span>${MONTHS[m]}</span> ${y}`;
  const epMap=getEpMap(y,m);
  const first=new Date(y,m,1), startDow=(first.getDay()+6)%7;
  const dim=new Date(y,m+1,0).getDate(), prevDim=new Date(y,m,0).getDate();
  const tStr=toStr(new Date().getFullYear(),new Date().getMonth(),new Date().getDate());
  let html='<div class="cal-wrap"><div class="cal-grid">';
  DAYS.forEach(d=>{html+=`<div class="day-header">${d}</div>`;});
  for(let i=startDow-1;i>=0;i--)
    html+=`<div class="day-cell other-month"><div class="day-num">${prevDim-i}</div></div>`;
  for(let d=1;d<=dim;d++){
    const ds=toStr(y,m,d), eps=epMap[ds]||[], isToday=ds===tStr;
    const isPast=ds<tStr, isFuture=ds>tStr;
    html+=`<div class="day-cell${isToday?' today':''}${isPast?' is-past':''}${isFuture?' is-future':''}${eps.length?' has-eps':''}" ${eps.length?`onclick="openDay('${ds}')"`:''}><div class="day-num">${d}</div>`;
    eps.slice(0,3).forEach(({s,ep,si,type})=>{
      if(type==='movie'){
        const bg='rgba(155,130,201,0.15)';
        const thumb=s.poster?`<img class="ep-thumb" src="${s.poster}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`:'' ;
        const ph=`<div class="ep-thumb-ph" style="${s.poster?'display:none':''}background:${bg}">🎥</div>`;
        html+=`<div class="ep-pill movie-pill" style="background:${bg}">
          ${thumb}${ph}
          <div class="ep-pill-text" style="color:var(--lavender)">
            <div class="ep-pill-name">${s.name}</div>
            <div class="ep-pill-ep">🎥 Película</div>
          </div></div>`;
      } else {
        const col=PALETTE[si%PALETTE.length], bg=PALETTE_SOFT[si%PALETTE_SOFT.length];
        const thumb=s.poster?`<img class="ep-thumb" src="${s.poster}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`:'' ;
        const ph=`<div class="ep-thumb-ph" style="${s.poster?'display:none':''}background:${bg}">🎬</div>`;
        html+=`<div class="ep-pill${ep.skipped?' skipped':''}" style="background:${bg}">
          ${thumb}${ph}
          <div class="ep-pill-text" style="color:${col}">
            <div class="ep-pill-name">${s.name}</div>
            <div class="ep-pill-ep">Ep. ${ep.num}${ep.skipped?' · ✗':''}</div>
          </div></div>`;
      }
    });
    if(eps.length>3) html+=`<div style="font-size:10px;color:var(--muted);padding:2px 4px">+${eps.length-3} más</div>`;
    html+='</div>';
  }
  const rem=(7-(startDow+dim)%7)%7;
  for(let d=1;d<=rem;d++) html+=`<div class="day-cell other-month"><div class="day-num">${d}</div></div>`;
  html+='</div></div>';
  document.getElementById('calInner').innerHTML=html;
}

function seriesCardHtml(s, si){
  const now=new Date();
  const todayStr=toStr(now.getFullYear(),now.getMonth(),now.getDate());
  const eps=genEps(s);
  const aired=eps.filter(e=>new Date(e.date+'T12:00:00')<=now&&!e.skipped).length;
  const pct=Math.round(aired/s.totalEpisodes*100);
  const col=PALETTE[si%PALETTE.length];
  const next=eps.find(e=>new Date(e.date+'T12:00:00')>now&&!e.skipped);
  const todayEps=eps.filter(e=>e.date===todayStr&&!e.skipped);
  const days=getEmissionDays(s).map(d=>DAYS_L[d]).join(' y ');
  const posterEl=s.poster
    ?`<div class="series-card-poster-wrap"><img class="series-card-poster" src="${s.poster}" alt="${s.name}" onerror="this.outerHTML='<div class=series-card-poster-ph>🎬</div>'"></div>`
    :`<div class="series-card-poster-wrap"><div class="series-card-poster-ph">🎬</div></div>`;
  const links=s.watchLinks&&s.watchLinks.length?s.watchLinks:(s.networkUrl?[{name:s.network||'Ver serie',url:s.networkUrl}]:[]);
  const watchRow=links.length?`<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:4px">${links.map(l=>`<a class="card-watch-pill" href="${l.url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">▶ ${l.name}</a>`).join('')}</div>`:'';
  let nextLine='';
  if(todayEps.length){
    nextLine=`<div class="series-card-today">🌸 Hoy · Ep. ${todayEps.map(e=>e.num).join(' & ')}</div>`;
  } else if(next){
    nextLine=`<div class="series-card-next">▶ Ep. ${next.num} — ${fmtDate(next.date)}</div>`;
  } else {
    nextLine=`<div class="series-card-done">✓ Finalizada</div>`;
  }
  const progressBar=`<div class="progress-wrap">
    <div class="progress-fill" style="width:${pct}%;background:${col}"></div>
    ${pct>0&&pct<100?`<div class="progress-today-marker" style="left:${pct}%"></div>`:''}
  </div>`;
  return `<div class="series-card" onclick="openSeries(${si})">
    ${posterEl}
    <div class="series-card-body">
      <div class="card-badges">${s.basedOnBook?'<span class="badge badge-book">📖 Libro</span>':''}${s.country?`<span class="badge" style="background:var(--surface2);color:var(--muted)">${s.country}</span>`:''}</div>
      <div class="series-card-name">${s.name}</div>
      <div class="series-card-meta">${s.network?s.network+' · ':''}${days}</div>
      ${watchRow}
      ${nextLine}
      ${progressBar}
      <div style="font-size:10px;color:var(--muted);margin-top:3px">${aired}/${s.totalEpisodes} emitidos</div>
      ${s.basedOnBook&&s.bookCoverUrl?`<div style="margin-top:8px;display:flex;align-items:center;gap:6px"><img src="${s.bookCoverUrl}" style="width:28px;height:40px;border-radius:4px;object-fit:cover;box-shadow:0 1px 4px rgba(0,0,0,.1)" onerror="this.style.display='none'">${s.bookUrl?`<a href="${s.bookUrl}" target="_blank" rel="noopener" style="font-size:10px;color:#b08a00;font-weight:600;text-decoration:none" onclick="event.stopPropagation()">📖 Ver libro</a>`:''}${!s.bookUrl&&s.bookSource?`<span style="font-size:10px;color:#b08a00;font-weight:600">${s.bookSource}</span>`:''}</div>`:''}
    </div>
  </div>`;
}

let seriesSubtab='airing';
let seriesFilters={q:'',country:'',sort:'az',book:'all'};

function switchSeriesSubtab(sub){ seriesSubtab=sub; renderList(); }

function getCountries(arr){ return [...new Set(arr.map(s=>s.country).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'es')); }

function applySeriesFilters(arr){
  let r=[...arr];
  const q=seriesFilters.q.toLowerCase().trim();
  if(q) r=r.filter(s=>s.name.toLowerCase().includes(q)||(s.country||'').toLowerCase().includes(q)||(s.network||'').toLowerCase().includes(q));
  if(seriesFilters.country) r=r.filter(s=>s.country===seriesFilters.country);
  if(seriesFilters.book==='yes') r=r.filter(s=>s.basedOnBook);
  if(seriesFilters.book==='no') r=r.filter(s=>!s.basedOnBook);
  if(seriesFilters.sort==='az') r.sort((a,b)=>a.name.localeCompare(b.name,'es'));
  else if(seriesFilters.sort==='za') r.sort((a,b)=>b.name.localeCompare(a.name,'es'));
  else if(seriesFilters.sort==='eps') r.sort((a,b)=>b.totalEpisodes-a.totalEpisodes);
  return r;
}

function renderList(){
  const view=document.getElementById('viewList');
  const active=state.series.filter(s=>!s.upcoming);
  const allCountries=getCountries(active);
  const filtered=applySeriesFilters(active);
  const now=new Date();
  const airing=filtered.filter(s=>{ const eps=genEps(s); return eps.some(e=>new Date(e.date+'T12:00:00')>now&&!e.skipped); });
  const finished=filtered.filter(s=>{ const eps=genEps(s); return !eps.some(e=>new Date(e.date+'T12:00:00')>now&&!e.skipped); });

  if(seriesFilters.q&&seriesSubtab==='airing'&&!airing.length&&finished.length) seriesSubtab='finished';
  if(seriesFilters.q&&seriesSubtab==='finished'&&!finished.length&&airing.length) seriesSubtab='airing';

  const countriesOpts=allCountries.map(c=>`<option value="${c}"${seriesFilters.country===c?' selected':''}>${c}</option>`).join('');

  let html=`<div class="books-toolbar">
    <div class="search-wrap" style="position:relative;margin-bottom:0">
      <span class="search-icon">🔍</span>
      <input class="search-input" placeholder="Buscar serie, país, plataforma…" value="${seriesFilters.q}" oninput="seriesFilters.q=this.value;renderList()">
    </div>
    <div class="filter-group">
      <span class="filter-label">País</span>
      <select class="filter-select" onchange="seriesFilters.country=this.value;renderList()">
        <option value=""${!seriesFilters.country?' selected':''}>Todos</option>${countriesOpts}
      </select>
    </div>
    <div class="filter-group">
      <span class="filter-label">Libro</span>
      <select class="filter-select" onchange="seriesFilters.book=this.value;renderList()">
        <option value="all"${seriesFilters.book==='all'?' selected':''}>Todos</option>
        <option value="yes"${seriesFilters.book==='yes'?' selected':''}>📖 Solo con libro</option>
        <option value="no"${seriesFilters.book==='no'?' selected':''}>Sin libro</option>
      </select>
    </div>
    <div class="filter-group">
      <span class="filter-label">Orden</span>
      <select class="filter-select" onchange="seriesFilters.sort=this.value;renderList()">
        <option value="az"${seriesFilters.sort==='az'?' selected':''}>A → Z</option>
        <option value="za"${seriesFilters.sort==='za'?' selected':''}>Z → A</option>
        <option value="eps"${seriesFilters.sort==='eps'?' selected':''}>Más episodios</option>
      </select>
    </div>
  </div>`;

  if(!filtered.length){
    html+='<div class="search-empty">No se encontró ninguna serie con esos filtros.</div>';
    view.innerHTML=html; return;
  }

  html+=`<div class="subtabs">
    <button class="subtab${seriesSubtab==='airing'?' active':''}" onclick="switchSeriesSubtab('airing')">
      🌸 En emisión<span class="subtab-count">${airing.length}</span>
    </button>
    <button class="subtab${seriesSubtab==='finished'?' active':''}" onclick="switchSeriesSubtab('finished')">
      ✓ Finalizadas<span class="subtab-count">${finished.length}</span>
    </button>
  </div>`;

  if(seriesSubtab==='airing'){
    if(airing.length){
      html+=`<div class="books-count">Mostrando <strong>${airing.length}</strong> serie${airing.length!==1?'s':''}</div><div class="series-grid">`;
      airing.forEach(s=>{ html+=seriesCardHtml(s, state.series.indexOf(s)); });
      html+='</div>';
    } else {
      html+='<div class="search-empty">No hay series en emisión con esos filtros.</div>';
    }
  } else {
    if(finished.length){
      html+=`<div class="books-count">Mostrando <strong>${finished.length}</strong> serie${finished.length!==1?'s':''}</div><div class="series-grid">`;
      finished.forEach(s=>{ html+=seriesCardHtml(s, state.series.indexOf(s)); });
      html+='</div>';
    } else {
      html+='<div class="search-empty">No hay series finalizadas con esos filtros.</div>';
    }
  }
  view.innerHTML=html;
}

function openDay(dateStr){
  const items=(getEpMap(state.year,state.month)[dateStr]||[]);
  if(!items.length) return;
  const now=new Date();
  let html=`<div class="modal-body"><div class="day-modal-date">${fmtDate(dateStr)}</div>
  <div class="day-modal-sub">${items.length} serie${items.length>1?'s':''} este día</div>`;
  items.forEach(({s,ep,si,type})=>{
    if(type==='movie'){
      const isPast=new Date(ep.date+'T12:00:00')<=now;
      const st=isPast?'aired':'pending', lb=isPast?'Estrenada':'Pendiente';
      const thumb=s.poster?`<img class="day-ep-thumb" src="${s.poster}" alt="" onerror="this.outerHTML='<div class=day-ep-thumb-ph>🎥</div>'">`:`<div class="day-ep-thumb-ph">🎥</div>`;

        <div class="day-ep-info"><div class="day-ep-name" style="color:var(--lavender)">${s.name}</div>
        <div class="day-ep-meta">🎥 Película${s.network?' · '+s.network:''}</div></div>

    } else {
      const col=PALETTE[si%PALETTE.length], isPast=new Date(ep.date+'T12:00:00')<=now;
      const st=ep.skipped?'skipped':isPast?'aired':'pending', lb=ep.skipped?'No emitido':isPast?'Emitido':'Pendiente';
      const thumb=s.poster?`<img class="day-ep-thumb" src="${s.poster}" alt="" onerror="this.outerHTML='<div class=day-ep-thumb-ph>🎬</div>'">`:`<div class="day-ep-thumb-ph">🎬</div>`;
      html+=`<div class="day-ep-row" onclick="openSeries(${si})">${thumb}

      ${hasTitle?`<div class="book-title-text">📖 ${s.bookSource}</div>`:'<div class="book-title-text">📖 Basada en libro</div>'}
      ${editions.length?`<div class="book-editions-row">${edPills}</div>`:''}
    </div></div>`;
  })():''}
  <div style="display:flex;justify-content:flex-end;margin-top:1rem"><button class="btn" onclick="closeModal()">Cerrar</button></div></div>`;
  document.getElementById('modalBox').innerHTML=html;
  document.getElementById('modalBg').classList.add('open');
}

function openMovie(mi){
  const mv=state.movies[mi], now=new Date();
  const isPast=mv.date&&new Date(mv.date+'T12:00:00')<=now;
  const posterEl=mv.poster?`<img class="modal-poster-full" src="${mv.poster}" alt="${mv.name}" onerror="this.outerHTML='<div class=modal-poster-full-ph>🎥</div>'">`:`<div class="modal-poster-full-ph">🎥</div>`;
  let metaGrid='';
  if(mv.year) metaGrid+=`<div class="meta-item"><div class="meta-key">Año</div><div class="meta-val">${mv.year}</div></div>`;
  if(mv.country) metaGrid+=`<div class="meta-item"><div class="meta-key">País</div><div class="meta-val">${mv.country}</div></div>`;
  if(mv.network) metaGrid+=`<div class="meta-item"><div class="meta-key">Plataforma</div><div class="meta-val">${mv.network}</div></div>`;
  if(mv.date) metaGrid+=`<div class="meta-item"><div class="meta-key">Estreno</div><div class="meta-val">${fmtDate(mv.date)}</div></div>`;
  const bookBlock=(()=>{
    if(!mv.basedOnBook) return '';
    const hasCover=mv.bookCoverUrl&&mv.bookCoverUrl.trim();
    const hasTitle=mv.bookSource&&mv.bookSource.trim();
    const editions=mv.bookLinks&&mv.bookLinks.length?mv.bookLinks:(mv.bookUrl?[{lang:'es',store:'Amazon',url:mv.bookUrl}]:[]);
    if(!hasCover&&!hasTitle&&!editions.length) return '';
    const coverEl=hasCover?`<img class="book-cover" src="${mv.bookCoverUrl}" alt="Portada del libro" onerror="this.outerHTML='<div class=book-cover-ph>📖</div>'">`:`<div class="book-cover-ph">📖</div>`;
    const edPills=editions.map(e=>`<a class="book-edition-pill" href="${e.url}" target="_blank" rel="noopener"><span class="book-edition-flag">${langFlag(e.lang)}</span><span class="book-edition-store">${e.store}</span></a>`).join('');
    return `<div class="book-block">${coverEl}<div class="book-info">
      ${hasTitle?`<div class="book-title-text">📖 ${mv.bookSource}</div>`:'<div class="book-title-text">📖 Basada en libro</div>'}
      ${editions.length?`<div class="book-editions-row">${edPills}</div>`:''}
    </div></div>`;
  })();
  let html=`${posterEl}<div class="modal-body">
  <div class="modal-badges"><span class="badge" style="background:var(--lavender-soft);color:var(--lavender)">🎥 Película</span>${mv.basedOnBook?'<span class="badge badge-book">📖 Libro</span>':''}${isPast?'<span class="badge" style="background:var(--teal-soft);color:var(--teal)">✓ Estrenada</span>':'<span class="badge" style="background:var(--accent-soft);color:var(--accent)">⏳ Próximamente</span>'}</div>
  <div class="modal-title">${mv.name}</div>
  ${(()=>{const links=mv.watchLinks&&mv.watchLinks.length?mv.watchLinks:(mv.networkUrl?[{name:mv.network||'Ver película',url:mv.networkUrl}]:[]);if(!links.length)return '';return `<div class="watch-links-label">▶ Dónde ver</div><div class="watch-links">${links.map(l=>`<a class="watch-link" href="${l.url}" target="_blank" rel="noopener" style="--wl-col:var(--lavender);background:var(--lavender-soft);color:var(--lavender);border-color:rgba(155,130,201,.35)"><span class="watch-link-icon">▶</span>${l.name}</a>`).join('')}</div>`;})()}
  ${mv.trailerUrl?trailerHtml(mv.trailerUrl):''}
  ${metaGrid?`<div class="modal-meta-grid">${metaGrid}</div>`:''}
  ${mv.synopsis?`<div class="synopsis">${mv.synopsis}</div>`:''}
  ${bookBlock}
  <div style="display:flex;justify-content:flex-end;margin-top:1rem"><button class="btn" onclick="closeModal()">Cerrar</button></div></div>`;
  document.getElementById('modalBox').innerHTML=html;
  document.getElementById('modalBg').classList.add('open');
}

let moviesFilters={q:'',country:'',sort:'date',book:'all'};

function applyMoviesFilters(arr){
  let r=[...arr];
  const q=moviesFilters.q.toLowerCase().trim();
  if(q) r=r.filter(mv=>mv.name.toLowerCase().includes(q)||(mv.country||'').toLowerCase().includes(q)||(mv.network||'').toLowerCase().includes(q));
  if(moviesFilters.country) r=r.filter(mv=>mv.country===moviesFilters.country);
  if(moviesFilters.book==='yes') r=r.filter(mv=>mv.basedOnBook);
  if(moviesFilters.book==='no') r=r.filter(mv=>!mv.basedOnBook);
  if(moviesFilters.sort==='az') r.sort((a,b)=>a.name.localeCompare(b.name,'es'));
  else if(moviesFilters.sort==='za') r.sort((a,b)=>b.name.localeCompare(a.name,'es'));
  else if(moviesFilters.sort==='date') r.sort((a,b)=>{if(!a.date&&!b.date)return 0;if(!a.date)return 1;if(!b.date)return-1;return a.date.localeCompare(b.date);});
  return r;
}

let moviesSubtab='all';
function switchMoviesSubtab(sub){ moviesSubtab=sub; renderMovies(); }

function movieCardHtml(mv){
  const mi=state.movies.indexOf(mv);
  const now=new Date();
  const isPast=mv.date&&new Date(mv.date+'T12:00:00')<=now;
  const posterEl=mv.poster
    ?`<div class="movie-card-poster-wrap"><img class="movie-card-poster" src="${mv.poster}" alt="${mv.name}" onerror="this.outerHTML='<div class=movie-card-poster-ph>🎥</div>'"></div>`
    :`<div class="movie-card-poster-wrap"><div class="movie-card-poster-ph">🎥</div></div>`;
  const links=mv.watchLinks&&mv.watchLinks.length?mv.watchLinks:(mv.networkUrl?[{name:mv.network||'Ver',url:mv.networkUrl}]:[]);
  const watchRow=links.length?`<div class="movie-card-watch">${links.map(l=>`<a class="card-watch-pill" style="background:var(--lavender-soft);color:var(--lavender);border-color:rgba(155,130,201,.3)" href="${l.url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">▶ ${l.name}</a>`).join('')}</div>`:'';
  const dateEl=mv.date
    ?(isPast?`<div class="movie-card-date" style="color:var(--teal)">✓ ${fmtDate(mv.date)}</div>`
            :`<div class="movie-card-date">📅 ${fmtDate(mv.date)}</div>`)
    :'<div class="movie-card-date" style="color:var(--muted)">Fecha por confirmar</div>';
  return `<div class="movie-card" onclick="openMovie(${mi})">${posterEl}
    <div class="movie-card-body">
      <div class="card-badges">${mv.basedOnBook?'<span class="badge badge-book">📖 Libro</span>':''}${mv.country?`<span class="badge" style="background:var(--surface2);color:var(--muted)">${mv.country}</span>`:''}</div>
      <div class="movie-card-name">${mv.name}</div>
      <div class="movie-card-meta">${mv.network||''}</div>
      ${dateEl}
      ${watchRow}
    </div></div>`;
}

function renderMovies(){
  const view=document.getElementById('viewMovies');
  if(!state.movies.length){view.innerHTML='<div class="empty">🎥 No hay películas todavía.</div>';return;}
  const now=new Date();
  const allCountries=getCountries(state.movies);
  const countriesOpts=allCountries.map(c=>`<option value="${c}"${moviesFilters.country===c?' selected':''}>${c}</option>`).join('');
  const filtered=applyMoviesFilters(state.movies);
  const inTheaters=filtered.filter(mv=>mv.date&&new Date(mv.date+'T12:00:00')<=now);
  const comingSoon=filtered.filter(mv=>!mv.date||new Date(mv.date+'T12:00:00')>now);

  // clamp subtab if empty
  if(moviesSubtab==='theaters'&&!inTheaters.length) moviesSubtab='all';
  if(moviesSubtab==='soon'&&!comingSoon.length) moviesSubtab='all';

  const shown = moviesSubtab==='theaters'?inTheaters : moviesSubtab==='soon'?comingSoon : filtered;

  let html=`<div class="books-toolbar">
    <div class="search-wrap" style="position:relative;margin-bottom:0">
      <span class="search-icon">🔍</span>
      <input class="search-input" placeholder="Buscar película, país, plataforma…" value="${moviesFilters.q}" oninput="moviesFilters.q=this.value;renderMovies()">
    </div>
    <div class="filter-group">
      <span class="filter-label">País</span>
      <select class="filter-select" onchange="moviesFilters.country=this.value;renderMovies()">
        <option value=""${!moviesFilters.country?' selected':''}>Todos</option>${countriesOpts}
      </select>
    </div>
    <div class="filter-group">
      <span class="filter-label">Libro</span>
      <select class="filter-select" onchange="moviesFilters.book=this.value;renderMovies()">
        <option value="all"${moviesFilters.book==='all'?' selected':''}>Todos</option>
        <option value="yes"${moviesFilters.book==='yes'?' selected':''}>📖 Solo con libro</option>
        <option value="no"${moviesFilters.book==='no'?' selected':''}>Sin libro</option>
      </select>
    </div>
    <div class="filter-group">
      <span class="filter-label">Orden</span>
      <select class="filter-select" onchange="moviesFilters.sort=this.value;renderMovies()">
        <option value="date"${moviesFilters.sort==='date'?' selected':''}>Por fecha</option>
        <option value="az"${moviesFilters.sort==='az'?' selected':''}>A → Z</option>
        <option value="za"${moviesFilters.sort==='za'?' selected':''}>Z → A</option>
      </select>
    </div>
  </div>`;

  if(!filtered.length){
    html+='<div class="search-empty">No se encontró ninguna película con esos filtros.</div>';
    view.innerHTML=html; return;
  }

  html+=`<div class="subtabs" style="margin-bottom:1.25rem">
    <button class="subtab${moviesSubtab==='all'?' active':''}" onclick="switchMoviesSubtab('all')">
      🎥 Todas<span class="subtab-count">${filtered.length}</span>
    </button>
    <button class="subtab${moviesSubtab==='theaters'?' active':''}" onclick="switchMoviesSubtab('theaters')">
      ✓ Ya estrenadas<span class="subtab-count">${inTheaters.length}</span>
    </button>
    <button class="subtab${moviesSubtab==='soon'?' active':''}" onclick="switchMoviesSubtab('soon')">
      📅 Próximos estrenos<span class="subtab-count">${comingSoon.length}</span>
    </button>
  </div>`;

  if(!shown.length){
    html+='<div class="search-empty">No hay películas en esta categoría con esos filtros.</div>';
    view.innerHTML=html; return;
  }

  html+=`<div class="books-count">Mostrando <strong>${shown.length}</strong> película${shown.length!==1?'s':''}</div>
  <div class="movies-grid">`;
  shown.forEach(mv=>{ html+=movieCardHtml(mv); });
  html+='</div>';
  view.innerHTML=html;
}

function closeModal(){ document.getElementById('modalBg').classList.remove('open'); }

function getYoutubeId(url){
  if(!url) return null;
  const m=url.match(/(?:v=|youtu\.be\/|embed\/)([\w-]{11})/);
  return m?m[1]:null;
}
function trailerHtml(url){
  const id=getYoutubeId(url);
  if(!id) return '';
  return `<div class="trailer-wrap"><iframe src="https://www.youtube.com/embed/${id}" allowfullscreen loading="lazy"></iframe></div>`;
}

const LANG_META={es:{flag:'🇪🇸',label:'Español'},en:{flag:'🇬🇧',label:'English'},pt:{flag:'🇧🇷',label:'Português'},th:{flag:'🇹🇭',label:'ภาษาไทย'},ko:{flag:'🇰🇷',label:'한국어'},ja:{flag:'🇯🇵',label:'日本語'},zh:{flag:'🇨🇳',label:'中文'},fr:{flag:'🇫🇷',label:'Français'},de:{flag:'🇩🇪',label:'Deutsch'},it:{flag:'🇮🇹',label:'Italiano'},other:{flag:'🌐',label:'Otro'}};
function langFlag(val){return (LANG_META[val]||{flag:'🌐'}).flag;}
function langLabel(val){return (LANG_META[val]||{label:val}).label;}

let booksState={q:'',sort:'az',type:'all',letter:''};

function getAllBooks(){
  const books=[];
  state.series.forEach((s,i)=>{
    if(s.basedOnBook){
      const editions=s.bookLinks&&s.bookLinks.length?s.bookLinks:(s.bookUrl?[{lang:'es',store:'Amazon',url:s.bookUrl}]:[]);
      books.push({title:s.bookSource||'Sin título',cover:s.bookCoverUrl||'',editions,seriesName:s.name,type:'serie',order:i});
    }
  });
  (state.movies||[]).forEach((mv,i)=>{
    if(mv.basedOnBook){
      const editions=mv.bookLinks&&mv.bookLinks.length?mv.bookLinks:(mv.bookUrl?[{lang:'es',store:'Amazon',url:mv.bookUrl}]:[]);
      books.push({title:mv.bookSource||'Sin título',cover:mv.bookCoverUrl||'',editions,seriesName:mv.name,type:'película',order:1000+i});
    }
  });
  return books;
}

function renderBooks(){
  const view=document.getElementById('viewBooks');
  const allBooks=getAllBooks();
  if(!allBooks.length){
    view.innerHTML='<div class="empty">📚 Todavía no hay libros. Marca series como "basada en libro" en el admin para que aparezcan aquí.</div>';
    return;
  }

  const usedLetters=new Set(allBooks.map(b=>b.title[0]?.toUpperCase()).filter(Boolean));
  const ALPHABET='ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');

  let books=[...allBooks];
  const q=booksState.q.toLowerCase().trim();
  if(q) books=books.filter(b=>b.title.toLowerCase().includes(q)||b.seriesName.toLowerCase().includes(q));
  if(booksState.type!=='all') books=books.filter(b=>b.type===booksState.type);
  if(booksState.letter) books=books.filter(b=>b.title[0]?.toUpperCase()===booksState.letter);

  if(booksState.sort==='az') books.sort((a,b)=>a.title.localeCompare(b.title,'es'));
  else if(booksState.sort==='za') books.sort((a,b)=>b.title.localeCompare(a.title,'es'));
  else if(booksState.sort==='serie') books.sort((a,b)=>a.seriesName.localeCompare(b.seriesName,'es'));
  else if(booksState.sort==='pub') books.sort((a,b)=>a.order-b.order);

  let html=`<div class="section-heading" style="margin-bottom:.25rem">📚 Fuentes literarias</div>
  <p class="section-desc" style="margin-bottom:.85rem">Libros, novelas y manhwas en los que se basan las series y películas de la lista.</p>

  <div class="books-toolbar">
    <div class="search-wrap" style="position:relative">
      <span class="search-icon">🔍</span>
      <input class="search-input" placeholder="Buscar libro o serie…" value="${booksState.q}" oninput="booksState.q=this.value;renderBooks()">
    </div>
    <div class="filter-group">
      <span class="filter-label">Tipo</span>
      <select class="filter-select" onchange="booksState.type=this.value;renderBooks()">
        <option value="all"${booksState.type==='all'?' selected':''}>Todos</option>
        <option value="serie"${booksState.type==='serie'?' selected':''}>Series</option>
        <option value="película"${booksState.type==='película'?' selected':''}>Películas</option>
      </select>
    </div>
    <div class="filter-group">
      <span class="filter-label">Orden</span>
      <select class="filter-select" onchange="booksState.sort=this.value;renderBooks()">
        <option value="az"${booksState.sort==='az'?' selected':''}>A → Z</option>
        <option value="za"${booksState.sort==='za'?' selected':''}>Z → A</option>
        <option value="serie"${booksState.sort==='serie'?' selected':''}>Por serie</option>
        <option value="pub"${booksState.sort==='pub'?' selected':''}>Orden de la lista</option>
      </select>
    </div>
  </div>

  <div class="alpha-bar">
    <button class="alpha-btn${!booksState.letter?' alpha-active':''}" onclick="booksState.letter='';renderBooks()" title="Todos">Todas</button>
    ${ALPHABET.map(l=>{
      const has=usedLetters.has(l);
      return `<button class="alpha-btn${booksState.letter===l?' alpha-active':''}${!has?' alpha-disabled':''}" onclick="${has?`booksState.letter=booksState.letter==='${l}'?'':'${l}';renderBooks()`:''}" title="${l}">${l}</button>`;
    }).join('')}
  </div>`;

  if(!books.length){
    html+='<div class="search-empty">No se encontró ningún libro con esos criterios.</div>';
    view.innerHTML=html; return;
  }

  html+=`<div class="books-count">Mostrando <strong>${books.length}</strong> de <strong>${allBooks.length}</strong> libro${allBooks.length!==1?'s':''}</div>`;
  html+='<div class="books-grid">';
  books.forEach(b=>{
    const coverEl=b.cover?`<img class="book-card-cover" src="${b.cover}" alt="${b.title}" onerror="this.outerHTML='<div class=book-card-cover-ph>📖</div>'">`:`<div class="book-card-cover-ph">📖</div>`;
    const editionPills=b.editions.map(e=>`<a class="book-edition-pill" href="${e.url}" target="_blank" rel="noopener"><span class="book-edition-flag">${langFlag(e.lang)}</span><span class="book-edition-store">${e.store}</span></a>`).join('');
    html+=`<div class="book-card">
      ${coverEl}
      <div class="book-card-body">
        <div class="book-card-title">${b.title}</div>
        <div class="book-card-series">Adaptada en <strong>${b.seriesName}</strong> <span class="book-type-tag">${b.type}</span></div>
        ${b.editions.length?`<div class="book-editions-row">${editionPills}</div>`:''}
      </div>
    </div>`;
  });
  html+='</div>';
  view.innerHTML=html;
}
function switchTab(tab){
  state.tab=tab;
  ['cal','list','movies','upcoming','books'].forEach(t=>{
    const btn=document.getElementById('tab'+t.charAt(0).toUpperCase()+t.slice(1));
    const view=document.getElementById('view'+t.charAt(0).toUpperCase()+t.slice(1));
    if(btn) btn.className='tab'+(tab===t?' active':'');
    if(view) view.style.display=tab===t?'':'none';
  });
  // Sync bottom nav
  document.querySelectorAll('.bnav-item').forEach(el=>{
    el.classList.toggle('active', el.dataset.tab===tab);
  });
  if(tab==='list') renderList();
  if(tab==='movies') renderMovies();
  if(tab==='upcoming') renderUpcoming();
  if(tab==='books') renderBooks();
}

document.getElementById('prevBtn').onclick=()=>{state.month--;if(state.month<0){state.month=11;state.year--;}renderCal();};
document.getElementById('nextBtn').onclick=()=>{state.month++;if(state.month>11){state.month=0;state.year++;}renderCal();};
document.getElementById('todayBtn').onclick=()=>{state.month=new Date().getMonth();state.year=new Date().getFullYear();renderCal();};
