    });
    seriesHtml+='</div>';
  }
  let moviesHtml='';
  if(inMovies.length){
    moviesHtml='<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:14px 0 8px">PelГ­culas</div>';
    moviesHtml+='<div style="display:flex;flex-direction:column;gap:8px">';
    inMovies.forEach(mv=>{
      const mi=state.movies.indexOf(mv);
      const member=mv.cast.find(m=>m.actressId===actressId);
      const char=member&&member.character?`<span style="font-size:11px;color:var(--muted)"> В· ${member.character}</span>`:'';
      const thumb=mv.poster?`<img src="${mv.poster}" style="width:36px;height:54px;border-radius:6px;object-fit:cover;flex-shrink:0" onerror="this.style.display='none'">`:'';
      moviesHtml+=`<div style="display:flex;gap:10px;align-items:center;padding:8px 10px;border-radius:10px;background:var(--surface2);cursor:pointer" onclick="closeActressModal();openMovie(${mi})">${thumb}<div><div style="font-size:13px;font-weight:700;color:var(--text)">${mv.name}${char}</div>${mv.year?`<div style="font-size:11px;color:var(--muted)">${mv.year}${mv.country?' В· '+mv.country:''}</div>`:''}</div></div>`;
    });
    moviesHtml+='</div>';
  }

  // Calculate age from birthdate
  let ageStr='', birthYearStr='';
  if(a.birthdate){
    const bd=new Date(a.birthdate+'T00:00:00');

    let age=now2.getFullYear()-bd.getFullYear();
    const m=now2.getMonth()-bd.getMonth();
    if(m<0||(m===0&&now2.getDate()<bd.getDate())) age--;
    const day=bd.getDate();
    const monthNames=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
    ageStr=`${age} aГ±os`;
    birthYearStr=`${day} de ${monthNames[bd.getMonth()]} de ${bd.getFullYear()}`;

  // Build meta grid (same style as series/movies)

  </div>
  ${metaGrid?`<div style="padding:0 1.25rem 1rem"><div class="modal-meta-grid">${metaGrid}</div></div>`:''}
  ${seriesHtml||moviesHtml?`<div style="padding:0 1.25rem 1.5rem">${seriesHtml}${moviesHtml}</div>`:'<div style="padding:0 1.25rem 1.5rem;color:var(--muted);font-size:13px">Sin series ni pelГ­culas registradas.</div>'}
  <div style="padding:0 1.25rem 1.25rem;display:flex;justify-content:flex-end"><button class="btn" onclick="closeActressModal()">Cerrar</button></div>`;

  document.getElementById('actressModalBox').innerHTML=html;
  document.getElementById('actressModalBg').classList.add('open');
}

function openSeries(si){
  const s=state.series[si], allEps=genEps(s), now=new Date();
  const seasons=getSeasons(s);
  const totalEps=seasons.reduce((a,t)=>a+t.totalEpisodes,0);
  const col=PALETTE[si%PALETTE.length];
  const aired=allEps.filter(e=>new Date(e.date+'T12:00:00')<=now&&!e.skipped).length;
  const pct=Math.round(aired/Math.max(totalEps,1)*100);
  const activeSeason=seasons[seasons.length-1];
  const activeDays=((activeSeason?.emissionDays&&activeSeason.emissionDays.length)?activeSeason.emissionDays:[activeSeason?.dayOfWeek||0]).map(d=>DAYS_L[d]).join(' y ');
  const next=allEps.find(e=>new Date(e.date+'T12:00:00')>now&&!e.skipped);
  const todayStr=toStr(now.getFullYear(),now.getMonth(),now.getDate());
  const todayEps=allEps.filter(e=>e.date===todayStr&&!e.skipped);
  const isFinished=!next;
  const datesWithEps=allEps.filter(e=>!e.skipped).map(e=>e.date).sort();
  const firstEpDate=datesWithEps[0]||(seasons[0]&&seasons[0].startDate)||s.startDate;
  const lastEpDate=datesWithEps[datesWithEps.length-1];
  let nextBadgeHtml='';
  if(todayEps.length){
    const lbl=epLabel(todayEps[0],seasons);
    nextBadgeHtml=`<div class="modal-next-badge today">рџЊё Hoy В· ${lbl}</div>`;
  } else if(next){
    const du=daysUntil(next.date);
    const label=du===1?'maГ±ana':du===0?'hoy':`en ${du} dГ­as`;
    const lbl=epLabel(next,seasons);
    nextBadgeHtml=`<div class="modal-next-badge soon">в–¶ ${lbl} вЂ” ${fmtDate(next.date)} В· ${label}</div>`;
  } else {
    const renewedBadge=s.renewedNextSeason?` <span style="font-size:11px;background:var(--teal-soft);color:var(--teal);border:1px solid rgba(74,173,160,.3);border-radius:20px;padding:2px 10px;font-weight:700;margin-left:6px">рџ”„ Renovada</span>`:'';
    nextBadgeHtml=`<div class="modal-next-badge done">вњ“ Serie finalizada${renewedBadge}</div>`;
  }
  let datesRowHtml='<div class="modal-dates-row">';
  if(firstEpDate) datesRowHtml+=`<span class="modal-date-chip">рџЋ¬ Inicio: ${fmtDate(firstEpDate)}</span>`;
  if(isFinished && lastEpDate) datesRowHtml+=`<span class="modal-date-chip">рџЏЃ Final: ${fmtDate(lastEpDate)}</span>`;
  if(s.country) datesRowHtml+=`<span class="modal-date-chip">${countryFlag(s.country)} ${s.country}</span>`;
  datesRowHtml+='</div>';
  const posterEl=s.poster?`<img class="modal-poster-full" src="${s.poster}" alt="${s.name}" onerror="this.outerHTML='<div class=modal-poster-full-ph>рџЋ¬</div>'">`:`<div class="modal-poster-full-ph">рџЋ¬</div>`;
  let metaGrid='';
  if(s.year) metaGrid+=`<div class="meta-item"><div class="meta-key">AГ±o</div><div class="meta-val">${s.year}</div></div>`;
  if(s.country) metaGrid+=`<div class="meta-item"><div class="meta-key">PaГ­s</div><div class="meta-val">${countryFlag(s.country)} ${s.country}</div></div>`;
  if(s.network) metaGrid+=`<div class="meta-item"><div class="meta-key">Plataforma</div><div class="meta-val">${s.network}</div></div>`;
  metaGrid+=`<div class="meta-item"><div class="meta-key">Episodios</div><div class="meta-val">${totalEps}${seasons.length>1?` (${seasons.length}T)`:''}</div></div>`;
  const durInfo=getSeriesDurationInfo(s);
  if(durInfo.epDuration){
    metaGrid+=`<div class="meta-item"><div class="meta-key">вЏ± Por episodio</div><div class="meta-val">${durInfo.source==='average'?'в‰€ ':''}</div></div>`.replace('</div></div>',`${fmtDuration(durInfo.epDuration)}</div></div>`);
    if(durInfo.totalMins) metaGrid+=`<div class="meta-item"><div class="meta-key">вЏ± Total serie</div><div class="meta-val">${durInfo.source==='average'?'в‰€ ':''}${fmtDuration(durInfo.totalMins)}</div></div>`;
  }
  const watchLinksHtml=(()=>{const links=s.watchLinks&&s.watchLinks.length?s.watchLinks:(s.networkUrl?[{name:s.network||'Ver serie',url:s.networkUrl}]:[]);if(!links.length)return '';return `<div class="watch-links-label">в–¶ DГіnde ver</div><div class="watch-links">${links.map(l=>`<a class="watch-link" href="${l.url}" target="_blank" rel="noopener"><span class="watch-link-icon">в–¶</span>${l.name}</a>`).join('')}</div>`;})();
  const progressBlock=`<div class="modal-progress-block">
    <div class="modal-progress-header">
      <span class="modal-progress-label">${aired} / ${totalEps} emitidos В· ${activeDays}</span>
      <span class="modal-progress-pct" style="color:${col}">${pct}%</span>
    </div>
    <div style="height:6px;background:var(--border);border-radius:3px;overflow:hidden;position:relative">
      <div style="width:${pct}%;height:100%;background:${col};border-radius:3px;transition:width .4s"></div>
    </div>
  </div>`;

  // Episodes HTML
  let epsHtml='';
  if(seasons.length===1){
    epsHtml='<div class="ep-detail-list">';
    allEps.forEach(ep=>{
      const isPast=new Date(ep.date+'T12:00:00')<=now;
      const isEpToday=ep.date===todayStr;
      const st=ep.skipped?'skipped':isPast?'aired':'pending',lb=ep.skipped?'No emitido':isEpToday?'ВЎHoy!':isPast?'Emitido':'Pendiente';
      epsHtml+=`<div class="ep-detail-row"><span class="ep-detail-num" style="color:${col}">E${ep.seasonNum}</span><span class="ep-detail-date">${fmtDate(ep.date)}</span><span class="chip ${isEpToday&&!ep.skipped?'pending':st}" style="${isEpToday&&!ep.skipped?'background:var(--accent);color:#fff':''}">${lb}</span></div>`;
    });
    epsHtml+='</div>';
  } else {
    // Multi-season: colapsable por temporada
    seasons.forEach((season,idx)=>{
      const seasonEps=allEps.filter(e=>e.season===idx+1);
      const sAired=seasonEps.filter(e=>new Date(e.date+'T12:00:00')<=now&&!e.skipped).length;

function handleMoviesGenreChange(val){

    setTimeout(()=>{animeSubtab='movies';renderAnimeResults();},50);
  } else if(val==='Documental'){
    const sel=document.getElementById('moviesGenreSel');
    if(sel) sel.value='';

    switchTab('documentales');
  } else {
    moviesFilters.genre=val;
    resetMoviesPage();
    renderMoviesResults();
  }
}

function applyMoviesFilters(arr){
  let r=[...arr];
  const q=moviesFilters.q.toLowerCase().trim();
  if(q) r=r.filter(mv=>mv.name.toLowerCase().includes(q)||(mv.nameEn||'').toLowerCase().includes(q)||(mv.country||'').toLowerCase().includes(q)||(mv.network||'').toLowerCase().includes(q));
  if(moviesFilters.countries&&moviesFilters.countries.length) r=r.filter(mv=>itemMatchesCountries(mv,moviesFilters.countries));
  if(moviesFilters.book==='yes') r=r.filter(mv=>mv.basedOnBook);
  if(moviesFilters.book==='no') r=r.filter(mv=>!mv.basedOnBook);
  if(moviesFilters.year) r=r.filter(mv=>mv.date&&mv.date.startsWith(moviesFilters.year));
  if(moviesFilters.genre) r=r.filter(mv=>mv.genres&&mv.genres.includes(moviesFilters.genre));
  if(moviesFilters.sort==='az') r.sort((a,b)=>a.name.localeCompare(b.name,'es'));
  else if(moviesFilters.sort==='za') r.sort((a,b)=>b.name.localeCompare(a.name,'es'));
  else if(moviesFilters.sort==='date') r.sort((a,b)=>{if(!a.date&&!b.date)return 0;if(!a.date)return 1;if(!b.date)return-1;return b.date.localeCompare(a.date);});
  else if(moviesFilters.sort==='dateold') r.sort((a,b)=>{if(!a.date&&!b.date)return 0;if(!a.date)return 1;if(!b.date)return-1;return a.date.localeCompare(b.date);});
  else if(moviesFilters.sort==='recent') r.sort((a,b)=>{const ua=a.updatedAt||'';const ub=b.updatedAt||'';return ub.localeCompare(ua);});
  return r;
}

function getYoutubeId(url){
  if(!url) return null;
  // Normalize: trim whitespace
  url = url.trim();
  // Already an 11-char ID (no slashes or dots)
  if(/^[\w-]{11}$/.test(url)) return url;
  // youtu.be/ID or youtu.be/ID?si=...
  let m=url.match(/youtu\.be\/([\w-]{11})/);
  if(m) return m[1];
  // ?v=ID or &v=ID
  m=url.match(/[?&]v=([\w-]{11})/);
  if(m) return m[1];
  // /embed/ID
  m=url.match(/\/embed\/([\w-]{11})/);
  if(m) return m[1];
  // /shorts/ID
  m=url.match(/\/shorts\/([\w-]{11})/);
  if(m) return m[1];
  // /watch/ID
  m=url.match(/\/watch\/([\w-]{11})/);
  if(m) return m[1];
  // Last resort: any 11-char word after last /
  m=url.match(/\/([\w-]{11})(?:[?&]|$)/);
  if(m) return m[1];
  return null;
}

function applyAnimeFilters(arr){
  let r=[...arr];
  const q=animeFilters.q.toLowerCase().trim();
  if(q) r=r.filter(s=>s.name.toLowerCase().includes(q)||(s.nameEn||'').toLowerCase().includes(q)||(s.country||'').toLowerCase().includes(q)||(s.network||'').toLowerCase().includes(q));
  if(animeFilters.countries&&animeFilters.countries.length) r=r.filter(s=>itemMatchesCountries(s,animeFilters.countries));
  if(animeFilters.book==='yes') r=r.filter(s=>s.basedOnBook);
  if(animeFilters.book==='no') r=r.filter(s=>!s.basedOnBook);
  if(animeFilters.year) r=r.filter(s=>{ const y=(s.startDate||s.date||'').substring(0,4); return y===animeFilters.year||(s.year&&String(s.year)===animeFilters.year); });
  if(animeFilters.genre) r=r.filter(s=>s.genres&&s.genres.includes(animeFilters.genre));
  if(animeFilters.sort==='az') r.sort((a,b)=>a.name.localeCompare(b.name,'es'));
  else if(animeFilters.sort==='za') r.sort((a,b)=>b.name.localeCompare(a.name,'es'));
  else if(animeFilters.sort==='date') r.sort((a,b)=>((b.startDate||b.date||'')).localeCompare((a.startDate||a.date||'')));
  else if(animeFilters.sort==='dateold') r.sort((a,b)=>((a.startDate||a.date||'')).localeCompare((b.startDate||b.date||'')));
  return r;
}

function renderAnimeResults(){
  const resultsEl=document.getElementById('animeResults');
  if(!resultsEl) return;

  // Sync subtab buttons
  document.querySelectorAll('#animeSubtabs .subtab').forEach((btn,i)=>{
    const tabs=['series','movies'];
    btn.className='subtab'+(animeSubtab===tabs[i]?' active':'');
  });

  const clearBtn=document.getElementById('animeClearBtn');
  if(clearBtn) clearBtn.style.display=(animeFilters.countries.length||animeFilters.book!=='all'||animeFilters.year||animeFilters.genre)?'':'none';

  if(animeSubtab==='series'){
    const all=getAnimeSeriesData();
    const filtered=applyAnimeFilters(all);
    const page=paginationAnime.series;
    const totalPages=Math.ceil(filtered.length/PAGE_SIZE)||1;
    const paged=filtered.slice((page-1)*PAGE_SIZE,page*PAGE_SIZE);
    window.setAnimePage=p=>{paginationAnime.series=p;saveSession();renderAnimeResults();scrollToResults('animeResults');};
    if(!filtered.length){resultsEl.innerHTML='<div class="search-empty">No se encontrГі ningГєn anime con esos filtros.</div>';return;}
    let html=`<div class="books-count">Mostrando <strong>${paged.length}</strong> de <strong>${filtered.length}</strong> anime${filtered.length!==1?'s':''}</div><div class="series-grid">`;
    paged.forEach((s,i)=>{
      const si=i;
      const posterEl=s.poster?`<div class="series-card-poster-wrap"><img class="series-card-poster" src="${s.poster}" alt="${s.name}" onerror="this.outerHTML='<div class=series-card-poster-ph>рџЊё</div>'"></div>`:`<div class="series-card-poster-wrap"><div class="series-card-poster-ph">рџЊё</div></div>`;
      const links=s.watchLinks&&s.watchLinks.length?s.watchLinks:(s.networkUrl?[{name:s.network||'Ver',url:s.networkUrl}]:[]);
      const watchRow=links.length?`<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:4px">${links.map(l=>`<a class="card-watch-pill" href="${l.url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">в–¶ ${l.name}</a>`).join('')}</div>`:'';
      const genrePills=s.genres&&s.genres.length?`<div style="display:flex;flex-wrap:wrap;gap:3px;margin-top:5px">${s.genres.slice(0,3).map(g=>`<span style="font-size:9.5px;padding:2px 7px;border-radius:20px;background:var(--lavender-soft);border:1px solid rgba(139,114,190,0.2);color:var(--lavender);font-weight:600">${g}</span>`).join('')}</div>`:'';
      const year=s.year||(s.startDate||'').substring(0,4)||'';
      html+=`<div class="series-card" onclick="openAnimeDetail('series','${s.id||s.name}')">
        ${posterEl}
        <div class="series-card-body">
          <div class="card-badges">${s.basedOnBook?`<span class="badge badge-book">рџ“– ${s.bookSource||'Manga'}</span>`:''}${s.country?`<span class="badge" style="background:var(--lavender-soft);color:var(--lavender)">${countryFlag(s.country)} ${s.country}</span>`:''}</div>
          <div class="series-card-name">${s.name}</div>
          <div class="series-card-meta">${[s.network,year?'рџ“… '+year:null,s.totalEpisodes?'рџ“є '+s.totalEpisodes+' ep.':null].filter(Boolean).join(' В· ')}</div>
          ${genrePills}
          ${watchRow}
        </div>
      </div>`;
    });
    html+='</div>'+paginationHtml(page,totalPages,'setAnimePage');
    resultsEl.innerHTML=html;
  } else {
    // Movies
    const all=getAnimeMoviesData();
    const filtered=applyAnimeFilters(all);
    const page=paginationAnime.movies;
    const totalPages=Math.ceil(filtered.length/PAGE_SIZE)||1;
    const paged=filtered.slice((page-1)*PAGE_SIZE,page*PAGE_SIZE);
    window.setAnimeMoviePage=p=>{paginationAnime.movies=p;saveSession();renderAnimeResults();scrollToResults('animeResults');};
    if(!filtered.length){resultsEl.innerHTML='<div class="search-empty">No se encontrГі ninguna pelГ­cula de anime con esos filtros.</div>';return;}
    let html=`<div class="books-count">Mostrando <strong>${paged.length}</strong> de <strong>${filtered.length}</strong> pelГ­cula${filtered.length!==1?'s':''}</div><div class="movies-grid">`;
    paged.forEach((mv,mi)=>{
      const posterEl=mv.poster?`<img class="movie-card-poster" src="${mv.poster}" alt="${mv.name}" onerror="this.outerHTML='<div class=movie-card-poster-ph>рџЊё</div>'">`:`<div class="movie-card-poster-ph">рџЊё</div>`;
      const dateStr=mv.date?fmtDate(mv.date):(mv.year?String(mv.year):'Fecha por confirmar');
      const links=mv.watchLinks&&mv.watchLinks.length?mv.watchLinks:(mv.networkUrl?[{name:mv.network||'Ver',url:mv.networkUrl}]:[]);
      const watchRow=links.length?`<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:4px">${links.map(l=>`<a class="card-watch-pill" href="${l.url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">в–¶ ${l.name}</a>`).join('')}</div>`:'';
      const genrePills=mv.genres&&mv.genres.length?`<div style="display:flex;flex-wrap:wrap;gap:3px;margin-top:5px">${mv.genres.slice(0,3).map(g=>`<span style="font-size:9.5px;padding:2px 7px;border-radius:20px;background:var(--lavender-soft);border:1px solid rgba(139,114,190,0.2);color:var(--lavender);font-weight:600">${g}</span>`).join('')}</div>`:'';
      html+=`<div class="movie-card" onclick="openAnimeDetail('movie','${mv.id||mv.name}')">
        ${posterEl}
        <div class="movie-card-body">
          <div class="card-badges">${mv.basedOnBook?`<span class="badge badge-book">рџ“– ${mv.bookSource||'Manga'}</span>`:''}${mv.country?`<span class="badge" style="background:var(--lavender-soft);color:var(--lavender)">${countryFlag(mv.country)} ${mv.country}</span>`:''}</div>
          <div class="movie-card-name">${mv.name}</div>
          <div class="movie-card-meta">рџЋҐ PelГ­cula В· ${dateStr}</div>
          ${genrePills}
          ${watchRow}
        </div>
      </div>`;
    });
    html+='</div>'+paginationHtml(page,totalPages,'setAnimeMoviePage');
    resultsEl.innerHTML=html;
  }
}

// в•ђв•ђв•ђ SHARED RICH DETAIL MODAL (anime, realities) в•ђв•ђв•ђ
function openRichDetail(item, opts){
  // opts: {accentColor, accentSoft, accentBorder, isSeries, typeLabel, typeIcon}
  const {accentColor,accentSoft,accentBorder,isSeries,typeLabel,typeIcon}=opts;
  const now=new Date();

  // Poster
  const posterEl=item.poster
    ?`<img class="modal-poster-full" src="${item.poster}" alt="${item.name}" onerror="this.outerHTML='<div class=modal-poster-full-ph>${typeIcon}</div>'">`
    :`<div class="modal-poster-full-ph">${typeIcon}</div>`;

  // Badges
  let badgeHtml='';
  if(item.basedOnBook) badgeHtml+=`<span class="badge badge-book">рџ“– ${item.bookSource||'Manga/Novela'}</span>`;
  if(item.seasons&&item.seasons.length>1) badgeHtml+=`<span class="badge" style="background:${accentSoft};color:${accentColor}">${item.seasons.length} temporadas</span>`;
  if(!isSeries) badgeHtml+=`<span class="badge" style="background:${accentSoft};color:${accentColor}">${typeIcon} ${typeLabel}</span>`;

  // Dates row
  let datesRowHtml='<div class="modal-dates-row">';
  const startDate=item.startDate||item.date||'';
  if(startDate) datesRowHtml+=`<span class="modal-date-chip">рџЋ¬ ${startDate.substring(0,4)}</span>`;
  if(item.country) datesRowHtml+=`<span class="modal-date-chip">${countryFlag(item.country)} ${item.country}</span>`;
  if(item.network) datesRowHtml+=`<span class="modal-date-chip">${item.network}</span>`;
  datesRowHtml+='</div>';

  // Next episode / status badge (only for series with episodes)
  let nextBadgeHtml='';
  if(isSeries&&item.startDate&&item.totalEpisodes){
    const eps=genEps(item);
    const next=eps.find(e=>new Date(e.date+'T12:00:00')>now&&!e.skipped);
    const aired=eps.filter(e=>new Date(e.date+'T12:00:00')<=now&&!e.skipped).length;
    const pct=Math.round(aired/Math.max(item.totalEpisodes,1)*100);
    const todayStr=toStr(now.getFullYear(),now.getMonth(),now.getDate());
    const todayEps=eps.filter(e=>e.date===todayStr&&!e.skipped);
    if(todayEps.length){
      nextBadgeHtml=`<div class="modal-next-badge today">рџЊё Hoy В· Ep. ${todayEps[0].seasonNum}</div>`;
    } else if(next){
      const du=daysUntil(next.date);
      const label=du===1?'maГ±ana':du===0?'hoy':`en ${du} dГ­as`;
      nextBadgeHtml=`<div class="modal-next-badge soon">в–¶ Ep. ${next.seasonNum} вЂ” ${fmtDate(next.date)} В· ${label}</div>`;
    } else {
      nextBadgeHtml=`<div class="modal-next-badge done">вњ“ Finalizada</div>`;
    }
    nextBadgeHtml+=`<div class="modal-progress-block">
      <div class="modal-progress-header">
        <span class="modal-progress-label">${aired} / ${item.totalEpisodes} emitidos</span>
        <span class="modal-progress-pct" style="color:${accentColor}">${pct}%</span>
      </div>
      <div style="height:6px;background:var(--border);border-radius:3px;overflow:hidden">
        <div style="width:${pct}%;height:100%;background:${accentColor};border-radius:3px;transition:width .4s"></div>
      </div>
    </div>`;
  }

  // Watch links
  const links=item.watchLinks&&item.watchLinks.length?item.watchLinks:(item.networkUrl?[{name:item.network||'Ver',url:item.networkUrl}]:[]);
  const watchLinksHtml=links.length
    ?`<div class="watch-links-label">в–¶ DГіnde ver</div><div class="watch-links">${links.map(l=>`<a class="watch-link" href="${l.url}" target="_blank" rel="noopener"><span class="watch-link-icon">в–¶</span>${l.name}</a>`).join('')}</div>`
    :'';

  // Trailer
  const trailerSection=item.trailerUrl?trailerHtml(item.trailerUrl):'';

  // Meta grid
  let metaGrid='';
  if(item.year) metaGrid+=`<div class="meta-item"><div class="meta-key">AГ±o</div><div class="meta-val">${item.year}</div></div>`;
  if(item.country) metaGrid+=`<div class="meta-item"><div class="meta-key">PaГ­s</div><div class="meta-val">${countryFlag(item.country)} ${item.country}</div></div>`;
  if(item.network) metaGrid+=`<div class="meta-item"><div class="meta-key">Plataforma</div><div class="meta-val">${item.network}</div></div>`;
  if(item.totalEpisodes) metaGrid+=`<div class="meta-item"><div class="meta-key">Episodios</div><div class="meta-val">${item.totalEpisodes}${item.seasons&&item.seasons.length>1?` (${item.seasons.length}T)`:''}</div></div>`;

  // Genre pills
  const genrePills=item.genres&&item.genres.length
    ?`<div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:1rem">${item.genres.map(g=>`<span style="font-size:11px;padding:2px 10px;border-radius:20px;background:${accentSoft};color:${accentColor};font-weight:600;border:1px solid ${accentBorder}">${g}</span>`).join('')}</div>`
    :'';

  // Synopsis
  const synopsis=item.synopsis?`<div class="synopsis">${item.synopsis}</div>`:'';

  // Book block
  let bookBlock='';
  if(item.basedOnBook){
    const hasCover=item.bookCoverUrl&&item.bookCoverUrl.trim();
    const hasTitle=item.bookSource&&item.bookSource.trim();
    const editions=item.bookLinks&&item.bookLinks.length?item.bookLinks:(item.bookUrl?[{lang:'es',store:'Amazon',url:item.bookUrl}]:[]);
    if(hasCover||hasTitle||editions.length){
      const coverEl=hasCover?`<img class="book-cover" src="${item.bookCoverUrl}" alt="Portada" onerror="this.outerHTML='<div class=book-cover-ph>рџ“–</div>'">`:`<div class="book-cover-ph">рџ“–</div>`;
      const edPills=editions.map(e=>`<a class="book-edition-pill" href="${e.url}" target="_blank" rel="noopener"><span class="book-edition-flag">${langFlag(e.lang)}</span><span class="book-edition-store">${e.store}</span></a>`).join('');
      bookBlock=`<div class="book-block">${coverEl}<div class="book-info">
        <div class="book-title-text">рџ“– ${hasTitle?item.bookSource:'Basado en manga/novela'}</div>
        ${editions.length?`<div class="book-editions-row">${edPills}</div>`:''}
      </div></div>`;
    }
  }

  // animeSeason badge
  const animeSeasonBadge=item.animeSeason
    ?`<span class="modal-date-chip" style="background:${accentSoft};color:${accentColor};border-color:${accentBorder}">${typeIcon} ${item.animeSeason}</span>`
    :'';

  // Episode list (for series with seasons data)
  let epListHtml='';
  if(isSeries){
    const seasons=item.seasons&&item.seasons.length?item.seasons:(item.startDate?[{label:'Temporada 1',startDate:item.startDate,totalEpisodes:item.totalEpisodes||0,emissionDays:item.emissionDays||[item.dayOfWeek||0],allInOneDay:false,skipDates:[],episodes:[]}]:[]);
    if(seasons.length&&seasons[0].totalEpisodes){
      const allEps=genEps(item);
      const todayStr=toStr(now.getFullYear(),now.getMonth(),now.getDate());
      epListHtml=`<div class="divider"></div>`;
      if(seasons.length===1){
        epListHtml+=`<div class="ep-detail-list">`;
        allEps.forEach(ep=>{
          const isPast=new Date(ep.date+'T12:00:00')<=now;
          const isEpToday=ep.date===todayStr;
          const st=ep.skipped?'skipped':isPast?'aired':'pending';
          const lb=ep.skipped?'No emitido':isEpToday?'ВЎHoy!':isPast?'Emitido':'Pendiente';
          epListHtml+=`<div class="ep-detail-row"><span class="ep-detail-num" style="color:${accentColor}">E${ep.seasonNum}</span><span class="ep-detail-date">${fmtDate(ep.date)}</span><span class="chip ${isEpToday&&!ep.skipped?'pending':st}" style="${isEpToday&&!ep.skipped?'background:'+accentColor+';color:#fff':''}">${lb}</span></div>`;
        });
        epListHtml+=`</div>`;
      } else {
        seasons.forEach((season,idx)=>{
          const seasonEps=allEps.filter(e=>e.season===idx+1);
          const sAired=seasonEps.filter(e=>new Date(e.date+'T12:00:00')<=now&&!e.skipped).length;
          const sPct=Math.round(sAired/Math.max(season.totalEpisodes,1)*100);
          epListHtml+=`<div style="margin-bottom:1rem">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
              <span style="font-size:12px;font-weight:700;color:var(--text)">${season.label||`Temporada ${idx+1}`}</span>
              <span style="font-size:11px;color:var(--muted)">${sAired}/${season.totalEpisodes} В· ${sPct}%</span>
            </div>
            <div style="height:3px;background:var(--border);border-radius:2px;margin-bottom:8px;overflow:hidden">
              <div style="width:${sPct}%;height:100%;background:${accentColor};border-radius:2px"></div>
            </div>
            <div class="ep-detail-list">`;
          seasonEps.forEach(ep=>{
            const isPast=new Date(ep.date+'T12:00:00')<=now;
            const isEpToday=ep.date===todayStr;
            const st=ep.skipped?'skipped':isPast?'aired':'pending';
            const lb=ep.skipped?'No emitido':isEpToday?'ВЎHoy!':isPast?'Emitido':'Pendiente';
            epListHtml+=`<div class="ep-detail-row"><span class="ep-detail-num" style="color:${accentColor}">E${ep.seasonNum}</span><span class="ep-detail-date">${fmtDate(ep.date)}</span><span class="chip ${isEpToday&&!ep.skipped?'pending':st}" style="${isEpToday&&!ep.skipped?'background:'+accentColor+';color:#fff':''}">${lb}</span></div>`;
          });
          epListHtml+=`</div></div>`;
        });
      }
    }
  }

  document.getElementById('modalBox').innerHTML=`
    ${posterEl}
    <div class="modal-body">
      <div class="modal-badges">${badgeHtml}</div>
      <div class="modal-title">${item.name}</div>
      ${item.nameEn?`<div style="font-size:13px;color:var(--muted);font-style:italic;margin-bottom:2px;margin-top:-2px">${item.nameEn}</div>`:''}
      <div class="modal-dates-row">
        ${(() => { const startDate=item.startDate||item.date||''; return startDate?`<span class="modal-date-chip">рџЋ¬ ${startDate.substring(0,4)}</span>`:''; })()}
        ${item.country?`<span class="modal-date-chip">${countryFlag(item.country)} ${item.country}</span>`:''}
        ${item.network?`<span class="modal-date-chip">${item.network}</span>`:''}
        ${animeSeasonBadge}
      </div>
      ${nextBadgeHtml}
      ${watchLinksHtml}
      ${trailerSection}
      ${metaGrid?`<div class="modal-meta-grid">${metaGrid}</div>`:''}
      ${genrePills}
      ${synopsis}
      ${bookBlock}
      ${epListHtml}
      ${!epListHtml?'<div class="divider"></div>':''}
      <div style="display:flex;justify-content:flex-end;margin-top:1rem"><button class="btn" onclick="closeModal()">Cerrar</button></div>
    </div>`;
  document.getElementById('modalBg').classList.add('open');
}

function openAnimeDetail(type,key){
  const arr=type==='series'?getAnimeSeriesData():getAnimeMoviesData();
  const item=arr.find(x=>x.id===key||x.name===key)||arr[key];
  if(!item) return;
  openRichDetail(item,{
    accentColor:'var(--lavender)',
    accentSoft:'var(--lavender-soft)',
    accentBorder:'rgba(139,114,190,0.2)',
    isSeries: type==='series',
    typeLabel: type==='series'?'Anime Serie':'Anime Pelicula',
    typeIcon:'рџЊё'
  });
}

function getRealitiesSeriesData(){
  return state.series.filter(s=>s.category==='reality');
}
function getRealitiesMoviesData(){
  return state.movies.filter(m=>m.category==='reality');
}

function applyRealitiesFilters(arr){
  let r=[...arr];
  const q=realitiesFilters.q.toLowerCase().trim();
  if(q) r=r.filter(s=>s.name.toLowerCase().includes(q)||(s.nameEn||'').toLowerCase().includes(q)||(s.country||'').toLowerCase().includes(q)||(s.network||'').toLowerCase().includes(q));
  if(realitiesFilters.countries&&realitiesFilters.countries.length) r=r.filter(s=>itemMatchesCountries(s,realitiesFilters.countries));
  if(realitiesFilters.year) r=r.filter(s=>{ const y=(s.startDate||s.date||'').substring(0,4); return y===realitiesFilters.year||(s.year&&String(s.year)===realitiesFilters.year); });
  if(realitiesFilters.genre) r=r.filter(s=>s.genres&&s.genres.includes(realitiesFilters.genre));
  if(realitiesFilters.sort==='az') r.sort((a,b)=>a.name.localeCompare(b.name,'es'));
  else if(realitiesFilters.sort==='za') r.sort((a,b)=>b.name.localeCompare(a.name,'es'));
  else if(realitiesFilters.sort==='date') r.sort((a,b)=>((b.startDate||b.date||'')).localeCompare((a.startDate||a.date||'')));
  else if(realitiesFilters.sort==='dateold') r.sort((a,b)=>((a.startDate||a.date||'')).localeCompare((b.startDate||b.date||'')));
  return r;
}

function renderRealitiesResults(){

function openRealityDetail(type,key){
  const arr=type==='series'?getRealitiesSeriesData():getRealitiesMoviesData();
  const item=arr.find(x=>x.id===key||x.name===key)||arr[key];
  if(!item) return;
  openRichDetail(item,{
    accentColor:'var(--teal)',
    accentSoft:'var(--teal-soft)',
    accentBorder:'rgba(74,173,160,0.2)',
    isSeries: type==='series',
    typeLabel: type==='series'?'Reality / Docuserie':'Documental',
    typeIcon:'рџЋ¤'
  });
}

    return (a.name||'').toLowerCase().includes(q)||
           (a.country||'').toLowerCase().includes(q);
  });

  if(!filtered.length){
    resultsEl.innerHTML='<div class="search-empty">No se encontrГі ninguna actriz.</div>';
    return;
  }

  // Agrupar por paГ­s
  const groups={};
  filtered.forEach(a=>{
    const country=a.country||'Otros';
    if(!groups[country]) groups[country]=[];
    groups[country].push(a);
  });

  // Ordenar paГ­ses: los mГЎs numerosos primero
  const sortedCountries=Object.keys(groups).sort((a,b)=>groups[b].length-groups[a].length);

  // Contar apariciones en series+pelГ­culas por actriz
  function seriesCount(a){
    const inS=(state.series||[]).filter(s=>s.cast&&s.cast.some(m=>m.actressId===a.id)).length;
    const inM=(state.movies||[]).filter(mv=>mv.cast&&mv.cast.some(m=>m.actressId===a.id)).length;
    return inS+inM;
  }

  let html='';

  // Si hay bГєsqueda activa: mostrar todas sin agrupar
  if(q){
    html+=`<div class="actress-tab-grid">`;
    filtered.sort((a,b)=>a.name.localeCompare(b.name,'es')).forEach(a=>{
      html+=actressTabCardHtml(a, seriesCount(a));
    });
    html+=`</div>`;
  } else {
    // Agrupar por nacionalidad
    sortedCountries.forEach(country=>{
      const list=groups[country].sort((a,b)=>seriesCount(b)-seriesCount(a));
      const flag=countryFlag(country);
      html+=`<div class="actress-nationality-section">
        <div class="actress-nationality-header">
          <span class="actress-nationality-flag">${flag}</span>
          <span class="actress-nationality-title">${country}</span>
          <span class="actress-nationality-count">${list.length} actrices</span>
        </div>
        <div class="actress-tab-grid">
          ${list.map(a=>actressTabCardHtml(a,seriesCount(a))).join('')}
        </div>
      </div>`;
    });
  }

  resultsEl.innerHTML=html;
}

    :`<div class="actress-tab-photo-ph">рџЋ­</div>`;
  const countBadge=count?`<span class="actress-tab-count">${count} obra${count!==1?'s':''}</span>`:'';

function _picksCardHtml(s, si, is2026=false){
  const cls=is2026?' pick2026':'';
  const starLabel=is2026?'рџЊџ 2026':'в­ђ Pick';
  const links=s.watchLinks&&s.watchLinks.length?s.watchLinks:(s.networkUrl?[{name:s.network||'Ver',url:s.networkUrl}]:[]);
  const watchRow=links.length
    ?`<div class="pick-card-watch">${links.slice(0,2).map(l=>`<a class="card-watch-pill" href="${l.url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">в–¶ ${l.name}</a>`).join('')}</div>`:'';
  const genrePills=s.genres&&s.genres.length
    ?`<div class="pick-card-genres">${s.genres.slice(0,3).map(g=>`<span class="pick-card-genre">${g}</span>`).join('')}</div>`:'';
  const seasons=getSeasons(s);
  const totalEps=seasons.reduce((a,t)=>a+t.totalEpisodes,0);
  const metaParts=[
    s.country?`${countryFlag(s.country)} ${s.country}`:'',
    s.network||'',
    s.year?String(s.year):'',
    totalEps?`${totalEps} ep.`:'',
  ].filter(Boolean);
  const posterEl=s.poster
    ?`<img class="pick-card-poster" src="${s.poster}" alt="${s.name}" onerror="this.outerHTML='<div class=pick-card-poster-ph>рџЋ¬</div>'">`
    :`<div class="pick-card-poster-ph">рџЋ¬</div>`;
  const openFn=`switchTab('list');setTimeout(()=>openSeries(${si}),80)`;
  return `<div class="pick-card${cls}" onclick="${openFn}">
    <div class="pick-card-poster-wrap">
      ${posterEl}
      <div class="pick-star-badge">${starLabel}</div>
    </div>
    <div class="pick-card-body">
      <div class="pick-card-name">${s.name}${s.nameEn?`<br><span style="font-size:9.5px;font-weight:400;font-style:italic;color:var(--muted)">${s.nameEn}</span>`:''}</div>
      <div class="pick-card-meta">${metaParts.join(' В· ')}</div>
      ${s.synopsis?`<div class="pick-card-synopsis">${s.synopsis}</div>`:''}
      ${genrePills}
      ${watchRow}
    </div>
  </div>`;
}

function _renderPicksView(viewId, filterFn, heroIcon, heroTitle, heroDesc, emptyMsg, is2026=false){

  const picks=[...state.series].filter(filterFn);
  // Sort: name alphabetically, stable
  picks.sort((a,b)=>a.name.localeCompare(b.name,'es'));
  const heroClass=is2026?'picks-hero picks2026':'picks-hero';
  let html=`<div class="${heroClass}">
    <div class="picks-hero-icon">${heroIcon}</div>
    <div class="picks-hero-text">
      <div class="picks-hero-title">${heroTitle}</div>
      <div class="picks-hero-desc">${heroDesc}</div>
    </div>
  </div>`;
  if(!picks.length){
    html+=`<div class="picks-empty">
      <div class="picks-empty-icon">${heroIcon}</div>
      <div style="font-weight:700;font-size:15px;color:var(--text);margin-bottom:6px">TodavГ­a no hay picks</div>
      <div style="font-size:13px">${emptyMsg}</div>

    view.innerHTML=html; return;

  html+=`<div class="picks-count-bar"><strong>${picks.length}</strong> serie${picks.length!==1?'s':''}</div>`;

  picks.forEach(s=>{

  });
  html+=`</div>`;
  view.innerHTML=html;
}

function switchTab(tab){
  state.tab=tab;
  saveSession();
  const moreTabs=['books','actresses','anime','realities','documentales'];
  const picksTabs=['top10','picks2026'];
  const allTabs=['cal','list','movies','upcoming','books','anime','realities','documentales','actresses','top10','picks2026'];

  allTabs.forEach(t=>{
    const view=document.getElementById('view'+t.charAt(0).toUpperCase()+t.slice(1));
    if(view) view.style.display=tab===t?'':'none';
    const btn=document.getElementById('tab'+t.charAt(0).toUpperCase()+t.slice(1));
    if(!btn) return;
    const isActive=tab===t;
    if(moreTabs.includes(t)){
      btn.className='tab-more-item'+(isActive?' active':'');

      btn.className='nav-picks-item'+(isActive?' active':'');

  });

  // "MГЎs" button highlight
  const moreBtn=document.getElementById('tabMore');
  if(moreBtn) moreBtn.className='nav-link'+(moreTabs.includes(tab)?' active':'');

  // "Mis picks" button highlight
  const picksBtn=document.getElementById('tabPicksGroup');
  if(picksBtn) picksBtn.className='nav-link nav-picks-btn'+(picksTabs.includes(tab)?' active':'');

  if(window.innerWidth<=600) window.scrollTo({top:0,behavior:'smooth'});
  if(tab==='cal'){renderWeekView();}
  if(tab==='list') renderList();
  if(tab==='movies') renderMovies();

  if(tab==='books') renderBooks();

  if(tab==='realities') renderRealities();

}

function navSearchHandler(q){
  const boxes=[document.getElementById('navSearchResults'), document.getElementById('navSearchResultsMobile')].filter(Boolean);
  q=(q||'').trim();
  if(q.length<2){ boxes.forEach(b=>b.style.display='none'); return; }
  const ql=q.toLowerCase();
  const results=[];
  (state.series||[]).forEach((s,i)=>{
    if((s.name||'').toLowerCase().includes(ql)||(s.nameEn||'').toLowerCase().includes(ql))
      results.push({type:s.category==='anime'?'anime':s.category==='reality'?'reality':'serie', name:s.name, year:s.year, poster:s.poster, si:i});
  });
  (state.movies||[]).forEach((m,i)=>{
    if((m.name||'').toLowerCase().includes(ql)||(m.nameEn||'').toLowerCase().includes(ql))
      results.push({type:'pelicula', name:m.name, year:m.year, poster:m.poster, si:i});
  });
  const typeLabel={serie:'Serie',anime:'Anime',reality:'Reality',pelicula:'PelГ­cula'};
  const html=results.length
    ? results.slice(0,8).map(r=>{
        const poster=r.poster?`<img src="${r.poster}" onerror="this.outerHTML='<div class=nsearch-item-ph>рџЋ¬</div>'" loading="lazy">`:'<div class="nsearch-item-ph">рџЋ¬</div>';
        let onclick='';
        if(r.type==='serie') onclick=`navSearchPick();switchTab('list');setTimeout(()=>openSeries(${r.si}),60)`;
        else if(r.type==='pelicula') onclick=`navSearchPick();switchTab('movies');setTimeout(()=>openMovie(${r.si}),60)`;
        else if(r.type==='anime') onclick=`navSearchPick();switchTab('anime');setTimeout(()=>openAnimeDetail('series','${r.si}'),60)`;
        else if(r.type==='reality') onclick=`navSearchPick();switchTab('realities');setTimeout(()=>openRealityDetail('series','${r.si}'),60)`;
        return `<div class="nsearch-item" onclick="${onclick}">${poster}<div class="nsearch-item-info"><div class="nsearch-item-name">${r.name}</div><div class="nsearch-item-meta">${typeLabel[r.type]||''}${r.year?' В· '+r.year:''}</div></div></div>`;
      }).join('')
    : '<div class="nsearch-empty">Sin resultados</div>';
  boxes.forEach(b=>{ b.innerHTML=html; b.style.display='flex'; b.style.flexDirection='column'; });

  });
  state.movies.forEach((mv,mi)=>{
    const castNames=(mv.cast||[]).map(m=>{const a=(state.actresses||[]).find(x=>x.id===m.actressId);return a?a.name.toLowerCase():'';}).join(' ');
    const genres=(mv.genres||[]).join(' ').toLowerCase();

      results.push({type:'pelicula',s:mv,si:mi});
  });
  getAnimeSeriesData().forEach((s,si)=>{
    if(s.name.toLowerCase().includes(term)||(s.network||'').toLowerCase().includes(term)||(s.country||'').toLowerCase().includes(term))
      results.push({type:'anime',s,si:s.id||s.name});
  });
  getAnimeMoviesData().forEach((mv,mi)=>{
    if(mv.name.toLowerCase().includes(term)||(mv.network||'').toLowerCase().includes(term)||(mv.country||'').toLowerCase().includes(term))
      results.push({type:'anime-movie',s:mv,si:mv.id||mv.name});

  getRealitiesSeriesData().forEach((s,si)=>{
    if(s.name.toLowerCase().includes(term)||(s.network||'').toLowerCase().includes(term)||(s.country||'').toLowerCase().includes(term))

function openInfoModal(key) {
  const data = INFO_CONTENT[key];
  if (!data) return;
  const content = document.getElementById('infoModalContent');
  content.innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:1.25rem">
      <span style="font-size:24px">${data.emoji}</span>
      <h2 style="font-family:var(--font-display);font-size:22px;font-weight:700;color:var(--text);letter-spacing:-.01em;line-height:1">${data.title}</h2>
    </div>
    <div style="height:2px;background:linear-gradient(90deg,var(--accent),var(--lavender),transparent);border-radius:2px;margin-bottom:1.25rem;opacity:.5"></div>
    ${data.html}
  `;
  const bg = document.getElementById('infoModalBg');
  bg.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeInfoModal() {
  document.getElementById('infoModalBg').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && document.getElementById('infoModalBg').classList.contains('open')) {
    closeInfoModal();
  }
});
